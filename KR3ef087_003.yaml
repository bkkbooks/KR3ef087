body:
  text: 卷下驚悸吐衄下血胸滿瘀血病脈證治第十六驚者外事相觸而然或耳聞大聲目擊異物遇險臨危觸事喪志心為之忤有惕惕然之狀悸者動也有陽氣內衰心下空虛火氣內動而為悸者有水停心下心屬火惡水神不自安而為悸者有汗吐下後正氣內虛而悸者有榮衛涸流脈結代而悸者此俱屬傷寒而論也若雜病則更有心下鼓者有心中淡淡大動者有心惕惕如人將捕之者此驚與悸之所由分也至於吐衄下血胸滿瘀血又有源流之別吐血出於胃吐行濁道衄血出於經衄行清道蓋胃者守營之血守而不走存於胃中胃氣虛不能攝血故吐血從喉嚨出於口經者走經之血走而不守火氣急迫隨經直犯清道由督脈斬關而出於鼻此吐衄血所由異也下血者內經云結陰者便血一升再結二升三結三升此陰氣內結不得通行血無所稟滲入腸間故下血也許學士渭下清血色鮮者腸風也血濁色暗者臟毒也肛門射如血線者脈痔也又下血腹不痛者為濕毒腹痛者為熱毒此下血之所由異也若胸滿由血瘀所致則有傷寒血瘀者有産後血瘀者有暴怒傷陰血瘀者有跌撲墜損血瘀者證各不同然血瘀必胸滿者何也難經雲氣會膻中膻中穴在兩乳間陷中正當胸中部分此三焦宗氣所居是為上氣海始因氣滯而血瘀終以血瘀而氣更滯此血瘀之所以致胸滿也今總以意斷之肝病發驚駭是驚屬乎肝也心動則為悸是悸屬乎心也心主血屬君火肝藏血屬相火凡諸見血皆火迫妄行故吐衄下血瘀血與驚悸統匯為一論乎寸口脈動而弱動即為驚弱則為悸傷寒論云數脈見於關上上下無頭尾如豆大厥厥動搖者為動也又云陽動則汗出陰動則發熱是動脈不特見於關上即尺寸兩部亦有動脈以陰陽相搏而虛者則動也此寸口脈兼三部而言蓋驚自外至也驚則氣亂故脈動而不寧悸自內惕者也悸因氣虛故脈弱而無力也心下悸者半夏麻黃丸主之半夏麻黃丸方半夏麻黃等分上二味末之煉蜜和丸如小豆大飲服三丸日三服本經云水停心下甚者則悸半夏辛以散之能運脾去濕以燥水飲於內麻黃苦以泄之能發表出汗以宣水飲於外也李瑋西曰傷寒脈結代心動悸者主炙甘草湯以潤經益血復脈通心與此方大異則憑脈與不憑證之謂也師曰尺脈浮目睛暈黃衄未止暈黃去目睛慧了知衄今止尺脈宜沉而反浮氣升火載陰氣不藏也目睛暈黃者以肝藏血開竅於目故衄之止與否視目睛之暈黃何如黃去睛慧則目得血而能視故衄止又曰從春至夏衄者太陽從秋至冬衄者陽明衄血出於鼻手太陽經上䪼抵鼻目下為䪼足太陽經從巔入絡腦鼻與腦通手陽明經挾鼻孔迎香穴足陽明經起鼻交頞中即山根四經皆循鼻分故皆能致衄太陽行身之表內經云太陽為開是春生夏長陽氣在外有開之義故春夏衄者太陽陽明行身之裡經雲陽明為合是秋斂冬藏陽氣在內有藏之義故秋冬衄者陽明衄家不可汗汗出必額上陷脈緊急直視不能眴不得眠衄家陰血已虧汗出則更亡陽額上為陽分陷者陽氣虛脫也脈者血之府氣者脈所行此以血亡氣竭故脈緊急也經云瞳子高者太陽不足戴眼者太陽已絶此衄血傷陰汗多亡陽陰陽兩虛故直視不能眴也眴者目轉合之貌經云陰氣虛故目不得瞑又云陽虛發汗躁不得眠病人面無血色無寒熱脈沉弦者衄脈浮弱手按之絶者下血煩咳者必吐血內經云心之合脈也其榮色也以心主血血充則色和面無血色者脫血之象無寒熱表無邪也沉弦皆陰脈衄則血脫而陰虛故也脈浮在表裡氣必虛且弱而按之絶者陰已內亡氣不攝血故下血也煩與咳俱肺病肺中伏火迫血妄行故吐血所謂上氣見血下聞病音也夫吐血咳逆上氣其脈數而有熱不得臥者死吐血肺虛氣逆金不生水並腎臟亦不能納氣歸原故咳逆上氣也脈數有熱在腎則水衰火盛在肺則火刑肺金經云數則為熱又云數則虛不得臥陰虛血不歸肝也肝藏血經云人臥則血歸於肝李升璽曰吐血脈數者不治總以陰虛氣脫也今醫但知清涼解熱者真屬夢夢夫酒客咳者必致吐血此因極飲過度所致也咳出於肺吐出於胃酒性至熱極飲過度則肺胃之間熱蓄氣衝故咳而吐血寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相擊此名曰革婦人則半産漏下男子則亡血失精此節解見上卷第六篇彼為虛勞而言也因內有亡血二字覆載入此篇血論中通節要看虛寒二字俗醫視亡血為熱證不知氣逆亡血血既亡後內已虛寒矣經云血氣者喜溫而惡寒蓋溫則經脈貫通運行不息虛則氣不攝血寒則凝而不流此血既不歸經又無著落自然泛溢亡失屢見亡血者服寒涼藥愈出不止悉屬虛虛之咎此古人血脫者益氣多以甘溫之藥奏功良有以也亡血不可發其表汗出則寒栗而振經云奪血者無汗以汗與血俱屬心液血亡液竭無復余液作汗也今又發表則陰虛且更亡陽表間衛氣虛極故寒栗而振病人胸滿唇痿舌青口燥但欲漱水不欲咽無寒熱脈微大來遲腹不滿其人言我滿為有瘀血心主血肺主氣俱位膈上正在胸中血瘀則心肺交困氣血不行故胸滿也肝藏血其經環唇內脾裹血其華在唇四白胃多氣多血其經挾口環唇病則口喎唇疹血瘀則肝脾胃三經枯澀血不華潤故唇痿也痿者枯燥無血色之貌又心主血屬火舌為心竅故其色紅血瘀則火氣衰冷心血不生故舌青也血瘀則津液不布故口燥內無實熱故漱水不欲咽外無表邪故不往來寒熱也脈微大者血瘀邪氣盛也微大者稍大之意非微而又大也來遲者血瘀脈澀滯也肝藏血其經抵小腹布脅肋血瘀多在小腹脅肋二處與臍腹無干故腹不滿其人言我滿以血瘀氣滯疑為腹滿耳病者如熱狀煩滿口乾燥而渴其脈反無熱此為陰伏是瘀血也當下之血瘀內無實熱故外證但如熱狀而其脈不數疾反無熱也煩滿者血瘀經氣不舒燥渴者血瘀津液不布也血屬陰瘀則結伏於內故為陰伏下之以去瘀生新火邪者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之此節本傷寒論而句多遺失不全因原文有驚狂二字故匯入驚悸篇中也桂枝救逆湯方桂枝二兩去皮甘革二兩炙生薑三兩大棗十二枚牡蠣五兩熬龍骨四兩蜀漆三兩洗去腥上為末以水一斗三升先煮蜀漆減二升納諸藥煮取三升去渣溫服一升傷寒論云傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者主此湯方內皆回陽固脫之品也成無己注云傷寒脈浮者邪在表火劫發汗汗者心之液汗多亡陽則心氣虛心惡熱火邪內迫則心神浮越故驚狂起臥不安與桂枝湯解未盡表邪去芍藥以其益陰非亡陽所宜也火邪錯逆加蜀漆之辛以散之陽氣亡脫加龍骨牡蠣之澀以固之本草云澀可去脫龍骨牡蠣之屬是也吐血不止者柏葉湯主之柏葉湯方柏葉三兩乾薑三兩炮艾三把上三味以水五升取馬通汁一升合煮取一升分溫再服心屬君火肝屬相火凡吐血皆火邪迫之也柏葉生而西向秉兌金之氣以剋制肝木艾葉甘辛微溫利陰氣其性入內而不炎於上使氣血反歸於里吐血則氣虛中寒經云始為熱中末傳寒中是也血得寒氣愈加瘀凝而吐不止乾薑炒黑止而不走能入血分以溫經使百脈流通血歸故道此陽生陰長之義也馬通汁咸即馬屎與血同味故能走血引火下行蓋血生於心心屬午火馬為午獸與少陰君火同氣故用之為使以瀉心火也下血先便後血此遠血也黃土湯主之血之來路遠故先便後血準繩云此由足陽明隨經入胃府淫溢而下者也胃在上故為遠血黃土湯方白朮附子乾地黃阿膠黃芩甘草各二兩灶中黃土半斤上七味以水八升煮取三升分溫三服脾胃屬土色黃黃土功能助胃灶中之土更得火氣以火能生土也白朮甘草皆培植中土阿膠地黃養陰血黃芩清熱入肺經肺與大腸為表裡也附子能引補血藥以養不足之真陰故用以溫經逐濕下血先血後便此近血也赤豆當歸散主之方見狐惑血之來路近故先血後便準繩云此由手陽明隨經下行滲入大腸傳於廣腸而下者也大腸在下故為近血當歸甘溫和血使氣血各有所歸心主血赤小豆色赤心之谷也其性下行入陰分故治下痢腸澼而能排膿散血除濕清熱也心氣不足吐血衄血瀉心湯主之瀉心湯方大黃二兩黃連黃芩各一兩上三味以水三升煮取一升頓服之凡五臟各具陰陽二氣心於臟為陽屬火於經則屬陰主血心氣不足乃心真陰之氣不足也夫陰虛則陽亢火盛迫血妄行以致吐衄大黃泄去亢盛之火黃連苦寒入心為使又能瀉肝木不使木旺生火黃芩入肺清熱使金不受火爍頓服之以折火勢此為養陰退陽之劑嘔吐噦下利病脈證治第十七此事難知問嘔吐噦胃所主各有經乎答曰胃者總司也有太陽陽明少陽之別以其氣血多少而為聲物有無之不同蓋吐屬太陽有物無聲乃血病也嘔屬陽明有物有聲氣血俱病也噦屬少陽無物有聲乃氣病也此以乾嘔為噦者也王肯堂云或問成無己許學士以噦為厄逆東垣海藏又以噦為乾嘔陳無擇又以噦名咳逆諸論不同今子獨取成許二家之說何也曰噦義具在內經諸家不察耳按靈樞雜病篇末云噦以草刺鼻嚏嚏而已無息而疾迎引之立已此謂閉口鼻氣使之無息也大驚之亦可已詳經文三法正治厄逆之法故取成許二家以噦為厄逆為得經旨也若以噦為乾嘔則嚏與驚與無息其乾嘔能立已乎則噦非乾嘔明矣若以噦名咳逆按內經云秋傷於濕上逆而咳又云秋傷於濕冬生咳嗽則咳逆為咳嗽無疑孫真人千金云咳逆者嗽也則後人以咳逆誤作厄逆謬矣下利有內因有外因經云腎藏志志有餘則腹脹飧泄肝足厥陰生病嘔逆飧泄又經云暴注下迫皆屬於熱又云脾虛則腹滿腸鳴飧泄食不化蓋太陰者濕土也經云濕勝則濡泄脈訣云濕多成五泄又經云諸病水液澄徹清冷皆屬於寒則下利屬虛與寒濕者什九也經云清氣在下則生飧泄此胃虛陽氣陷入陰中是陽氣不得伸於地之上多致水穀不分而下利此內因也又云春傷於風夏生飧泄蓋春主肝木夏主脾土是陽氣出於地之上為風寒所折不即病於木折之時多發於土濕之分故又云久風為飧泄此外因也至於暴泄非陰久泄非陽內經之所謂五虛難經之所謂五泄者種種各見於經論中又未可悉數矣夫嘔家有癰膿不可治嘔膿儘自愈嘔家有癰膿是因癰膿而嘔非痰食氣逆而嘔也經云熱聚胃口不行故胃脘為癰是胃癰本熱證若嘔家屬寒者多治宜香溫辛散非癰膿所宜故不可治嘔待膿盡則嘔自愈先嘔卻渴者此為欲解先渴卻嘔者為水停心下此屬飲家嘔屬胃寒渴則胃中陽氣得復故欲解若先渴則因飲水過多水停心下此飲家水逆而嘔也傷寒論云本渴而飲水嘔者柴胡不中與也宜五苓散即此意嘔家本渴今反不渴者以心下有支飲故也此屬飲家嘔家本渴津液亡也心下有支飲則胃寒水逆而嘔故不渴蓋支飲屬肺病肺氣不利不能通調水道下輸膀胱故聚飲為逆也支飲解見第十二篇問曰病人脈數數為熱當消穀引食而反吐者何也師曰以發其汗令陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也脈有因熱而數者有因虛而數者經云食入於陰長氣於陽是胃為水穀之海得陽盛而消穀今汗多亡陽膈氣虛而脈數經云邪熱不殺穀是也又經雲陽受氣於胸中則陽微膈虛者且因虛而致寒故吐為胃中虛冷脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之今脈反弦故名曰虛內經云脈弱以滑是有胃氣弦屬肝脈此胃虛木邪乘土故為胃氣無餘也朝食暮吐變為胃反王太僕云食不得入是有火也食入反出是無火也此寒在上者上指胃口言法當溫中始愈反下之則愈虛寒而愈吐矣寸口脈微而數微則無氣無氣則榮虛榮虛則血不足血不足則胸中冷氣為衛血為榮內經云營者水穀之精氣也衛者水穀之悍氣也是人因水穀以生氣血氣血生而脈始盛矣若微而數者經云寸口諸微亡陽故為元氣元氣則陽既不生而陰亦不長氣屬陽血屬陰氣以統血故陽生則陰始長遂致榮虛血不足也經雲陽受氣於胸中又宗氣出於上焦膻中為上氣海今血不足而胸冷者胸中陽氣不足故致吐也然始言脈微而數後但言微不復言數者以數為客熱不能消穀胃中虛冷前節已言之矣李瑋西曰血猶水地食猶舟也舟因水動涸則不行若榮微血少食不得順流而下故梗塞致吐此丹溪治噎膈反胃不主香燥而主滋潤之劑也如當歸人乳諸血藥然既云胸中冷則溫中之藥自不可少趺陽脈浮而澀浮則為虛虛則傷脾脾傷則不磨朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而澀其病難治趺陽胃脈也脾胃相為表裡脈在不浮不沉之間浮則氣外泄而內不充故為虛則傷脾也前三節責之胃中虛冷此節又責在脾不磨蓋以胃納水穀脾行津液相須為用者也今脾不磨則胃亦不納自致朝暮迭吐宿食不化名為胃反若脈緊則中寒澀則氣結皆陰脈不能溫暖胃氣中焦衰冷故難治沈子華曰吐無常時者為嘔吐病非胃反也必朝食暮吐暮食朝吐有常時者始名胃反病人欲吐者不可下之欲吐者時覺寒氣痰食泛泛然湧逆而上此病在上焦當與溫中散逆為主下之則虛胃氣逆病機矣然此屬平常之吐不專指胃反之吐也噦而腹滿視其前後知何部不利利之則愈昔賢云傷寒發厄或有熱證雜證發厄自屬虛寒則噦原有虛實寒熱之不同若腹滿而前後何部不利則是氣窒於下者必逆於上利之使下氣既通上氣自降故愈活人書云前部豬苓湯後部調胃承氣湯嘔而胸滿者茱萸湯主之茱萸湯方吳茱萸一升人參三兩生薑六兩大棗十二枚上四味以水五升煮取三升溫服七合日三服凡腹滿者宜下若嘔為氣逆但胸滿不是腹滿此陽氣虛而寒邪上窒也人參大棗補虛吳茱萸生薑散寒止逆乾嘔吐涎沫頭痛者茱萸湯主之此仲景治傷寒厥陰證例也乾嘔者有聲無物之謂太陰少陰經從足至胸俱不上頭二經並無頭痛證厥陰經上出額與督脈會於巔故乾嘔吐涎沫者裡寒也頭痛者寒氣從經脈上攻也不用桂附而用吳茱萸以其入厥陰經故耳余皆溫補散寒之藥嘔而腸鳴心下痞者半夏瀉心湯主之經云中氣不足腸為之苦鳴以裡虛也下之胸中痛者為結胸邪熱乘虛客於心下滿而不痛者痞也傷寒論云病發於陽而反下之熱入因作結胸病發於陰而下之因作痞成注云下後陽邪傳裡結於胸中為結胸以胸中為陽受氣之分也陰邪傳裡留於心下為痞以心下為陰受氣之分也半夏瀉心湯方半夏半升洗人參乾薑黃芩各三兩黃連一兩甘草二兩炙大棗十二枚上七味以水一斗煮取六升去渣再煮取三升溫服一升日三服辛以散逆故用半夏乾薑若以泄熱故用黃連黃芩甘以緩脾故用人參甘草大棗乾嘔而利者黃芩加半夏生薑湯主之黃芩加半夏生薑湯方黃芩三兩半夏半升生薑三兩芍藥二兩甘草二兩炙大棗十二枚上六味以水一斗煮取三升去渣溫服一升日再服夜一服此痞氣塞在中焦故令上嘔下利然痞由邪熱乘虛入里故用黃芩撤熱芍藥泄邪半夏生薑散逆止嘔甘草大棗緩脾和中此即半夏瀉心湯例也諸嘔吐谷不得下者小半夏湯主之方見痰飲嘔吐谷不下上焦氣逆也小半夏湯散逆降氣嘔吐而病在膈上後思水者解急與之思水者豬苓散主之嘔吐病在膈上胃口氣寒上逆也後思水者解寒化為熱陽氣漸復也急與之水以和胃氣恐遲則胃干液竭故耳但思水者未免水停心下豬苓散利水和脾即以泄邪熱消停飲潤津液也豬苓散方豬苓茯苓白朮各等分上三味杵為散飲服方寸匕日三服豬苓茯苓利水而泄熱白朮補脾以生津嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之嘔者寒在上小便利者寒在下脈弱者氣衰於裡微熱而厥者陽亡於表也此虛寒欲脫之證故難治也四逆湯方附子一枚生用乾薑一兩五錢甘草二兩灸上三味以水三升煮取一升二合去渣分溫再服強人可大附子一枚乾薑三兩附子無干姜不熱又生附配乾薑補中有發所以回陽也炙甘草所以補中嘔而發熱者小柴胡湯主之傷寒發熱者為表證然邪欲侵里裡氣拒而不納則逆而作嘔此半表半裡證也小柴胡為治半表半裡和解之劑小柴胡湯方柴胡半斤半夏半升黃芩三兩人參三兩甘草三兩生薑三兩大棗十二枚上七味以水一斗二升煮取六升去渣再煎取三升溫服一升日三服凡病邪在表則寒宜汗在裡則熱宜下在半表半裡則駸駸乎有漸熱之意又宜和解故用柴胡黃芩以清熱半夏生薑以散逆止嘔人參甘草大棗以緩中補虛也胃反嘔吐者大半夏湯主之大半夏湯方半夏三升洗用人參三兩白蜜一升上三味以水一斗二升和蜜揚之二百四十遍煮藥取二升半溫服一升余分再服前論胃反有云膈氣虛胃中虛冷者又云寒在於上虛則傷脾者可見胃反自屬大虛寒症用人參補虛半夏散逆白蜜潤津液而利水穀也李升璽曰經云嘔家不宜甘味此用白蜜何歟不知此胃反自屬脾虛經所謂甘味入脾歸其所喜是也況君以半夏味辛而止嘔佐以人參氣溫而補中胃反自立止矣食已即吐者大黃甘草湯主之大黃甘草湯方大黃四兩甘草一兩上二味以水三升煮取一升分溫再服朝食暮吐停食不化為胃寒食已即吐火逆衝上又為胃熱經云諸逆衝上皆屬於火王太僕云食不得入是有火也大黃苦以瀉熱甘草甘以緩急一緩一瀉胃氣清而吐止矣胃反吐而渴欲飲水者茯苓澤瀉湯主之茯苓澤瀉湯方茯苓半斤澤瀉四兩白朮三兩桂枝二兩甘草二兩生薑四兩上六味以水一斗煮取三升納澤瀉再煮取二升半溫服八合日三服吐而渴者津液亡而胃虛燥也飲水則水停心下茯苓澤瀉降氣行飲白朮補脾生津此五苓散原方之義也然胃反因脾虛氣逆故加生薑散逆甘草和脾又五苓散治外有微熱故用桂枝此胃反無表熱而亦用之者桂枝非一於攻表藥也乃徹上下達表裡為通行津液和陽散水之劑吐後渴欲得水而貪飲者文蛤湯主之兼主微風脈緊頭痛文蛤湯方文蛤五兩麻黃三兩石膏五兩杏仁五十粒甘草生薑各三兩大棗十二枚上七味以水六升煮取二升溫服一升汗出即愈吐亡津液故貪飲因飲水而停飲於中則津液不布愈飲愈渴文蛤味鹹走腎邪而勝水氣以利水飲於內麻黃石膏等六味即大青龍湯去桂枝發汗藥也使水飲從毛竅中泄去以散水飲於外經云開鬼門潔淨府此一方兩得之以內有麻黃生薑等解表藥故兼主微風脈緊頭痛乾嘔吐逆吐涎沫半夏乾薑散主之半夏乾薑散方半夏乾薑等分上二味杵為散取方寸匕槳水一升半煎取七合頓服之乾嘔吐逆胃不納穀也吐涎沫脾不攝涎也液入脾為涎此中氣虛寒所致乾薑溫中半夏散逆漿水煎者酸溫之性可以收液頓服之使藥味驟然而下則治之有力足以壓下濁涎逆氣也病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者生薑半夏湯主之生薑半夏湯方生薑汁一升半夏半升上二味以水三升煮半夏取二升納生薑汁煮取一升半小冷分四服日三服夜一服止停後服陽受氣於胸中胸中似喘不喘等證皆寒飲內蓄而陽氣不得伸越之象也生薑半夏辛溫之氣足以散水飲而舒陽氣然待小冷服者恐寒飲固結於中拒熱藥而不納反致吐逆今熱藥冷飲下嗌之後冷體既消熱性便發情且不違而致大益此內經之旨也此方與前半夏乾薑湯略同但前溫中氣故用乾薑此散停飲故用生薑前因嘔吐上逆頓服之則藥力猛峻足以止逆降氣嘔吐立除此心中無奈寒飲內結難以猝消故分四服使胸中邪氣徐徐散也乾嘔噦若手足厥者橘皮湯主之橘皮湯方橘皮四兩生薑半斤上二味以水七升煮取三升溫服一升下咽即愈嘔噦至於厥逆何以不用薑桂蓋此因水飲內蓄其氣但上逆而不溫於四末故致手足厥逆非亡陽也橘皮生薑散水飲而止嘔吐為安胃和中之良劑與傷寒論厥而心下悸者宜先治水卻治其厥同意噦逆者橘皮竹茹湯方橘皮二斤竹茹二升人參一兩甘草五兩生薑半斤大棗三十枚上六味以水一斗煮取三升濕服一升日三服噦逆有胃寒者有胃熱者此噦逆因胃中虛熱氣逆所致故用人參甘草大棗補虛橘皮生薑散逆竹茹甘寒疏逆氣而清胃熱用以為君夫六腑氣絶於外者手足寒上氣腳縮五臟氣絶於內者利不禁下甚者手足不仁六腑屬陽四肢為諸陽之本故六腑氣絶者手足寒陽虛則氣脫而無根故上氣經云陽氣者柔則養筋今陽氣虛寒寒主收引筋失所養故腳縮也五臟屬陰經云陰在內陽之守也陰虛不能固守於內以致下焦不合而利不禁手足不仁者下多亡陰血液既脫肌肉榮養無資故搔之不知痛癢也下利脈沉弦者下重脈大者為未止脈微弱數者為欲自止雖發熱不死沉弦皆屬陰脈下重者陽虛氣不升舉也下利脈宜虛細經云大則病進又云泄而脈大為難治以脈與病不相應故未止也若脈微弱此脈與病相應者兼數則陽氣得復故為欲止下利忌發熱雖發熱不死以陽氣尚存也此治傷寒例也下利手足厥冷無脈者灸之不溫若脈不還反微喘者死下利至厥冷無脈氣已脫矣又灸之不溫脈不還反微喘則氣更無根而上逆所謂真元耗損喘出於腎氣之上奔是也故死少陰負趺陽者為順也下利病在脾胃少陰腎脈屬水診在太溪足內踝後趺陽胃脈屬土在足面上若少陰脈勝則水邪乘土為逆今少陰脈負於趺陽負敗也則土能制水水敗土勝故順也下利有微熱而渴脈弱者今自愈下利微熱而渴陽氣復也脈弱則邪氣去胃氣存且脈與病相應故自愈下利脈數有微熱汗出今自愈設脈緊為未解下利脈數微熱陽氣復也汗出者榮衛和而津液通故自愈緊則為寒屬陰脈陰寒有餘陽氣未復故未解傷寒論曰下利以胃中虛冷故令脈緊是也下利脈數而渴者今自愈設不差必圊膿血以有熱故也脈數為熱傷寒論云脈數不解而下利不止必協熱而便膿血是也下利脈反弦發熱身汗者自愈弦為風脈病屬外感下利脈弦發熱則證在表而所感淺汗出則津液通而邪易散故愈又按弦為陰脈下利亡陰見弦脈則陰生矣傷寒論曰陽明病循衣摸床微喘直視脈弦者生彼以陽亢生陰而活此以陰虛生陰而愈也下利氣者當利其小便靈樞云脾病得後與氣則快然如衰後者大便也氣者失氣也蓋脾邪壅滯故失氣則快今下利失氣者利其小便使膀胱得氣化而出通其前即所以快其後也下利寸脈反浮數尺中自澀者必圊膿血寸脈屬陽浮數為陽脈寸脈浮數則陽氣有餘而搏陰血尺脈屬陰澀為少血尺中自澀則陰氣不足而為熱所迫也故下利者必圊膿血下利清穀不可攻其表汗出必脹滿下利清穀陰寒氣勝胃氣虛衰也攻表汗出則亡陽而中與虛寒愈甚故腹必脹滿素問云臟寒生滿病靈樞云胃中寒則脹滿是也下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也此證得以鬱冒汗出而解者幸身有微熱一證可愈也蓋下利脈沉遲陰寒氣勝也面赤為戴陽陰盛格陽於上也夫陽格於上者則陽已虛於下故下利清穀然幸身有微熱故猶能鬱冒汗出令表裡氣和而解又以脈見沉遲裡氣原屬虛寒故得微厥戴陽二句正解面赤微厥之故傷寒論云此為本虛故當戰而汗出是也鬱冒正邪爭勝而昏憒也下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死下利脈絶陽脫於裡也手足厥冷陽脫於表也四肢為諸陽之本晬時一周時也脈還手足溫陽氣漸復也脈不還陽氣竟絶矣故死下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯四逆湯方見前下利腹脹滿寒氣在裡也身體痛寒氣在表也凡表裡俱病里證實熱宜下者宜先解表而後攻裡若里證虛寒者宜先溫里而後攻表以裡虛為重也四逆桂枝兩湯為治表裡不易之法桂枝湯方桂枝三兩去皮芍藥三兩甘草三兩炙生薑三兩大棗十二枚上五味㕮咀以水七升微火煮取三升去渣適寒溫服一升服已須臾啜稀粥一升以助藥力溫覆令一時許遍身漐漐微似有汗益佳不可令如水流漓若一服汗出病差停後服李時珍曰仲景治傷寒有汗者為中風用桂枝湯蓋津液為汗汗即血也在營則為血在衛則為汗風傷衛氣外泄不能內護於營營氣虛弱津液不固故有汗發熱惡寒然風寒之邪皆由皮毛而入皮毛者肺之合也肺主衛氣包羅一身乃天之象是證雖屬太陽而肺實受邪氣其證面赤怫鬱咳嗽有痰喘而胸滿諸證非肺病乎蓋腠理不密則津液外泄而肺氣自虛虛則補其母故用桂枝甘草外散風邪以救表內伐肝木以防脾佐以芍藥泄木而固脾泄東所以補西也使以薑棗行脾之津液而和營衛也是桂枝湯雖太陽解肌輕劑實為理脾救肺之藥也下利三部脈皆平按之心下堅者急下之宜大承氣湯方見痙病下利按之心下堅者實也設或脈見微弱猶未可下今三部脈皆平則裡氣不虛可知自宜急下之此憑證又憑脈之法也下利脈遲而滑者實也利未欲止急下之宜大承氣湯經云脈遲尚未可攻以遲為寒也若遲而滑滑為陽脈乃水穀積聚之象祗因裡實氣結經澀不通故脈遲耳是利未欲止宜急下之王宇泰曰脈遲而有力方可用此法若無力而外證無所據者恐虛寒不宜妄投大承氣也下利脈反滑當有所去下乃愈宜大承氣湯下利脈當虛反滑者水穀聚於胃中脈經云滑為病食是也故下之愈下利已差至其年月日時復發者以病不盡故也當下之宜大承氣湯至某年月日時復發者以春夏秋冬各遇其所傷之時肝心脾肺腎各值其所傷之臟則病復發也餘邪尚在故當下下利譫語者有燥屎也小承氣湯主之經云實則譫語故知有燥屎宜下此主傷寒病言小承氣湯方大黃四兩厚朴三兩炙枳實大者三枚炙上三味以水四升煮取一升二合去渣分溫二服得利則止下利便膿血桃花湯主之便膿血人但知為協熱而不知有裡寒者蓋寒則血為凝滯不能隨經以行瘀而不散必致尋竅而出此見傷寒少陰證以腎為陰臟位居下部故用辛溫重澀之劑以治之也桃花湯方赤石脂一斤半銼半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去渣溫七合納赤石脂方寸匕三服若一服愈余勿服李時珍曰赤石脂之重澀入下焦血分而固脫乾薑之辛溫暖下焦氣分而補虛粳米之甘溫佐石脂乾薑而潤腸胃也熱利下重者白頭翁湯主之白頭翁湯方白頭翁黃連黃柏秦皮各三兩上四味以水七升煮取二升去渣溫服一升不愈更服熱則傷氣氣虛下陷故致後重此見傷寒厥陰證本方俱苦寒藥寒能勝熱苦以泄熱且厚腸胃經云腎欲堅急食苦以堅之以腎主二便故也下利後更煩按之心下濡者為虛煩也梔子豉湯主之利後更煩者熱也若心下濡則內非實熱故為虛煩然煩出於肺病屬上焦梔子入肺經故用梔子豉湯吐上焦虛熱濡音軟梔子豉湯方梔子十四枚香豉四合綿裹上二味以水四升先煮梔子得二升半納豉煮取一升半去渣分二服溫進一服得吐則止二味俱屬苦寒經云寒勝熱酸苦湧泄為陰吐為湧下利為泄香豉用黑豆蒸罯其氣能升能散於吐藥尤宜下利清穀裡寒外熱汗出而厥者通脈四逆湯主之通脈四逆湯方附子大者一枚生用乾薑三兩強人可四兩甘草一兩炙上三味以水三升煮取一升二合去渣分溫再服下利清穀即裡寒也外熱者陰盛格陽也汗出而厥則亡陽液脫矣湯名通脈四逆者四肢冷為四逆以十二經脈行於周身陰陽氣各交接於手足指頭經云陽陰氣不相順接便為厥厥者手足逆冷是也附子益陽散寒乾薑炙甘草溫中固脫則厥溫脈通利自止矣下利肺痛紫參湯主之紫參湯方紫參半斤甘草三兩上二味以水五升先煮紫參取二升納甘草煮取一升半分溫三服肺與大腸為表裡下利則大腸虛熱上逆迫肺故肺痛紫參主心腹積聚腸胃邪熱佐甘草以和中也氣利訶梨勒散主之訶梨勒散方訶梨勒十枚煨上一味為散粥飲和頓服氣利者下利氣虛下陷而滑脫也訶梨勒性斂澀能溫胃固腸粥飲和者假穀氣以助胃頓服者味並下更有力也瘡癰腸癰浸淫病脈證第十八經云諸痛癢瘡皆屬心火蓋心主血而惡熱熱則血腐為膿此瘡癰諸病之所由生也今人率以癰疽並稱不知疽小而深癰大而淺小則氣收斂而近里大則氣鼓發而向表深則從臟從陰毒常內陷淺則從腑從陽毒從外泄此輕重淺深之所由分也然瘡癰有外因如經云諸癰腫者寒氣之腫八風之變也又云勞汗當風寒薄為皶郁乃痤是也有內因如經云榮氣不從逆於肉裡乃為癰腫又云三陽為病發寒熱下為癰腫又云腎移熱於脾癰腫少氣脾移寒於肝癰腫筋攣又云六腑不和留結為癰少陽厥逆發腸癰不可治驚者死是也有內外因如經云膏梁之變足生大丁又云東方魚鹽之地魚者熱中鹽者勝血民病癰瘍是也腸癰乃濕熱瘀血流入大小腸而成其致病有男子暴急奔走以致腸胃傳送不能舒利敗血濁氣壅遏而成者有婦人産後體虛多臥未經起坐又或坐草艱難用力太過産後惡露未驅以致敗血停積腸胃結滯而成者有飢飽勞傷擔負重物致傷腸胃或醉飽房勞過傷精力或生冷並進以致氣血乖違濕動痰生多致腸胃痞塞運化不通氣滯而成者此生腸癰之由也浸淫者濕漬之狀膿水流處即潰爛成瘡故名浸淫瘡是濕熱蘊蓄而發者然瘡癰浸淫生於外者也腸癰生於內而有證見於外者也生於外者宜按法治之生於內者勿錯誤處之則庶幾矣諸浮脈數應當發熱而反灑淅惡寒若有痛處當發其癰脈浮數而發熱惡寒傷寒證也當周身骨節俱痛癰則痛在一處脈浮者其氣外張數者其熱內擁灑淅惡寒者是火伏於內不克外泄乃熱極似水之象是脈與證雖類傷寒而實非傷寒也李升璽曰按傷寒論云諸脈浮數發熱惡寒若有痛處飲食如常者畜積有膿也蓋傷寒則不欲食癰膿則能食此又驗證之一法也師曰諸癰腫欲知有膿無膿以手掩腫上熱者為有膿不熱者為無膿腫上熱者毒氣已經腐化故為有膿不熱者毒氣尚自蘊結故為無膿腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腹內有癰膿薏苡附子敗醬散主之濡音軟腸癰者熱聚於內則腠理氣血自為壅瘀故皮膚厚而粗老如鱗甲之錯雜者然也腹皮急以有癰也濡如腫狀膿已成也凡病腹有積聚者脈因積聚而數身有熱者脈因身熱而數若腹無積聚身無熱脈豈無故而數哉故知腹內有癰膿也薏苡附子敗醬散方薏苡仁十分附子二分敗醬五分上三味杵為末取方寸匕以水二升煎減半頓服小便當下附子辛熱破癥堅敗醬苦寒入手足陽明經消癰破血能化膿為水氣如敗豆醬故以為名然腸癰多生於濕熱薏苡仁得土之燥稟秋之涼能燥濕清熱入手陽明大腸為引經藥也腸癰者少腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也大黃牡丹湯主之此一句在當有血句下腸癰生在少腹故少腹腫痞按之即痛如淋癰在大腸不在膀胱故小便自調熱毒蓄於中而蒸發於外故發熱汗出火伏於內故肌表惡寒也如傷寒陽極發厥之類脈遲緊者膿未成以熱毒尚結而未化故用大黃牡丹湯下其血脈洪數者膿已成但宜排膿養血清熱解毒而不宜下也李瑋西曰上節癰在小腸故云腹內有膿用苡仁滲濕熱以利小便此節癰在大腸故云少腹腫痞用大黃蕩積熱以利大便也大黃牡丹湯方大黃四兩牡丹皮一兩芒硝三合桃仁五十個瓜子半斤上五味以水六升煮取一升去渣納芒硝再煎沸頓服之有膿當下如無膿當下血大黃芒硝泄熱桃仁行瘀丹皮逐血痹去血分中伏火瓜子主潰膿血故可下未成膿之腸癰也問曰寸口脈微而澀法當亡血若汗出設不汗出者云何答曰若身有瘡被刀斧所傷亡血故也汗出亡陽則脈微亡血傷陰則脈澀皆陰脈也設不汗而瘡瘍金瘡雖不亡陽而亡血亦見微澀之脈者總是榮衛虛衰也病金瘡王不留行散主之王不留行散方王不留行十分八月八日採蒴藋細葉十分七月七日採桑東南根白皮十分三月三日採黃芩二分芍藥厚朴乾薑各二分甘草十八分川椒三分除目及閉口者炒去汗上九味桑根皮以上三味燒灰存性勿令灰過各別杵篩合治之為散服方寸匕小瘡即粉之大瘡但服之産後亦可服如風寒桑東根勿取之前三物皆陰千百日金瘡恐有血瘀之患王不留行行血定痛者也蒴藋主絶傷續筋骨桑皮為線可縫金瘡能治虛損絶脈取東南根皮者以其受生氣也血遇熱則宣流黃芩所以清之血得寒則凝澀乾薑川椒所以溫之血被傷則耗散芍藥所以收之金瘡傷在肌肉而肌肉惟脾土主之甘草厚朴俱入脾胃一補一運所以溫氣血而長肌肉者也前三味燒灰存性則色黑味鹹咸能走敗血黑能止好血也産後亦可服以産後多瘀血此方能行瘀血故耳浸淫瘡從口流向四肢者可治從四肢流來入口者不可治脾為生物之本開竅於口合肌肉而主四肢者也浸淫瘡從口流向四肢則自內出外邪毒將漸消散故可治從四肢流來入口則自外入內邪毒漸侵於裡而生物之本拔矣故不可治即上經云病在外者可治入里者死蓋以口為內四肢為外也浸淫瘡黃連粉主之浸淫瘡生於濕熱經云瘡瘍皆屬於火黃連入心經性寒味苦寒勝熱苦燥濕故主之趺蹶手指臂腫轉筋陰狐疝蛔蟲病脈證治第十九趺者腳背也陽明經動脈處蹶者痿躄之病內經云治痿獨取陽明何也蓋陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用此趺蹶之所自來也手指臂經脈有六道即手三陰三陽交接之處如肺手太陰脈行臂內前廉出大指端少商穴其支者從腕後次指內廉出其端大腸手陽明脈即起於次指端商陽穴循指上廉行臂外前廉手厥陰心包絡脈循臂內入掌中出中指端中衝穴其支者別掌中循小指次指出其端三焦手少陽脈即起於小指次指端關衝穴行臂外廉心手少陰脈行臂內後廉循小指內出其端少衝穴小腸手太陽脈即起於小指端少澤穴行臂外後廉手指臂腫者或因風火濕痰或因氣虛血澀也李時珍曰霍亂吐利轉筋皆脾胃病非肝病也肝雖主筋而轉筋則由濕熱寒濕之邪襲傷脾胃所致故轉筋必起於足腓以腓及宗筋皆屬陽明也陰狐疝屬肝病其狀如瓦合臥則入小腹行立則出小腹入囊中因狐晝出穴而溺夜入穴而不溺疝出入上下與狐相類故名狐疝傷寒六經傳變惟厥陰有吐蛔證以厥陰風木能生蟲也雜證亦有吐蛔者戴元禮曰胃中冷必吐蛔是蛔證屬陰也然亦有陽證吐蛔者蓋胃中空虛無穀氣蛔上求食至咽而吐須看兼證何如不可專主胃冷曾記一人陽黃吐蛔又大發斑陽毒證口瘡咽痛吐蛔皆以冷劑取效是亦有陽證者矣師曰病趺蹶其人但能前不能卻刺腨入二寸此太陽經傷也趺蹶陽明病也今刺腨入二寸謂太陽經傷者何蓋太陽經行身之背為表陽明經行身之腹為里凡邪氣外至皆從太陽經而入是太陽經為邪氣出入之門戶腨者即足太陽經之穴刺入二寸使邪氣從太陽經入者仍從太陽經而出所以泄邪氣於所中之門戶也經云三陽病癰腫痿厥腨㾓三陽即太陽也是太陽經未嘗不病蹶也靈樞云足陽明之脈循胚外廉下足跗足太陽之脈下合膕中貫腨內腨腓腸也是二經俱走足者也又足太陽病膕如結腨如裂是為踝厥是主筋今趺蹶能前不能卻豈非難經所謂筋緩不能收持者乎故陽明病而取太陽經穴蓋有由也李升璽曰按明堂圖腨上有承山飛揚二穴腨下二寸為附陽穴即陽蹻之郤刺之皆治痿厥風痹不仁此即趺蹶而取太陽經傷之意也病人常以手指臂腫動此人身體瞤瞤者藜蘆甘草湯主之方缺前節病在下部此節病在上部凡濕痰凝滯關節則腫風邪襲傷經絡則動手指臂腫動身體瞤瞤動貌風痰為病也藜蘆能吐風痰故主之佐以甘草所以養胃氣也轉筋之為病其人臂腳直脈上下行微弦轉筋入腹者雞屎白散主之上下行者脈來搏指直上直下不和柔也弦脈屬肝風脈也風邪襲傷經絡故臂腳直而轉筋入腹內經云肝之合筋也其畜雞也雞於卦為巽秉風木之性主治風傷筋者所謂因其氣相感而以意使之者也猶治風病即用病風殭蠶之意其屎白出雞腸胃中腸胃皆屬陽明經今主治轉筋者以轉筋起於足腓腓及宗筋皆屬陽明故也雞屎白散方雞屎白上一味為末取方寸匕以水六合和溫服陰狐疝氣者偏有大小時時上下蜘蛛散主之偏有大小以睪丸言時時上下以睪丸入小腹出囊中言蜘蛛散方蜘蛛十四枚熬焦桂枝半兩上二味為散取八分一匕飲和服日再服蜜圓亦可蜘蛛有毒主㿉疝疝者肝木之病桂能伐肝以木得桂而枯也然此方萬勿輕試問曰病腹痛有蟲其脈何以別之師曰腹中痛其脈當沉若弦反洪大故有蛔蟲脾為至陰其經入腹風寒感之則腹痛陰寒在裡故脈沉也弦屬肝脈其性束急木行乘土故亦主腹痛經雲陽脈澀陰脈弦法當腹中急痛是也脈反洪大是蛔蟲上厥動膈與陰寒證不類故主有蛔蟲蛔蟲之為病令人吐涎心痛發作有時毒藥不止甘草粉蜜湯主之靈樞云蛔動則胃緩胃緩則廉泉開故涎下令人吐涎也蛔上入膈心在膈上故心痛須臾下膈則痛止故發作有時廉泉任脈穴名在頷下骨尖中甘草粉蜜湯方甘草二兩粉一兩蜜四兩上三味以水三升先煮甘草取二升去渣納粉蜜攪令和煎如薄粥溫服一升差即止蛔得甘則動其性喜甘故也胡粉有毒能殺蟲置粉於甘草蜜湯中令蛔服毒而死蛔厥者當吐蛔令病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之烏梅丸方烏梅三百個人參六兩當歸四兩桂枝六兩附子六兩炮乾薑十兩細辛六兩川椒四兩去汗黃連十六兩黃柏六兩上十味異搗篩合治之以苦酒浸烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得納臼中與蜜杵二千下圓如桐子大先食飲服十丸日三丸稍加至二十丸禁生冷滑臭等物經云胃中冷則吐蛔是蛔厥為臟寒也烏梅味酸黃連黃柏味苦桂枝蜀椒乾薑細辛味辛以蛔得酸則止得苦則安得甘則動於上得辛則伏於下也然胃氣虛寒人參附子以溫補之吐亡津液當歸以辛潤之而蛔厥可愈矣婦人妊娠病脈證治第二十脈經云婦人懷軀七月而不可知時時衄血而轉筋者軀也衄時嚏而動者非軀也此驗妊娠有無之法也然天一生水腎主先天難經謂右腎為命門即女子系胞之處殊不知命門在兩腎中間非偏在右側也經又云手少陰脈動甚者妊子也蓋手少陰屬心經心主血脈故耳又妊娠一月始胚足厥陰脈養之二月始膏足少陽脈養之三月始胞手心主脈養之四月形體成手少陽脈養之五月能動足太陰脈養之六月筋骨立足陽明脈養之七月毛髮生手太陰脈養之八月臟腑具手陽明脈養之九月穀氣入胃足少陰脈養之十月諸神備足太陽脈養之即産矣然手少陰不養胎者以心為君主之官其經氣血不堪供應胞胎也手太陽亦不養胎者小腸與心為表裡隨心為主也每至三五七月多至半産者以三月屬心包絡五月屬脾七月屬肺皆系臟陰臟陰易於傷動故也其餘至期當養之經虛實不調則胎亦從此不安甚則下血而墜蓋手足諸經或多氣多血或少氣多血或多氣少血安胎之法宜各按月依經視其氣血多少虛實而調之庶無墜胎之患其或感冒風寒別生異證又宜各按法調治之此虞氏之正論也師曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之於法六十日當有此證設有醫治逆者卻一月加吐下者則絶之此節病證即妊娠惡阻是也寸為陽脈主氣尺為陰脈主血陰脈小弱者血不足也凡云尺脈旺者主有孕亦下盡然血以養胎則液竭而渴又脾為坤土厚德載物胎氣賴以奠安不能食者多見吐逆證脾氣弱也凡有他病而渴不能食者脈必不平而有寒熱令雖不食反得平脈又無寒熱故主妊娠桂枝湯用桂枝益衛龐安常云桂不墜胎以其走表與胎在裡無干也若桂心肉桂則墜胎矣芍藥養榮甘草和中薑棗行津液為氣血交理之劑樓全善曰絶之者謂絶止醫治候其自安也嘗治一二婦惡阻病吐愈治愈逆因思仲景絶之之旨遂停藥月餘自安婦人宿有癥病經斷未及三月而得漏下不止胎動在臍上者為癥痼害妊娠六月動者前三月經水利時胎也下血者後斷三月衃也所以血不止者其癥不去故也桂枝茯苓丸主之凡有胎者忌漏下恐血下而胎亦下也若宿有癥病者經斷未及三月而漏下以致胎氣不安動在臍上然又有六月動者前三月經水利時先已成胎即上文經斷未及三月其胎已成而得漏下不止是也後斷三月衃者迄今六月又動其胎已成矣其癥不去句即申明前漏下不止為癥痼害之故樓氏曰凡胎動多當臍今動在臍上故知是癥也方氏曰胎動胎漏皆下血而胎動有腹痛胎漏無腹痛故胎動宜行氣胎漏宜清熱桂枝茯苓丸方桂枝茯苓芍藥丹皮桃仁去皮尖熬各等分上五味末之煉蜜和丸如兔屎大每日食前服一丸不知加至三丸宿血不去則新血不生丹皮桃仁去癥芍藥和榮茯苓淡以滲泄之桂猶圭也引導陽氣則癥病己通血止胎安矣李升璽曰桃仁丹皮治癥痼不致傷胎即內經有故無隕亦無隕也之意婦人懷孕六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇所以然者子臟開故也當以附子湯溫其臟方缺肝藏血胎氣因血以養弦屬肝脈又為風脈肝屬風木肝虛血弱則風非外至而內自生風故發熱惡寒也肝虛則無血以養胎故胎脹且血脈凝澀不通故腹痛也少腹如扇子臟開者以肝性疏泄肝血不藏胎將墜也故以附子湯溫其臟按子臟即子宮也臍下三寸為關元關元左二寸為胞門右二寸為子戶或以命門為女子系胞之處謂命門之子臟者非也蓋命門是穴名在腰後兩腎中附脊骨第十四椎之兩旁今經文明說少腹如扇者子臟開則子臟在少腹明矣豈有在少腹者而反謂其在脊後者乎此誤也師曰婦人有漏下者有半産後因續下血都不絶者有妊娠下血者假令妊娠腹中痛為胞阻膠艾湯主之膠艾湯方阿膠二兩艾葉三兩當歸三兩芎藭二兩芍藥四兩乾地黃三兩甘草二兩上七味以水五升清酒三升合煮取三升去渣納膠令消盡溫服一升日三服不差更作漏下即妊娠下血脈經以陽不足謂之激經是也半産後續下血及妊娠下血有虛實寒熱之異不一端也胞阻者足三陰經血不足無以養胎則胞脈阻隔而上下之氣不通故令腹痛此湯用四物阿膠養血甘草緩解經腹痛艾葉入脾肝腎三陰經辛能利竅苦可疏通故氣血交理而女科止腹痛安胎氣暖子宮帶下崩中多用之煮以清酒欲其行也婦人懷妊腹中㽲痛當歸芍藥散主之當歸芍藥散方當歸三兩芍藥一斤芎藭半斤一作三兩白朮四兩茯苓四兩澤瀉半斤上六味杵為末取方寸匕酒和日三服此胎中有宿水停漬故令腹中㽲痛急痛也用白朮健脾燥濕茯苓澤瀉利水散瘀當歸芎藭養血行氣芍藥獨多用者以其斂陰氣而安脾經為血虛腹痛者所必需也妊娠嘔吐不止乾薑人參半夏丸主之乾薑人參半夏丸方乾薑一兩人參一兩半夏二兩上三味末之以生薑汁糊為丸如梧子大飲服十三丸日三服嘔吐不止此妊娠病惡阻也乾薑溫中人參養胃半夏止嘔散逆張元素曰妊娠忌半夏薑製則無害矣妊娠小便難飲食如故歸母苦參丸主之歸母苦參丸方當歸貝母苦參各四兩上三味末之煉蜜丸如小豆大飲服三丸加至十丸飲食如故則胎氣自安但小便難者膀胱氣不化而津液少也當歸辛以潤之苦參苦以泄之貝母入肺經以開鬱利氣使其通調水道下輸膀胱為水出高源之義妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散主之妊娠有水氣由肺虛氣不下降脾虛土不勝水也故水氣下壅則小便不利水氣外溢則身重惡寒水氣上蒸則煩眩本經云心下有支飲其人苦眩冒葵子滑以利水茯苓淡以行水故主之葵子茯苓散方葵子一斤茯苓一斤上二味杵為散飲服方寸匕日三服小便利則愈婦人妊娠宜常服當歸散當歸散方當歸芍藥芎藭黃芩各一斤白朮半斤上五味杵為散酒飲服方寸匕日再服妊娠常服即易産胎無疾苦産後百病悉主之丹溪以白朮黃芩為安胎聖藥蓋白朮補土而能厚載黃芩清熱以和陰陽歸芍芎藭養血行氣故可常服四物湯中獨去熟地者恐其泥也昔賢云胎前毋滯産後毋虛是矣妊娠養胎白朮散主之白朮散方白朮芎藭蜀椒三分去汗牡蠣上四味杵為散酒服一錢匕日三服夜一服但苦痛加芍藥心下毒痛倍加芎藭心煩吐痛不能食飲加細辛一兩半夏大者二十枚服之後更以醋漿水服之若嘔以醋漿水服之復不解者小麥汁服之已後渴者大麥汁服之病雖愈服之勿置養胎者胎無病而調養之不使其損墮也凡胎始於腎天一生水也長於脾胃坤厚載物也保於肝經蓄血養胎也繫於命門少火生氣也白朮補脾胃以培土牡蠣澀精氣以壯水蜀椒溫脾胃而補命門使火土相生芎藭養肝氣以資精血使癸乙同歸一治是真能養胎者矣腹痛加芍藥安脾經而通壅也心痛加芎藭舒肝氣而行滯也心煩吐痛不能食飲加細辛散水逆以去內寒加半夏轉樞機以散逆氣也嘔服酸漿水味酸斂液入肝經也小麥解嘔入心經以安火經云諸逆衝上皆屬於火大麥解渴入心養胃使生血以潤津液也服之勿置指全方而言李瑋西曰前當歸散有黃芩胎熱者宜之此白朮散有蜀椒胎寒者宜之是皆可為養胎常服之劑婦人傷胎懷身腹滿不得小便從腰以下重如有水氣狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便微利則愈妊娠七月屬手太陰肺經養胎肺主氣肺虛則氣滯不利故腹滿且不能通調水道故不得小便腰以下重如有水氣狀而實非水也勞宮在手掌中厥陰心包絡相火之穴肺屬金心包絡氣實則火邪剋金故太陰當養不養刺瀉之則火不爍金而太陰安矣關元任脈穴名任主胞胎在臍下三寸小腸之募也刺瀉之以分理陰陽利小便也關元解見水氣病第十四篇千金云關元穴婦人刺之無子一云針之則落胎為女子蓄血之處也婦人産後病脈證治第二十一丹溪云産後當大補氣血為主雖有雜病以末治之又云産後一切病多是血虛皆不可發表此脫血者益氣為格言也本篇産後諸證有用承氣下之者有用枳實芍藥散通之者有下瘀血湯散之者至於竹皮大丸之用石膏白頭翁湯之用黃柏不幾太峻削乎然産後多阻於血瘀舊血不去則新血不生故血瘀而為脹滿血實而為閉結至若陰虛生內熱汗出喜中風經云邪之所湊其氣必虛留而不去其病為實故昔人云中工能補上工能瀉自非明醫見真學透何能借肅殺為陽春利轉圜以應變乎今世治産後者能補不能瀉元氣尚存養正則邪可自消若用瀉不用補刻削殆盡本實已先拔矣至有氣既虛而猶云行滯血已脫而尚欲消瘀以致草菅人命絶不悔咎者其亦可哀也夫問曰婦人新産有三病一者病痓二者病鬱冒三者大便難何謂也師曰新産血虛多汗出喜中風故令病痓亡血復汗寒多故令鬱冒亡津液胃燥故大便難經云陽氣者精則養神柔則養筋新産血虛多汗表虛亡陽故中風病痓此柔不能養筋也鬱冒産後血暈也經云諸乘寒者則為厥鬱冒不仁産後亡血復汗陰陽兩虛腠理不密表邪易入故為寒多令鬱冒此精不能養神也血與汗皆津液也液亡胃燥故大便難此氣血俱虛皆宜滋陰補陽固表潤里之劑主之産後鬱冒其脈微弱嘔不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之病解能食七八日更發熱者此為胃實大承氣湯主之小柴胡湯見嘔吐大承氣湯見腹滿産後鬱冒脈微弱者榮衛俱虛也嘔不能食胃氣未復也大便堅血燥也頭為諸陽之會但頭汗出者孤陽上出也內經云下虛則厥上虛則眩冒即眩也然前節云亡血復汗寒多故令鬱冒則已汗者不可再汗此不忌亡陽之患而云冒家欲解必大汗出者何也蓋前云寒多令鬱冒者乃汗時復受外感之寒非內寒也傷寒論云病自汗出者此為榮氣和以衛氣不共榮氣和諧故耳復發其汗榮衛和則愈此即因汗而致鬱冒復因汗出而鬱冒解之意也可見寒從外感者必因汗乃解若云內寒則經云病人有寒復發汗胃中冷必吐蛔豈有內寒者不急於溫中汗多者不令其固表而反欲其汗出乃解哉前云孤陽上出此何以雲陽氣獨盛蓋所謂孤陽者經云陰在內陽之守也今陰虛陽無所麗故為孤陽所謂陽氣獨盛者指衛氣為寒邪所束怫鬱在表不得發越乃衛中邪氣盛非正氣盛也以邪氣在表傷衛故即為陽氣惟邪氣盛故必汗出則邪從汗解陰陽乃復若果真陽氣盛安有復致鬱冒之理也大便堅嘔不能食者小柴胡湯和解之人參補虛柴胡解表黃芩清熱半夏散逆氣薑棗行津液七八日邪氣傳裡之時更發熱者此為胃實所謂陽明病蒸蒸發熱者是也大承氣湯下之然必在病解能食後方可慎用此湯設使病未解而不能食安可妄議下哉此産後汗下二法萬勿輕試也産後腹中㽲痛當歸生薑羊肉湯主之並治腹中寒疝虛勞不足方見寒疝産後腹痛乃去血過多虛寒證也當歸養血生薑散寒羊肉補虛經所謂精不足者補之以味故並治虛勞不足之病治寒疝者疝從寒生三味皆溫養氣血之藥也産後腹痛煩滿不得臥枳實芍藥散主之腹痛煩滿胃家實也經云胃不和則臥不安枳實芍藥散方枳實燒令黑勿太過芍藥各等分上二味杵為散服方寸匕日三服並主癰膿以麥粥下之枳實下氣寬腸燒黑則入血分芍藥安脾通壅能於土中瀉木使痛止滿消則臥安矣又芍藥泄邪熱枳實能壅瘀故並主癰膿下以麥粥者麥入心經諸痛癢瘡皆屬心火是也師曰産後腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血著臍下宜下瘀血湯主之亦主經水不利下瘀血湯方大黃三兩桃仁二十枚䗪蟲二十枚熬去足上三味末之煉蜜和為四丸以酒一升煎一丸取八合頓服之新血下如豚肝新血宜作瘀血大黃苦以瀉實桃仁苦以行瘀䗪蟲咸以走血亦主經水不利要惟血實者宜之血虛者忌服産後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則譫語至夜則愈宜大承氣湯主之熱在裡結在膀胱也此一節俱兩證在內一是太陽蓄血證一是陽明裡實證因古人文法錯綜故難辨也無太陽證謂無表證也少腹堅痛者以肝藏血少腹為肝經部分故血必結於此則堅痛亦在此此惡露不盡是為熱在裡結在膀胱此太陽蓄血證也宜下去瘀血經云蓄血者太陽隨經瘀熱在裡故也又云熱結膀胱其人如狂血自下者愈若不大便煩躁脈實譫語者陰陽裡實也經雲實則譫語再倍發熱者熱在裡而蒸蒸發於外也陽明旺於申酉戌日晡是陽明向旺時故煩躁不能食病在陽而不在陰故至夜則愈此陽明府病也宜大承氣湯以下胃實按經云陽明病不能食攻其熱必噦以胃中虛冷故也又云發熱者尤當先解表乃可攻之況在産後安可妄議攻下哉必認證果真方可用此産後風續之數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖久陽旦湯證續在耳可與陽旦湯陽旦湯即桂枝湯也産後氣血兩虛雖中風至十數日頭痛惡寒等表證不解者以原自汗出但宜解肌而不可發汗故與此湯産後中風發熱面正赤喘而頭痛竹葉湯主之發熱頭痛表證也面正赤而喘者風邪怫鬱於上未得汗解而氣逆也經云面色緣緣正赤者陽氣怫鬱在表當解之熏之若汗出不徹者煩躁不知痛處其人短氣喘即短氣之甚者但坐以汗出不徹故也故與竹葉湯於溫補中復令解表竹葉湯方竹葉一把人參一兩附子一枚炮桂枝一兩葛根三兩防風一兩桔梗一兩甘草一兩生薑五兩大棗十五枚上十味以水一斗煮取二升半分溫三服溫覆使汗出頸項強用大附子一枚破之如豆大煎藥揚去沫嘔者加半夏半升洗桂枝葛根防風為汗劑治發熱頭痛然産後氣血虛寒以人參補之附子溫之面赤者竹葉清之喘者桔梗苦以泄之甘草甘以緩之生薑大棗行津液以和之頸項強用附子驅在經之寒邪也嘔加半夏止邪氣之上逆也李升璽曰本篇首節云新産血虛多汗喜中風故令病痓此節中風雖未成痓而防其有作痓之漸故竹葉湯頗似小續命湯治痓加減之意樓氏曰産後喘極危多死也郭稽中曰産後榮血暴竭衛氣無主獨聚肺中故令喘也此名孤陽絶陰難治宜大料芎歸湯或獨參湯尤妙若惡露不快敗血停凝上熏於肺亦令喘急宜參蘇飲人參蘇木奪命丹附子半兩炮丹皮乾漆碎之煮令煙盡各一兩為細末好醋一升大黃末一兩同煮成膏和藥丸如桐子大溫酒吞五七丸此論足補仲景所未及婦人乳中虛煩亂咳逆安中益氣竹皮大丸主之乳新産時也産後陰虛生內熱故中虛而煩亂咳逆皆陰火攻衝所致法當安中則煩亂止益氣則咳逆降矣竹皮大丸方生竹茹二分白薇一分桂枝一分石膏二分甘草七分上五味末之棗肉和丸彈子大以飲服一丸日三服夜二服有熱者倍白薇煩喘者加柏實一分此産後虛熱證故用竹茹止咳逆石膏清煩亂桂枝通血脈而祛邪甘草補中虛以緩急白薇治風熱傷中淋露又煩與咳皆出於肺棗肉和九補脾土以生肺金也有熱倍白薇併力以驅風熱也柏實味甘緩辛散且入心養神入腎定志使心腎相交中虛煩亂自定矣故此方無補藥而云安中益氣者蓋以清熱祛邪為主夫邪氣去則正氣生矣故云益氣濟陰綱目云中虛不可用石膏煩亂不可用桂枝此方以甘草七分配衆藥六分又以棗肉為丸仍以一丸飲下可想其立方之微用藥之難審虛實之不易也仍飲服者尤慮夫虛虛之禍耳用是方者亦當深省徐之才曰白薇惡大棗而此以棗肉為丸蓋恐諸藥鹹寒傷脾胃也産後下利虛極白頭翁加甘草阿膠湯主之白頭翁加甘草阿膠湯方白頭翁二兩秦皮黃連柏皮各三兩甘草阿膠各二兩上六味以水七升煮取二升半納膠令消盡分溫三服血屬陰産後血虛下利則更傷陰分故為虛極也本湯原治厥陰熱利下重為苦以堅腎之劑今加甘草益脾阿膠養血以補虛生陰也李瑋西曰前節雲中虛此云下利虛極則竹皮大丸及此湯寒涼藥不虞其腹痛增劇乎自非仲景神明不可輕用婦人雜病脈證治第二十二本篇二十一節惟有八節旁及他病其餘十三篇俱論婦人經水不利半産漏下白帶失血之證今以經血論之經云女子七歲腎氣盛二七而天癸至任脈通太衝脈盛月事以時下天癸者天真之氣壬癸之水也然任主胞胎沖為血海二脈皆起於胞中流通不息經血漸盈上為乳汁下為月水三旬一見以象月盈則虧也東垣謂脾為生化之源心統諸經之血心脾平和則經侯如常或七情內傷六淫外侵飲食不節起居失宜脾胃虛損心火妄動則月經不調蓋血主於脾土故云脾統血也胎至三月而墜者乃中衝脈有傷中衝者即陽明胃經供應胎孕至此須節飲食絶欲戒怒庶免半産漏下之患赤白二帶嚴氏謂俱由勞傷衝任風冷據於胞絡蓋婦人平居血欲常多氣欲常少或氣倍於血氣滯生寒血不化赤遂成白帶若氣平血少生熱血不化紅遂成赤帶寒熱交併則赤白俱下保命集云赤者熱入小腸白者熱入大腸原其本皆濕熱結於帶脈故津液湧溢是謂赤白帶下因五經脈虛結熱屈滯於帶脈故女子臍下痛陰中綿綿而下也經云任脈為病男子內結七疝女子帶下瘕聚王注云任脈自胞上過帶脈貫臍上起於季脅章門穴回身一周似束帶然故病名帶下濕熱冤結不散也則婦人雜病之因可概見矣婦人中風七八日續來寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之方見嘔吐中風七八日表邪傳裡之時經水卻來表邪乘血室虛而入之與血相搏故血結不行經水適斷以致寒熱發作有時此血氣與邪分爭故如瘧狀而實非瘧也小柴胡湯解表裡寒熱之邪血室即衝脈所謂血海是也婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室治之無犯胃氣及上二焦必自愈胃府為陽血室為陰晝為陽暮為陰此晝日明瞭暮則譫語如見鬼狀者邪熱不入府而入血室搏陰而不搏陽故禁下藥傷胃氣也此雖熱入血室不似前血結寒熱故勿與小柴胡湯散邪發汗犯其上焦發汗則動衛氣衛氣出上焦且胸脅不滿不致如結胸狀故毋刺期門犯其中焦刺期門則動榮氣榮氣出中焦必自愈者以經行則熱隨血去邪熱自除矣婦人中風發熱惡寒經水適來得之七八日熱除脈遲身涼和胸脅滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之發熱惡寒中風表證也因經水適來血室空虛七八日邪氣傳裡之時乘虛入於血室熱除脈遲身涼邪氣內陷表證罷也胸脅滿胸脅者肝之部分如結胸譫語者熱入血室而裡實也期門穴在不容旁一寸五分上直乳第二肋端肝之募也肝藏血刺期門以瀉其實隨其實而瀉之即刺期門之意成注謂刺期門之外審看何經氣實更隨其實而瀉之者似多一轉語王三陽曰經水適斷則血尚未盡為邪熱相搏結之不行續得寒熱發作有時邪在半里半表故用小柴胡湯以散其邪若經水適來血虛甚矣邪氣入之熱除身涼胸滿譫語則邪盡入里里有實邪又難下故刺以瀉之許叔微曰或問熱入血室何為而成結胸也曰邪氣傳入經絡與正氣相搏上下流行或遇經水適來適斷邪氣乘虛入血室血為邪迫上入肝經肝受邪則譫語見鬼復入膻中解見百合病則血結於胸也蓋婦人平居水以養木血以養肝未受孕則下行為月水既孕則中蓄以養胎産後則上壅為乳皆此血也今邪氣蓄血並歸肝經聚於膻中結於乳下故手觸之則痛非湯劑可及故刺期門陽明病下血譫語者此為熱入血室但頭汗出當刺期門隨其實而瀉之濈然汗出則愈陽明經多氣多血熱入血室者血為熱迫故下血也譫語者猶太陽蓄血證之如狂善忘也經云陽明病法多汗今但頭汗者邪氣內結不能遍越周身但熏蒸於頭也刺期門以越其熱則血室之邪可泄而汗出愈矣或問病在陽明熱宜入府何反入於血室也曰內經云陽明者五臟六腑之海主潤宗筋衝脈者經脈之海衝脈即血室也主滲灌溪谷與陽明合於宗筋又難經云衝脈者起於氣衝並足陽明之經夾臍上行則陽明與衝脈其經氣原自相通故陽明有病得以熱入血室也婦人咽中如有炙臠半夏厚朴湯主之半夏厚朴湯方半夏一升厚朴三兩茯苓四兩生薑五兩干蘇葉二兩上五味以水七升煮取四升分溫四服日三夜一服婦人氣多鬱悶咽中如有炙臠諸郁阻塞氣道也半夏生薑散逆厚朴茯苓下氣蘇葉入肺經而宣正氣又為開鬱利氣之總司也婦人臟躁喜悲傷欲哭象如神靈所作數缺伸甘麥大棗湯主之甘草小麥大棗湯方甘草三兩小麥一升大棗十枚上三味以水六升煮取三升溫分三服亦補脾氣婦人臟躁指肺臟而言肺藏魄主優在聲為哭喜悲傷欲哭象如神靈所作此肺虛傷魄也數缺伸者肺主氣氣乏則缺呵缺也體疲則伸也甘草大棗俱入脾經而緩急故亦補脾土以生肺金又心藏神更佐小麥入心以安神也或問臟躁一證何以不病男子而獨病婦人答曰男子生於寅秉陽氣也女子生於申秉陰氣也故悲傷欲哭皆陰氣愁慘之狀且申屬金肺亦屬金同氣相求故不病男子而病婦人並不病他臟而獨病肺臟也婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之誕沫止乃治痞瀉心湯主之小青龍湯見肺癰瀉心湯見驚悸本經云水在肺吐涎沫此水飲上逆也心下痞者下後虛其中氣所謂氣虛中滿是也經云病發於陰而下之因有痞傷寒心下有水氣主小青龍湯散水行飲此病起於吐涎沫故先治吐以散水飲卻用瀉心湯治痞此治法之次第然也婦人之病因虛積冷結氣為諸經水斷絶至有歷年血寒積結胞門寒傷經絡凝結在上嘔吐涎唾久成肺癰形體損分在中盤結繞臍寒疝或兩脅疼痛與臟相連或結熱中痛在關元脈數無瘡肌若魚鱗時著男子非止女身在下來多經侯不勻冷陰掣痛少腹惡寒或引腰脊下根氣街氣衝急痛膝脛疼煩奄忽眩冒狀如厥癲或有憂慘悲傷多嗔此皆帶下非有鬼神久則羸瘦脈虛多寒三十六病千變萬端審脈陰陽虛實緊弦行其針藥治危得安其雖同病脈各異源子當辨記勿謂不然此節病以一虛字為主蓋因虛而至氣結因氣結而經血斷絶也故有氣結而為寒傷者有氣結而為熱中者有氣結而在上在中在下者其種種病證各循經絡按部分皆因虛而得之內經云邪之所湊其氣必虛是也在下來多如崩淋尖血之類氣衝即氣街陽明胃經穴名在曲骨旁三寸關元胞門見水氣病三十六病見篇首問曰婦人年五十所病下利數十日不止暮即發熱少腹裡急腹滿手掌煩熱唇口乾燥何也師曰此病屬帶下何以故曾經半産瘀血在少腹不去何以知之其證唇口乾燥故知之當以溫經湯主之婦人年五十則已過七七之期任脈虛太衝脈衰天癸竭地道不通時也所病下利據本文帶下觀之當是崩淋下血之證蓋血屬陰陰虛故發熱暮亦屬陰也任主胞胎沖為血海二脈皆起於胞宮而出於會陰正當少腹部分又衝脈俠臍上行故任衝脈虛則少腹裡急有乾血亦令腹滿內經云任脈為病女子帶下瘕聚是也手背為陽手掌為陰乃手三陰經過脈之處陰虛故掌中煩熱也陽明脈俠口環唇與衝脈會於氣街皆屬於帶脈難經云血主濡之以衝脈血阻不行則陽明津液衰少不能濡潤故唇口乾燥斷以病屬帶下以曾經半産少腹瘀血不去則津液不布新血不生此唇口乾燥之所由生邊李升璽曰婦人血虛津液不足者多致口乾血瘀津液不布者亦致口乾此際毫釐之辨須要諦審溫經湯方人參當歸芎藭芍藥牡丹皮阿膠各二兩麥門冬一升去心吳茱萸桂枝各二兩半夏半升甘草生薑各二兩上十二味以水一斗煮取三升分溫三服亦主婦人少腹寒久不受胎兼取崩中去血或月水來過多及至期不來內經云血氣者喜溫而惡寒寒則凝澀不流溫則消而去之此湯名溫經以瘀血得溫即行也方內皆補養氣血之藥未嘗以逐瘀為事而瘀血自去者此養正邪自消之法也故婦人崩淋不孕月事不調者並主之帶下經水不利少腹滿痛經一月再見者土瓜根散主之土瓜根散方土瓜根桂枝芍藥䗪蟲各三兩上四味杵為散每服方寸匙日三服陰㿗腫亦主之帶下少腹滿痛有時經水不利有時經一月再見行止遲速不調者皆瘀血為患也土瓜根破瘀血䗪蟲下血閉桂枝導氣行陽芍藥泄邪養陰則瘀血行而經自調矣陰㿗腫亦屬瘀血閉澀故並治之寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名曰革婦人則半産漏下旋覆花湯主釋義見虛勞旋覆花湯方旋覆花三兩蔥十四莖新絳少許上三味以水三升煮取一升頓服之血以養胎而實藉氣以生血所謂陽生則陰長也若氣虛則上逆不能下濟所謂不能納氣歸元是也血亦虛而下陷不能中守故致半産漏下蓋肺主天氣位高而氣下降旋覆花入肺經而降氣氣降則與血交氣血相生煦濡不絶胎可保矣蔥入陽明經以安胎蓋陽明即中衝脈為氣血之海主供應胎孕者也新絳者紅花染成用以引經活血然不竟用紅花而用紅花所染之新絳何也蓋桑乃箕星之精神農本經稱桑皮治五勞六極崩中絶脈補虛益氣蠶食其葉吐絲織絹紅花染成絳色絲有綿綿不絶之形絳有入心化赤之義蓋醫者意也以此治半産漏下欲使胎氣繼續無窮源源生血之妙所謂因其類相感而以意使之者也李瑋西曰此節本經凡三見意各不同前二篇兩引此者一主虛勞一主亡血本篇引此則專主半産漏下而言也須有分曉婦人陷經漏下黑不解膠薑湯主之方缺陷經漏下謂經脈下陷而血漏下不止乃氣不攝血也黑不解者瘀血不去則新血不生榮氣腐敗也然氣血喜溫惡寒用膠薑湯溫養氣血則氣盛血充推陳致新而經自調矣阿井通濟水用阿井水煮膠內經以濟水為天地之肝肝藏血屬風木故入肝治風證血證如神又幹姜本辛炮之則苦守而不移功能止血蓋血虛則熱熱則妄行姜炒黑則能引補血藥入陰分血得補則陰生熱退且黑為水色故血不妄行也此姜是炮姜婦人少腹滿如敦狀小便微難而不渴生後者此為水與血俱結在血室也大黃甘遂湯主之敦大貌少腹屬肝經肝藏血滿如敦狀水血俱結在此正當血室所在也小便微難者水與血阻之也不渴者非內熱也在生後見此證自宜水血並下以祛邪養正可也大黃甘遂湯方大黃四兩甘遂二兩阿膠二兩上三味以水三升煮取一升頓服之其血當下大黃下血甘遂逐水生後血虛恐藥力太猛更用阿膠以養血也婦人經水不利下抵當湯主之亦治男子膀胱滿急有瘀血者抵當湯方虻蟲三十枚熬去翅足水蛭二十個熬桃仁二十個去皮尖大黃三兩酒浸上四味為末以水五升煮取三升去渣溫服一升經水不利下有瘀血也血堅乾者虻蟲水蛭咸以軟之血閉澀者桃仁大黃苦以泄之婦人經水閉不利臟堅癖不止中有乾血下白物礬石丸主之礬石丸方礬石三分燒杏仁一分上二味末之煉蜜為丸如棗核大納臟中劇者再納之白物即白帶白淫白沃之類經閉臟堅濕熱下流津液漸脫故下白物礬石味酸澀燒之則性枯燥有澀以固脫燥可去濕之功所以止白物也然氣行則血行杏仁利氣以通乾血煉蜜為丸者和血潤燥便於納臟中也臟堅癖此臟指子宮言納臟中此臟指陰戶言婦人六十二種風及腹中血氣刺痛紅藍花酒主之內經云風者百病之長也又云風者善行而數變故婦人有六十二種風證蓋風有因外感者亦有從內生者如肝藏血肝虛則血燥內自生風所謂風氣通於肝也紅藍花色紅通行血脈又味辛以潤之能活血潤燥乃治風先養血血生風自滅之義酒煎以行血也又脾裹血其經入腹腹中刺痛乃血氣不利使然所謂通則不痛痛則不通也亦主此酒順氣行血刺痛止矣紅藍花酒方紅藍花一兩上一味以酒一大升煎減半頓服一半未止再服婦人腹中諸疾痛當歸芍藥散主之方見妊娠腹中諸疾痛此血虛腹痛也白朮固中氣利腰臍間血然心生血脾裹血肝藏血故用白芍入脾芎藭入肝當歸兼入心肝脾三經皆以養臟陰而益榮血茯苓澤瀉利腹中宿垢痞水以去舊生新也婦人腹中痛小建中湯主之此中氣不足而致腹痛也經云脾主中州灌溉四旁建者立也建中者建立脾氣也甘草膠飴大棗俱味甘入脾歸其所喜所謂脾欲緩急食甘以緩之是也芍藥入脾養陰配以甘草能安脾經而止腹痛桂枝生薑行陽散寒由是中州建立氣血通行而腹痛止矣問曰婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得溺也以胞系了戾故致此病但利小便則愈宜腎氣丸主之方見虛勞兩腎中間真火所聚名命門為女子系胞之處胞系了戾非真有糾纏趷𨃚之故只是命門火衰真陽氣絶有如了戾之象此坎水不溫不能熏蒸膀胱故不得氣化而出溺也腎與膀胱為表裡經云膀胱者津液藏焉氣化則能出矣飲食如故病不在胃也煩熱者不得溺而熱蓄於內也不得臥而倚息者一呼一吸為息倚息者呼吸短促氣不接續也內經云腎者水臟主臥與喘也又三不得臥臥則喘者是水氣之逆也蓋肺主氣通調水道為腎之上源今不得溺則下流壅塞肺氣不得下降故不得臥而倚息是宜利小便也方名腎氣丸者氣屬陽補腎中真陽之氣也內具六味丸壯腎水以資小便之源茯苓澤瀉俱利下便藥桂附益命門火以化膀胱之氣則熏蒸津液水道以通而小便自利此所以不用五苓散而用腎氣丸也或云此主孕婦而言蓋子宮即血室也一系在下上有兩岐一達於左一達於右又胞名紫河車其蒂起於兩腎中間著脊而生有一系繫於兒臍懸兒於胞中此通母之氣血遺蔭之道路也外是河車包裹內含漿水以養兒身今胞系了戾則胎氣逼迫下壓膀胱小便自不得出常見數孕婦胎至七八個月窘迫不得溺今收生婆以手探之略將胞胎拾起其溺沖手而下此其驗也果如此說則方內丹皮附子不懼傷胎氣者即內經妊娠用毒藥為有故無隕之義歟婦人陰寒溫中坐藥蛇床子散主之陰寒子宮不溫也必有血虛腹痛經行不利不成生育之患蛇床子味辛甘溫腎助陽起男子陰痿暖婦人子宮故可以溫中而為坐藥蛇床子散方蛇床子仁上一味末之以白粉少許和令相得如棗大綿裹內之自然溫白粉即米粉也少陰脈滑而數者陰中即生瘡陰中蝕瘡爛者狼牙湯洗之少陰屬腎陰中腎之竅也內經云滑者陰氣有餘又云數則為熱故陰中生瘡蝕爛皆濕熱所致狼牙味苦性寒寒能勝熱苦能殺蟲故主洗之狼牙湯方狼牙三兩上一味以水四升煮取半升以綿纏著如繭浸湯瀝陰中日四遍胃氣下泄陰吹而正喧此穀氣之實也膏發煎導之方見黃疸陰吹者胃氣自陰中吹出也正喧者陰吹之聲喧響不已也蓋胃以納穀穀氣太實急切不得從大便轉出反從前陰竅中下泄此倒行逆施之病也豬膏滑潤腸胃亂髮通瘀行滯且肺合皮毛與大腸為表裡則毛髮屬肺所主其氣直走大腸導字妙謂引導穀氣反其故道仍從大便中轉出則胃氣自不從前陰吹喧矣雜療方第二十三內經一書但詳受病之理未及治病之方以理周萬變而方守一隅其意有未盡也雜療方一篇有治方無病因虛實未窮寒熱罕究或於醫理未及詳歟不知因病立方因方用藥昔神農嘗百草列三品已創為醫方之祖矣嗣後有十劑以統之豈非醫方之大要歟故論理以推乎方之所宜立方以准乎理之必用君臣佐使方之制也奇偶重復方之意也內經雖未盡治病之方而治鼓脹以雞矢醴治血枯以烏鰂骨一藘茹丸以雀卵飲以鮑魚汁亦方也治陽厥以生鐵洛治酒風以澤瀉術各十分糜御五分亦方也然則雜療方一篇仲景蓋酌乎病情之最深而備內經之遺意者歟三物備急方大黃一兩乾薑一兩巴豆一兩去皮心熬外研如脂用藥各須精新先搗大黃乾薑為末研巴豆內中合治一千杵用為散蜜和丸亦佳密器中貯之勿令泄主心腹諸卒暴百病若中惡客忤心腹脹滿卒痛如錐刺氣急口噤停尸卒死者以暖水若酒服大豆許三四丸或不下棒頭起灌令下咽須臾當差如未差更與三丸當腹中鳴即吐下便差若口噤亦須折齒灌之人猝然得病欲死者皆感毒癘不正之氣而然三物能溫中正氣蕩滌邪穢或吐或下使邪氣上下分消誠足備一時急需也退五臟虛熱四時加減柴胡飲子方冬三月加柴胡八分白朮八分大腹檳榔四枚並皮子用桔梗七分陳皮五分生薑五分春三月加枳實減白朮共六味夏三月加生薑三分枳實五分甘草八分共八味秋三月加陳皮三分共六味上各㕮咀分為三帖一帖以水三升煮取二升分溫三服如人行四五里進一服如四體壅添甘草少許每帖分作三小帖每小帖以水一升煮取七合溫服再合渣為一服重煮都成四服人無四時一定之病安得有四時一定之方此後人附會之論非仲景神明之制也既屬虛熱用檳榔枳實何為自屬僞方無疑長服訶梨勒丸方訶梨勒厚朴陳皮各三兩上三味末之煉蜜丸如桐子大酒飲服二十丸加至三十丸訶梨勒性嗇厚朴破氣安可長服乎此亦僞方也排膿散方枳實十六枚芍藥六分枯梗二分上三味杵為散取雞子黃一枚以藥散與雞黃相等揉和令相得飲和服之日一服排膿湯方桔梗三兩甘草二兩生薑一兩大棗十枚上四味以水三升煮取一升溫服五合日再服以此二方排膿非要藥方非仲景方也治傷寒令愈不復紫石寒石散方紫石英白石英赤石脂鍾乳碓煉栝蔞根防風桔梗文蛤鬼臼各十分附子炮去皮乾薑桂枝去皮各四兩太一餘糧十分燒上十三味杵為散酒服方寸匕仲景治傷寒三百九十七法一百十三方神而明之纖悉具備矣令愈不復不過養正祛邪使元氣自足何必用此等藥以立異乎自屬僞方無疑救卒死方薤搗汁灌鼻中陰邪客氣閉塞關竅則猝然而死薤味辛而屬陽可闢陰邪通陽氣然必搗汁灌鼻中者以天氣通於肺肺主氣鼻為肺竅可呼吸使外邪自鼻而進者仍令從鼻而出也又方雄雞冠割取血管吹內鼻中豬脂如雞子大苦酒一升煮沸灌喉中雞肝及血塗面上以灰圍四旁立起大豆二七粒以雞子白並酒和盡以吞之雄雞屬陽冠在頂上而赤得離火正陽之色取血納鼻中以闢客忤不正之氣豬脂滑竅而助胃氣苦酒醋也煮沸則香氣撲鼻灌之可斂正祛邪觀令人闢除不詳用炭燒紅傾醋入內熏鼻爽氣快然名為打醋炭者可見雞於卦為巽及肝俱屬風木氣化面為諸陽之會此猝死者因中虛邪賊風使然取屬風木之雞肝及血塗面上以回陽氣闢不詳內經云風氣通於肝猶病風殭蠶反能祛風也灰圍四旁立起得暖氣以固衛氣也本草云大豆主殺鬼毒下瘀血散五臟結積內寒日華子云雞子鎮心止驚安五臟卵白能破留血和酒吞之所以通暢陽氣而散邪氣也救卒死而壯熱者方礬石半斤以水一斗半煮消以漬腳令沒踝壯熱者陽氣盡散於外也礬石性味酸澀可收既散之元陽漬腳沒踝腳孤拐骨外踝足三陽經脈所過內踝足三陰經脈所過欲以斂陰陽之氣也且腎經湧泉穴在足心漬之又以固先天生氣之原也或云厥陽獨行故卒死而壯熱救卒死而目閉者方騎牛臨面搗薤汁灌耳中吹皂莢末鼻中立效卒死目閉氣將絶也內經云腎開竅於耳又云心開竅於耳薤汁灌耳中開心竅也皂莢末吹鼻中開肺竅也心藏神肺藏魄騎牛臨死者之面欲使牛口鼻之氣以吹噓之也牛得神順之氣救卒死而張口反折者方灸手足兩爪後十四壯了飲以五毒諸膏散方缺脾開竅於口張口脾氣絶也太陽經行身之背反折陽氣脫也手足兩爪後當是兩手足爪後人十二經脈各相接於手足十指尖此為井穴難經云所出為井是也灸之以接陰陽之氣救卒死而四肢不收失便者方馬屎一升水三斗煮取二斗以洗之又取牛洞稀糞一升溫酒灌口中灸心下一寸臍上三寸臍下四寸各一百狀差四肢者諸陽之本四肢不收陽脫也二便者足少陰所主失便陰脫也牛馬糞皆能解毒然馬稟乾健之氣而屬陽牛稟坤順之氣而屬陰兼取二糞洗之灌之欲以調和陰陽之義也心下一寸巨闕穴也臍上三寸建里穴也臍下四寸中極穴也各灸之以回陽氣救小兒卒死而吐利不知是何病方狗屎一丸絞取汁以灌之無濕者水煮乾者取汁小兒吐利卒死胃氣虛寒極矣狗性熱其屎出於胃中而亦熱取汁灌之以溫胃氣小兒疳蟲蝕齒方雄黃葶藶上二味末之取臘日豬脂熔以槐枝綿裹頭四五枚點藥烙之腎主骨齒者骨之餘然手足陽明經脈入上下齒中小兒胃中有熱則成疳病生蟲而齒斷蝕爛雄黃辛以散之葶藶苦以泄之皆能殺蟲敗毒豬脂取其潤澤槐乃虛星之精槐枝亦能殺蟲尸蹶脈動而無氣氣閉不通故靜而死也治方菖蒲屑內鼻兩孔中吹之令人以桂屑著舌下氣閉不通而死氣逆也菖蒲屑氣味辛溫吹鼻孔以通肺竅心藏神開竅於舌桂心入心經著舌下以通心竅尸蹶解見上經首篇又方剃取左角發方寸燒末酒和灌令入喉立起尸蹶氣血不通陰陽俱絶發者血之餘氣味苦溫能消瘀血治關格不通燒末酒和服以利陰血也左角屬陽剃取左角發以行陽氣也內經云邪客手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡皆竭令人身脈皆動而形無知其狀若尸蹶治法以竹管吹其兩耳剃其左角之發方一寸燔治飲以美酒一杯不能飲者灌之立已仲景亦祖此意也救卒死客忤死還魂湯主之方麻黃三兩去節杏仁七十個去皮尖甘草一兩炙上三味以水八升煮取三升去渣分令咽之通治諸感忤客忤者外感邪氣與正氣相觸犯如客之外至者然也麻黃宣氣於外杏仁利氣於內甘草緩中補虛則氣順而魂自還矣和劑治暴嗽喘急鼻塞痰壅者行三拗湯麻黃不去節杏仁不去尖甘草不炙亦祖此方而制之者也又方韭根一把烏梅二七個吳茱萸半升炒上三味以水一斗煮之以病人櫛內中令沸櫛浮者生沉者死煮取三升去渣分飲之韭根辛以行陽吳茱溫以祛陰烏梅酸以斂液又櫛以理髮取疏通陽氣之義病人櫛則病人平日之氣血皆附於此煮櫛浮者生陽和於上沉者死陰絶於下也以此預占休咎誠驗救自縊死旦至暮雖已冷必可治暮至旦小難也恐此當言忿氣盛故也然夏時夜短於晝又熱猶應可治又云心下若微溫者一日已上猶可治之方徐徐抱解不得截繩上下安被臥之一人以腳踏其兩肩手少挽其發常弦急也弦勿縱之一人以手按據胸上陽受氣於胸中數動之一人摩捋臂脛屈伸之四肢為諸陽之本若已僵但漸漸強屈之並按其腹陽明經下過腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦弗若勞之須臾可少桂湯及粥清含之令濡喉漸漸能咽及稍止更令兩人以兩管吹其兩耳朵好此法最善無不活者縊死者氣閉而絶也故摩按屈伸之以導引陽氣凡中暍死不可使得冷得冷便死療之方屈草帶繞暍人臍使三兩人溺其中令溫亦可用熱泥和屈草亦可扣瓦碗底按及車缸以著暍人取令溺須得流去此謂道路窮卒無湯當令溺其中欲使多人溺取令溫若湯便可與之不可泥及車缸恐此物冷暍既在夏月得熱泥土暖車缸亦可用也中暍得冷便死不特冷熱格拒為患且夏月伏陰在內故也救溺死方取灶中灰二石余以埋人從頭至足水出七孔即活灶灰得火土相生之氣以埋人則外溫衛氣而內滲水濕故能使水出七孔而活治馬墜及一切筋骨損方大黃一兩切浸湯成下緋帛如手大燒灰亂髮如雞子大燒灰用桃仁四十九個去皮尖熬敗蒲一握三寸甘草如中指節炙銼久用炊單布一尺燒灰上七味以童子小便量多少煎成湯納酒一大盞次下大黃去渣分溫三服先銼敗蒲席半領煎湯浴衣被蓋覆斯須通利數行痛楚立差利及浴水赤勿怪即瘀血也凡墜損筋骨者皆以瘀血為患方內俱逐瘀行血之藥服之以行血於內先煎敗蒲席湯浴以散血於外也唐本注云敗蒲席人臥之以得人氣為佳主破血撲墜損瘀在腹刺痛禽獸魚蟲禁忌並治第二十四世人但知得食則生弗得則死而不知有宜食則生不宜食則死者人蓋未之察也今以禽獸魚蟲考之周制設官分職有庖人醢人獸人以供祭祀賓客燕饗之用則食味不綦重乎禮云春宜羔豚膳膏薌夏宜䱟鱐膳膏臊秋宜犢麛膳膏腥冬宜鮮羽膳膏羶則四時各有其宜矣素問云東方食魚嗜咸民皆黑色疏理西方華食脂肥病生於內北方乳食臟寒生滿病南方嗜酸食胕腐同民病攣痹中央食雜不勞民病痿厥寒熱則五方各有其弊矣又況鮫魚之皮還消鱠積石首之鯗能免熱中此食之而利也膏粱之變足生大丁甘脆肥濃腐腸之藥此食之而害也故易理最為精微而其顯然垂戒者曰君子以慎言語節飲食蓋言語口所出也飲食口所入也一出一入之際唯口是司則口之於味不可不謹也明矣凡飲食滋味以養於身食之有妨反能為害自非服藥煉液焉能不飲食乎切見時人不閒調攝疾疢競起若不因食而生苟全其生須知切忌者矣所食之味有與病相宜有與身為害若得宜則益體害則成疾以此致危例皆難療凡煮藥飲汁以解毒者雖云救急不可熱飲諸毒病得熱更甚宜冷飲之肝病禁辛心病禁咸脾病禁酸肺病禁苦腎病禁甘肝病屬木辛味屬金金剋木也心病屬火鹹味屬水水剋火也脾病屬土酸味屬木木剋土也肺病屬金苦味屬火火剋金也腎病屬水甘味屬土土剋水也故皆在所禁春不食肝夏不食心秋不食肺冬不食腎四季不食脾辨曰春不食肝者為肝氣王脾氣敗若食肝則又補肝脾氣敗尤甚不可救又肝王之時不可以死氣入肝恐復魂也若非王時即虛以肝補之佳餘臟准此王去聲非王時即虛以肝補之指夏秋而言蓋夏月木生火是肝泄氣之時秋月金剋木是肝受制之時也凡肝臟自不可輕啖自死者彌甚獸臨殺時驚氣入心絶氣歸肝故不可輕啖自死者必中毒也凡心皆為神識所舍勿食之使人來生復其對報矣人物雖殊其貪生怖死之心一也既食其肉何忍復食其心古仁人尚有不忍食菜心者況有神識之動物乎凡肉及肝落地不著塵土者不可食之豬肉落水浮者不可食之諸肉不幹火炙而動見水自動者不可食之六畜肉熱血不斷者不可食之諸五臟及魚投地塵土不汙者不可食之五者皆怪誕不經必有毒故也諸肉及魚若狗不食鳥不啄者不可食之鳥獸不食自應有毒肉中有如朱點者不可食朱點惡血所聚此色惡不食也父母及身本命肉食之令人神魂不安此以十二支所屬言惡其同一生肖也食肥肉及熱羹不得飲冷水冷熱相搏心致腹痛吐利穢飯餒肉臭魚食之皆傷人此臭惡不食也自死肉口閉者不可食之物中毒自死閉口則毒不得出故戒食六畜自死皆疫死則有毒不可食之獸自死北首及伏地者食之殺人首音狩面所向曰首北殺方也如柏葉感兌金之氣則生而西向獸感殺厲之氣則自死北向及死不僵仆而伏地者亦感瘟疫之氣使然故食之殺人食生肉飽飲乳變成白蟲肉豈可生食乳酪性多濕熱邊鄙人常食之以濕熱生蟲也疫死牛肉食之令病洞下亦致堅積宜利藥下之毒肉留於胃中自宜下去為安脯藏米甕中有毒及經夏食之發腎病米甕有濕熱鬱蒸之氣脯藏其中自能致毒及經夏則脯已腐敗矣難經云腎色黑其臭腐以腐氣入腎故食之發腎病治自死六畜肉中毒方黃柏屑搗服方寸匕瘟疫多濕熱之氣六畜感之而自死黃柏氣味苦寒寒勝熱苦燥濕故解其毒治食鬱肉漏脯中毒方燒犬屎酒服方寸匕每服人乳汁亦良飲生韭汁三升亦得郁肉密器蓋藏隔宿者漏脯茅屋漏下沾著者犬屎溫中燒之則從火化而可生胃土人乳性味甘平韭汁辛溫去穢三物皆能解毒治黍米中藏干脯食之中毒方大豆濃煮汁飲數升即解亦治貍肉漏脯等毒脯藏黍米中其濕熱之氣皆足鬱蒸致毒大豆解毒散五臟結積故也治食生肉中毒方掘地深三尺取其下土三升以水五升煮數沸澄清汁飲一升即愈毒氣暴發唯甘味可以緩之土性緩書云土爰稼穡作甘故可解毒又萬物生於土亦莫不復歸於土得土氣則毒氣已悉化矣三尺已上穢土也三尺已下則得真土而純乎土性矣故煮汁飲之可以解毒治食六畜鳥獸肝中毒方水浸豆豉絞取汁服數升愈毒物入胃難以復出豆豉味苦蒸罯所成其性上越能吐得吐則毒已解矣馬腳無夜眼者不可食之夜眼在馬兩前足膝上馬有此能夜行無此者惡其形不全故勿食之夜眼一名附蟬尸食駿馬肉不飲酒則殺人駿馬肉壯健難於消化不飲酒不足以運脾氣也食療云食馬肉毒發心悶者飲清酒則解飲濁酒則加按秦繆公亡馬見有盜而食之者公曰此駁馬肉也食之不飲酒者死即飲之酒後食馬者力解公之圍此見韓非子然彼云駁馬非駿馬也姑志之以為同類之證馬之良者曰駿毛色不純曰駁馬肉不可熱食傷人心心屬午為少陰君火馬為午獸亦屬火心惡熱又熱食之火氣太盛故傷心馬鞍下肉食之殺人馬鞍下肉不透風氣其汗流濕漬皆能積腐成毒故食之殺人白馬黑頭者不可食之食療云食令人癲白馬青蹄者不可食之虎鈐經曰白馬青蹄皆馬毛之利害者騎之不利人食之必取害也馬肉㹠肉共食醉飽臥大忌馬火畜㹠水畜水火剋制物性相反故戒共食且醉飽臥則脾氣又不運動故忌驢馬肉合豬肉食之成霍亂諸肉雜食則難消化內經云飲食自倍腸胃乃傷故成霍亂馬肝及毛不可妄食中毒害人漢武帝云食馬毋食馬肝未為不知味也又漢史文成食馬肝而死蓋馬為火畜肝屬木臟木能生火火氣盛則木氣泄故馬有肝無膽而木臟不足其肝有毒也毛字誤治馬肝毒中人未死方雄鼠屎二七粒末之水和服日再服馬食鼠屎則腹脹是鼠能制馬也蓋鼠屬子水馬屬午火子午相沖水能剋火物性相制然也馬肝一名懸熢兩頭尖者是雄鼠屎又方人垢取方寸匕服之佳梅師方治馬肝殺人取頭垢一分熟水調下此人垢當即頭垢也日華子云溫治中盅毒及菌毒米飲或酒化下並得以吐為佳治食馬肉中毒欲死方香豉二兩杏仁三兩上二味蒸一食頃熟杵之服日再服香豉乃黑豆所制日華子云黑豆調中下氣治牛馬瘟毒杏仁下氣氣下則毒亦解矣又方煮蘆根汁飲之良聖惠方蘆根主解馬肉毒疫死牛或目赤或黃食之大忌牛疫死者其濕熱之毒未散故目或赤或黃也牛肉共豬肉食之必作寸白蟲牛肉粗厲難化豬肉肥濃生痰積成濕熱便能生蟲青牛腸不可合犬肉食之犬肉大熱與牛腸合食則熱性但積腸中不散故戒之青牛水牛也牛肺從三月至五月其中有蟲如馬尾割去勿食食之損人凡蟲類俱感濕熱之氣而生三月至五月正濕熱交蒸之時牛食青草胃多濕熱醞釀生蟲上入肺竅也牛羊豬肉皆不得以楮木桑木蒸炙食之令人腹內生蟲桑乃箕星之精古人煉藥多用桑柴火楮實子能健脾消水則楮木亦可燒用何以蒸炙牛羊豬肉食之即生蟲乎此必物性相反有如此者啖蛇牛肉殺人何以識之啖蛇者毛髮向後順者是也陳藏器云黃牛獨肝者有大毒食之痢血至死北人牛瘦多以蛇從鼻中灌之則為獨肝也水牛則無之治啖蛇牛肉食之欲死方飲人乳汁一升立愈以泔水洗頭飲一升愈牛肚細切水一斗煮取一升暖飲之大汗出愈人乳汁甘平能解獨肝牛肉毒頭垢水能吐毒牛肚即牛胃也人胃中受牛肉毒即以牛胃汁暖飲之取其同類相感之意令汗大出愈毒從毛竅中出也治食牛肉中毒方甘草煮汁飲之即愈甘草味甘解毒羊肉其有宿熱者不可食之羊食毒草其肉雖溫補亦能發病故有宿熱者忌食羊肉不可共生魚酪食之害人魚鮓生則傷胃乳酪濕熱滯脾羊肉又味重發病之物故共食害人羊蹄甲中有珠子白者名羊懸筋食之令人癲其形不類也白羊黑頭食其腦作腸癰白羊黑頭其頭異者腦必有毒以腦在頭內故也羊肝共生椒食之破人五臟羊肝屬木生風生椒辛熱助火共食則風火相煽故破五臟豬肉共羊肝和食之令人心悶羊肝木藏也性宜疏散豬肉滯氣生痰性與相反故共食之心悶豬肉以生胡荽同食爛人臍胡荽芳香通竅然不可生食豬肉滯氣生痰二物性自相反同食爛臍者以胡荽入脾脾經入腹故也豬脂不可合梅子食之豬脂滑利梅子酸澀性與相反也豬肉和葵食之少氣本草云豬肉味苦主閉血脈弱筋骨久食令人虛肥葵葉為百菜主其心傷人衍義云葵苗性滑利不益人故其食則少氣鹿肉不可合蒲白作羹食之發惡瘡鹿肉性熱蒲白當是蒲筍性與相反故也麋脂及梅李子若妊婦食之令子青盲男子傷精人目以陰為體以陽為用糜陰獸也梅李子味酸苦亦屬陰類妊婦三物合食則陰氣太盛而消沮閉藏者多陽氣絶無而光明開發者少故令子青盲也男子精氣宜溫暖陰勝則精寒本經云陰寒精自出本草云麋脂令陰痿此傷精之驗也按麋蹄下有二竅為夜目淮南子云孕婦見麋而四目亦物性相感然也麋肉不可合蝦及生菜梅李果食之傷人此皆物性相反也痼疾人不可食熊肉令終身不愈熊性猛悍故食之發痼疾白犬自死不出舌者食之害人犬死必吐舌若中毒自死者舌不出則毒亦不散故忌食狗鼠余令人發瘻瘡狗鼠所食余物其涎有毒瘻瘡生兩頸旁內經云陷脈為瘻留連肉腠又古有鼠瘻蟻瘻之名言其腐爛處孔竅甚多若鼠蟻所穿之穴也治食犬肉不消心下堅或腹脹口乾大渴心急發熱妄語如狂或洞下方杏仁一升合皮熟研用以沸湯三升和取汁分三服利下肉片大驗杏仁利氣氣利則毒解且犬肉畏杏仁故也婦人妊娠不可食兔肉山羊肉及鱉雞鴨令子無聲音按妊娠食兔肉令子缺唇食鱉肉令子短項無聲音食犬肉亦令子無聲音若羊雞鴨妊娠頗常食之子亦無恙或不必過拘也兔肉不可合白雞肉食之令人面發黃兔卯獸也雞酉禽也白雞又純乎金色此卯酉相沖故合食則動脾氣而發黃兔肉著乾薑食之成霍亂兔肉酸寒乾薑辛熱寒熱相搏性既不調酸收辛散味又相反故合食成霍亂凡烏自死口不開翅下合者不可食之鳥死必開口斂翅此有毒故口閉翅張諸禽肉肝青者食之殺人有毒故肝青也雞有六翮四距者不可食之其形怪者有毒距雞腳爪也烏雞白頭者不可食之其色異者有毒雞不可合葫蒜食之滯氣雞及葫蒜皆能生濕戀痰合食滯氣風痰壅也山雞不可合鳥獸肉食之山雞即鸐雞也似雉尾長三四尺自受其尾不入叢林雨雪則岩伏木棲不敢下食往往餓死雉居原野鸐居山岩故名山雞性食蟲蟻而肉有毒與鳥獸肉相反故戒合食雉肉久食令人瘦雞屬木雉屬火故雞炙則冠變雉炙則冠紅明其性屬火也火氣消鑠萬物故久食令人瘦又其肉味酸酸則性主收斂故亦令人瘦且春夏不可食為其食蟲蟻及與蛇交變化有毒也鴨卵不可合鱉肉食之雀肉不可合李子食之皆物性相反故也婦人妊娠食雀肉飲酒令子淫亂無恥周書云季秋雀入大水為蛤雀不入水國多淫泆以雀性最淫物理相感如此酒又助人淫興故妊娠忌之燕肉勿食入水為蛟龍所啖燕名遊波能召龍祈雨雷公云海竭江枯投遊波而立泛以蛟龍嗜燕故也鳥獸有中毒箭死者其肉有毒解之方大豆煮汁及鹽汁服之解箭藥有射岡毒射岡即烏頭熬成者大豆汁能解烏頭毒鹽味鹹走血則毒亦解魚頭正白如連珠至脊上食之殺人魚頭中無腮者不可食之殺人魚無腸膽者不可食之三年陰不起女子絶生魚頭似有角者不可食之魚目合者不可食之以上俱形怪必有毒也六甲日勿食鱗甲之物六甲日皆有神主之甲子神名孔琳甲戍神名丘梁甲申神名凌成甲午神名費陽甲辰神名王屋甲寅神名許成勿食鱗甲之屬避其形與名之近似也魚不可合雞肉食之內經云魚者使人熱中蓋魚在水中無一息之停是雖水畜而性反屬火雞屬巽木而每能生風合食則風火相熾故戒之魚不得合鸕鷀肉食之鸕鷀能入水取魚凡魚骨梗者密念鸕鷀不已即下以二物相制而相犯也故戒合食鸕鷀俗名摸魚公鯉魚鮓不得合小豆藿食之其子不可合豬肝食之害人鯉魚不可合犬肉食之鯽魚不可合猴雉肉食之一云不可合豬肝食鯷魚合鹿肉生食令人筋甲縮青魚鮓不可合胡荽及生葵並麥醬食之鰌鱔不可合白犬血食之龜肉不可合酒果子食之以上七節皆物性相反故也鱉目凹陷者及靨下有王字形者不可食之其肉不得合雞鴨子食之靨下當是腹下鱉無耳以目為聽純雌無雄與蛇及黿為匹目凹陷及腹下有王字形者皆有毒或蛇所化也性與雞鴨於相反在山上者有毒殺人龜鱉肉不可合莧菜食之合食則腹生鱉瘕蝦無須及腹中通黑煮之反白者不可食之形色俱異必有毒也食膾飲乳酪令人腹中生蟲為瘕膾系生魚乳酪性多濕熱故合飲食則生蟲瘕膾食之在心胸間不化吐復不出速下除之久成癥病治之方橘皮一兩大黃二兩朴消二兩上三味以水一大升煮至小升頓服即消大黃苦以泄滯朴消咸以軟堅橘皮解魚毒也食膾多不消結為癥病治之方馬鞭草一味搗汁飲之或以姜葉汁飲之一升亦消又可服吐藥吐之馬鞭草苦寒主癥癖血瘕破血殺蟲姜通神明去穢惡故其葉亦解毒食魚後食毒兩種煩亂治之方橘皮濃煎汁服之即解橘皮辛散而利氣故能解毒食鯸鮧魚中毒方蘆根煮汁服之即解按鯸鮧河豚魚也狀如蝌抖凡魚類目皆不瞑而河豚目能開閉觸物即怒腹脹浮於水上為鴉鴿所食率以三頭相從為一部其腹腴呼為西施乳腹無膽頭無腮身無鱗其肝毒殺人吳人言血有毒脂令舌麻子令腹脹水浸其子一夜大如芡實眼令目花故有油麻子脹眼睛花之語煮忌煤治落釜中蘆根能解鯸鮧毒蟹目相向足斑目赤者不可食之形異故有毒食蟹中毒治之方紫蘇煮汁飲之三升紫蘇子搗汁飲之亦良冬瓜汁飲二升食冬瓜亦可紫蘇冬瓜俱解魚蟹毒凡蟹未遇霜多毒其熟者乃可食之蟹有毒見霧則死經霜降肅殺之氣其毒始解陶隱居曰未被霜者食水莨菪故有毒蜘蛛落食中有毒勿食之恐食中有蜘蛛絲網糞溺故也凡蜂蠅蟲蟻等多集食上食之致瘻蟲類皆穢汙有毒食之致瘻者瘻生兩頸旁正當陽明胃經人迎動脈處以食入於胃故也解義又見本篇前節果實菜谷禁忌並治第二十五內經云天食人以五氣地食人以五味果實菜谷皆地産也又經云五穀為養稻黍稷麥菽五果為助李杏桃棗栗五菜為充韭薤葵蔥藿是以草實曰蓏音裸木實曰果又無核曰蓏有核曰果禮云棗曰新之栗曰撰之撰音選桃曰膽之謂去其毛也柤梨曰攢之柤音查攢曰瓚則治果實有法矣烹葵斷壺瓠也紀平豳風芥醬芼羹以養父母則用五菜有道矣牛宜稌音杜羊宜黍豕宜稷犬宜梁雁宜麥則配五各有方矣然其物有不宜常食者有不宜合食者經云陰之所生本在五味陰之五宮傷在五味人安可不知所禁忌乎果子生食生蟲陽明胃經主肌肉而稟濕熱之性果子性多濕熱而有毒生食之入胃則肌肉生瘡也果子落地經宿蟲蟻食之者人大忌食之蟲蟻有毒故也生米停留多日有損處食之傷人蟲鼠所齧之餘則有損處亦有毒傷人桃子多食令人熱仍不得入水浴令人病寒熱淋瀝病桃子性熱故多食生熱其味酸酸主收斂入水浴則濕與熱並不得宣散故外為寒熱內成淋瀝杏酪不熟殺人杏酸熱有小毒杏酪不熟釀之不得法也梅多食壞人齒衍義云食梅則津液泄水生木也經云味過於酸肝氣以津津液泄故傷齒以腎主液而合骨齒者骨之餘也食梅齒齼以胡桃嚼之李時珍曰梅花開於冬而實熟於夏得木之全氣故味酸所謂木曲直作酸也肝為乙木膽為甲木人舌下有四竅其兩竅通膽液食梅則津生者類相感應也李不可多食令人臚脹李味酸澀能使脾氣不運而中焦壅滯故多食則臚脹臚腹也林檎不可多食令人百脈弱百脈宜宣通不宜壅滯林檎味酸澀多食則百脈滯而不行故脈弱橘柚多食令人口爽不知五味尚書注小曰橘大曰柚郭璞云柚似橙而大於橘蓋脾主味開竅於口橘柚味酸泄液故令口爽然不知五味梨不可多食令人寒中金瘡産婦亦不宜食金瘡産婦氣血皆宜溫和梨性寒中自宜戒食櫻桃杏多食傷筋骨肝合筋腎合骨櫻桃杏皆味酸內經云酸傷筋而亦傷骨者子能令母虛水生木肝是腎之子且肝腎同歸一治也安石榴不可多食損人肺肺主氣氣宜利而不宜澀石榴味酸澀滯氣故損肺胡桃不可多食令人動痰飲衍義云胡桃性熱發風風熱在胃痰飲自生生棗多食令人熱渴氣脹寒熱羸瘦者彌不可食傷人棗性熱故令熱渴味甘故令氣脹經云甘者令人中滿滯氣故令寒熱又脾主肌肉肌肉羸瘦者彌不可食內經所謂甘走肉肉病無多食甘是也食諸果中毒治之方豬骨燒過上一味末之水服方寸匕亦治馬肝漏脯等毒以豬骨治果子毒物性相制使然治馬肝毒者以豬水畜馬火畜水可剋火也治漏脯毒者亦骨肉相感之義木耳赤色及仰生者勿食菌仰卷及色赤者不可食菌菌也形色皆異者必有毒也木耳菌皆覆卷食諸菌中毒悶亂欲死治之方人糞汁飲一升土漿飲一二升大豆濃煮汁飲之服諸吐利藥並解悶亂欲死毒氣在胃也人糞土漿大豆俱解其毒服吐利藥並解使毒氣上下分消也食楓樹菌而笑不止治之以前方心主笑笑不止毒氣入心也誤食野芋煩亂欲死治之以前方煩出於肺煩亂欲死毒氣入肺也山東名野芋根為魁芋種芋三年不收亦成野芋殺人蜀椒閉口者有毒誤食之戟人咽喉氣病欲絶或吐下白沫身體痹冷急治之方肉桂煮汁飲之多飲冷水一二升或食蒜或飲地漿或濃煮豉汁飲之並解蜀椒氣味辛熱有毒閉口者其毒更包藏不散桂與蒜皆大辛大熱之物能通血脈辟邪去穢以熱攻熱從治之義也冷水以清涼解之地漿得土氣以萬物本乎土亦莫不復歸於土見大則毒已化矣飲鼓汁以吐會其毒正月勿食蔥令人面生遊風蔥味辛散入陽明經陽明循頭面正月陽氣未舒食蔥過於發散故面生遊風二月勿食蓼傷人腎文選云習蓼蟲之忘辛是物莫辛於蓼也二月卯木主令水能生木正腎水泄氣之時以腎主閉藏蓼味辛散故傷腎也三月勿食小蒜傷人志性蒜性辛熱辛走氣熱傷氣三月陽氣已盛又食此辛熱之物以助之則陽過盛而傷陰經云腎藏精與志傷志性即傷腎之義四月八月勿食胡荽傷人神四月陽氣盛極八月陰氣將斂胡荽辛溫開竅四月則助陽氣八月則散陰氣非其宜也然夏屬心火心藏神秋屬肺金肺藏魄食之但言傷神者以心為君主之官也張騫使西域始得種歸故名胡荽今俗名元荽是也荽音綏五月勿食韭令人乏氣力內經云陽明者午也五月盛陽之陰也陽盛而陰氣加之也韭氣味辛溫五月食之但益已盛之陽不為微陰之助使陰陽榮衛之氣過於辛散故乏氣力五月五日勿食一切生菜發百病五月五日天中節乃純陽之日也生菜冷利不益腸胃反泄陽氣故食之發病六月七月勿食茱萸傷神氣六月暑氣盛張七月微陰將斂吳茱萸辛熱走氣助暑傷陰以心藏神肺主氣食之使心火太張肺金不斂故傷神氣也八月九月勿食姜傷人神八九月神氣收斂之時姜味過於辛散故食之傷神十月勿食椒損人心傷人脈十月陽氣盡斂氣主閉藏椒乃玉衡星精味辛散而氣熱心惡熱故食之損心並傷脈者心合脈也十月勿食被霜生菜令人面無光目澀心痛腰疼或發心瘧心瘧發時手足十指爪皆青困委十月純陰無陽故為陽月嚴霜肅殺之氣生菜被之而寒滑更甚故食之致此等疾十一月十二月勿食薤令人多涕唾十一二月凝寒閉藏之候薤氣味辛散大走肺氣故食之多涕唾也四季勿食生葵令人飲食不化發百病非但食中藥中皆不可用深宜慎之脾屬土土寄旺於四時之季月生葵滑利傷脾故食之飲食不化而發病時病差未健食生菜手足必腫脾主四肢生菜滑利傷脾故手足腫也病愈為差音叉去聲夜食生菜不利人生菜傷脾夜臥脾氣不運故也蔥韭初生芽者食之傷人心氣蔥韭初生芽則純陽鬱勃之氣尚未透發故食傷心氣飲白酒食生韭令人病增白酒多濕生韭性熱濕熱相合自令病增生蔥不可共蜜食之殺人獨顆蒜彌甚棗合生蔥食之令人病食糖蜜後四日內食生蔥韭令人心痛蔥韭棗蜜皆性相反者獨顆蒜有毒生蔥和雄雞雉白犬肉食之令人七竅經年流血此皆生風發火之物合食則血氣更淖溢不和故七竅流血夜食諸薑蔥蒜等傷人心諸薑蔥蒜皆氣味辛散之物夜氣收斂不宜辛散食之傷心者以神氣不藏也芫菁根多食令人氣脹衍義云芫菁即蔓菁也根過食動氣薤不可共牛肉作羹食之成瘕病韭亦然牛肉粗厲難以克化薤韭氣味臭烈皆脾家所不喜者故合食則積而成瘕蓴多食動痔病蓴性滑而有毒動痔病者毒氣注下也野苣不可同蜜食之作內痔一苦一甘性味相反經云腸澼為痔內痔則外無瘡而內瀉血者是也白苣不可共酪同食作䘌蟲白苣苦寒乳酪甘熱氣味乖反故合食生蟲黃瓜食之發熱病月令仲夏王瓜生今俗稱黃瓜以色名也有毒葵心不可食傷人葉尤冷黃背赤莖者勿食之葵心有毒黃背赤莖者葉色反常故亦有毒胡荽久食之令人多志胡荽辛溫開竅入心脾二經心藏神脾主思藏意與智久食過於辛散故多忘病人不可食胡荽及黃花菜胡荽辛溫耗氣黃花菜苦寒傷胃皆病人所忌者芋不可多食動氣芋性滯而發病多食則胸腹脹悶故動氣妊娠食姜令子余指余指手多生一指也姜形象指物類相感而然蓼多食發心病蓼和生魚食之令人奪氣陰核疼痛蓼味辛溫有毒生魚鮓屬令人熱中內經云心惡熱故多食發心病熱傷氣故合食則奪氣也陰核痛亦濕熱致病耳芥菜不可共兔肉食之成惡邪病二物亦性相反者小蒜多食傷人力辛熱耗氣故也食躁或躁方上躁字誤豉濃煮汁飲之豉苦而能吐毒隨吐解也鉤吻與芹菜相似食之殺人解之方薺苨八兩上一味水六升煮取二升分溫二服黃帝問天老曰天地所生有食之死者乎天老曰太陰之精名曰鉤吻入口則死葛洪方云鉤吻生處無他草莖上有毛薺苨根莖似人參而味小異味甘寒主解百藥毒以其與毒藥共處而毒自然敗不止入方家用也菜中有水莨菪葉圓而光有毒誤食之令人狂亂狀如中風或吐血治之方甘草煮汁服之即解甘以緩之故能解毒春秋二時龍帶精入芹菜中人偶食之為病發時手背腹滿痛不可忍名蛟龍病治之方硬糖二三升上一味日兩度服之吐出如蜥蜴三五枚差龍性淫而能變化交不擇類故有帶精入芹菜中之時硬糖味甘甘能解毒故也食苦瓠中毒治之方黍穰煮汁數服之解按風俗通云燒穰可以殺瓠又云種瓜之家不燒漆種瓠之家不燒穰物性相畏也故黍穰能解瓠毒苦瓠匏也黍糯米也穰黍草也扁豆寒熱者不可食之寒熱者傷寒病也扁豆實脾而性稍滯故勿食久食小豆令人枯燥小豆利小便滲津液故久食則肌膚枯燥食大豆屑忌啖豬肉食療云此二物小兒不得合食必壅氣致死十歲已上者不忌大麥久食令人作㿍字彙云㿍疥同蓋麥入心久食則心氣盛而內熱經云諸痛癢瘡皆屬心火故作㿍白黍米不可同飴蜜食亦不可合葵食之黍米多熱令人心煩飴蜜味甘令人中滿故戒同食葵葉為百葉主其心傷人食療云黍米合葵食成痼疾物性相反如此荍麥面多食之令人發落詩經陳風篇云視爾如荍音翹注荍芘瞥也又名荊葵爾雅云一名錦葵春時開花葉未生花似五銖錢粉紅有紫紋據此二說觀之則荍乃草花之類非麥也安得有面今以臆斷之荍與蕎同音古字通用即蕎麥麵也本草云蕎麥久食動熱風脫人鬚眉今云多食發落即脫鬚眉之意也蓋發者血之餘動風則血燥發枯而落經云風傷皮毛是毛髮原同一類故令發落以此知荍即蕎也然亦未敢自信姑存疑以質當世鹽多食傷人肺味過於咸則發哮喘痰嗽皆肺病也食冷物冰人齒手足陽明經脈入上下齒中其性喜溫惡寒故忌食冷物食熱物勿飲冷水寒熱相激脾胃乃傷飲酒食生蒼耳令人心痛蒼耳葉味苦有毒復飲酒以行其毒非所宜也苦入心故作心痛夏月大醉汗流不得冷水洗著身及使扇即成病夏月醉汗腠理已開又浴水使扇是風濕相搏成病本經云汗出浴水則為黃汗內經云飲酒中風謂之漏風可不謹哉飲酒大醉灸腹背令人腸結醉後血氣淖溢復以火迫之火燥血枯腸結必矣醉後勿飽食發寒熱因醉飽而發寒熱胃氣大傷筋脈橫解也飲酒食豬肉臥秫稻穰中則發黃黃者濕熱交蒸所致飲酒食肉則濕熱聚於中臥秫稻穰中則濕熱困於外故發黃食飴多飲酒大忌劉熙曰糖之稠者曰餳強硬如錫也清者曰飴形怡怡然也飴味甘經云酒客不喜甘故也故酒與飴相忌凡酒及水照見人影動者不可飲之此災異也故戒勿飲醋合酪食之令人血瘕酪多濕熱醋復酸斂故血積成瘕食白米粥勿食生蒼耳成走注蒼耳能搜風逐濕而其味苦若生食之則苦味走骨風燥血枯反致筋骨掣痛而成走注以白米粥味甘甘與苦性相反也食甜粥己食鹽即吐甘味滿於中鹹味湧於上自應即吐犀角筋攪飲食沫出及澆地墳起者食之殺人抱朴子云犀食百草之毒及衆木之棘故知飲食之毒其角解毒以之為筋攪飲食沫出及以飲食澆地墳起者皆有毒也墳起高起也飲食中毒煩滿治之方苦參三兩苦酒一升半上二味煮三沸三上三下服之吐食出即差苦參味苦苦酒味酸內經云酸苦湧泄為陰湧吐也吐去其毒煩滿自消矣又方犀角湯亦佳李時珍曰犀角入胃經胃為水穀之海飲食藥物胃先受之故解一切諸毒貪食食多不消心腹堅滿痛治之方鹽一升上一味以水三升煮令鹽消分三服當吐出食便差鹹味軟堅又能湧泄今人常用鹽湯探吐即祖此法礬石生入腹破人心肝亦禁水生礬酸澀不堪故破人心肝然礬得水則化物性相畏故亦禁水商陸以水服殺人商陸有毒能行水而性又惡水故也葶藶子傳頭瘡藥氣入腦殺人頭為諸陽之會腦為髓海先天性命根也葶藶子味苦大寒雖能敷瘡殺蟲然藥氣入腦則瘡毒亦內攻入腦矣故殺人水銀入人耳及六畜等皆死以金銀著耳邊水銀則吐唐本注云水銀入肉使百脈攣縮入耳能令食腦至盡故死人然其為物自是金銀之類金銀著耳邊則吐者此物性感召之理猶磁石之引針也苦楝無子者殺人唐本注云楝有雌雄兩種雌者根白有子可服雄者根赤無子有毒服之吐不止有至死者凡諸毒多是假毒以投無知時宜煮薺苨甘草汁飲之通除諸毒藥無知謂不知其毒而誤食之也假借也薺苨甘草除毒解見前
