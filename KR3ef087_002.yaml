body:
  text: 卷中肺痿肺癰咳嗽上氣病脈證治第七心主血肺主氣血為榮氣為衛其大概也然經云臟真高於肺以行榮衛陰陽則肺主衛而未嘗不兼主榮也經又云肺惡寒形寒飲冷則傷肺然肺屬金而畏火則肺又未嘗不惡熱也故肺液脫而為痿肺葉腐而為癰脈數而虛為痿數而實為癰肺中冷多涎唾為痿熱之所過血結癰膿為癰至於痿之或咳或不咳癰之先為咳逆此痿與癰之所由分也然肺病又有咳嗽上氣者經云皮毛者肺之合也皮毛先受邪氣邪氣以從其所合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則內外合邪因而客之則為肺咳雖五臟六腑皆令人咳然皆聚於胃關於肺使人多涕唾而面浮腫氣逆也潘碩甫先生曰痿與癰皆熱在上焦其脈皆數皆咳亡津液未有異也但痿屬肺氣虛雖有熱而不烈雖亡津液而不燥涸雖咳而口中尚有濁唾涎沫雖客熱亦不至腐為膿血故脈雖數而虛也癰則氣壅邪實而熱烈故津液亡而更覺乾涸口中辟辟燥咳即胸中隱痛津液既涸脈應澀滯而反滑數者蓄熱腐膿脈且數實也問曰熱在上焦者因咳為肺痿肺痿之病從何得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之曰寸口脈數其人咳口中反有濁唾誕沫者何師曰為肺痿之病若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血經云天氣通於肺天處高而必有雨露以為潤澤肺主氣而必有津液以為滋榮若既從汗出嘔吐消渴小便利數便難快藥下利是重亡津液此肺痿受病之因也脈數者經云數則為熱又云數則為虛以肺居上焦故脈亦應寸口上部也咳者肺氣逆也腎主液自入為唾入脾為涎口中濁唾涎沫者肺虛挾熱則脾腎子母俱虛脾為肺母腎為肺子津液穢敗此肺痿之症也辟辟者燥咳唾膿血之聲胸中為肺之部分隱隱痛者以熱腐膿血氣與火相搏而痛也脈數且滑者膿血內潰也此肺癰之症也脈數虛者為肺痿數實者為肺癰痿癰俱有熱故俱脈數但肺痿亡津液故脈數而虛肺癰吐膿血故脈數而實肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎吐甘草乾薑湯以溫之若服湯已渴者屬消渴吐涎沫者脾為肺母脾虛不能攝涎也肺氣虛而不逆故不咳內無熱故不渴也遺尿小便數為下虛蓋肺居上部膀胱居下部肺氣虛不能約束津液而偏滲膀胱此上虛不能制下也虛則必寒故肺中冷以肺熱財閉癃肺寒則遺溺肺主通調水道下輸膀胱經所謂水液澄徹清冷皆屬於寒是也經云上虛則眩甘草乾薑湯以溫肺經服湯已渴者肺中有熱則遺尿便數非肺痿乃消渴也內經云肺消者飲一溲二死不治又云心遺熱於肺傳為鬲消是也甘草乾薑湯方甘草四兩炙乾薑二兩炮上㕮咀以水三升煮取一升五合去渣分溫再服肺冷者乾薑以溫之甘草益脾虛則補其母也師曰肺咳逆脈之何以知此為肺癰當有膿血吐之則死其脈何類師曰寸口脈微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴多唾濁沫時時振寒熱之所過血為之凝滯畜結癰膿吐如米粥始萌可救膿成則死此肺癰一症不獨內傷而亦有受外感者也肺位上焦故脈應上部寸口微則為風外邪至而正氣虛也數則為熱者火勢張而性速疾也正氣虛而腠理疏泄故汗出熱伏於內肌表反覺灑淅惡寒此火極似水之象也衛在外呼出氣亦在外風中於衛呼氣不入者風邪壅於外而真息不收於內也夫壅於外則風外傷皮毛矣榮在內吸入氣亦在內熱過於榮吸而不入者熱氣鬱於內而不宣干外也夫鬱於內則熱內傷血脈矣是以風傷皮毛邪氣舍其所合舍居也肺合皮毛則肺氣壅逆故咳而喘滿熱傷血脈則津液不布故口乾咽燥但熱不在胃故不渴耳多唾濁沫者肺熱液敗也時時振寒者即上文數則惡寒之意夫始因中風其既也風悉化而為熱則不覺其有風但見其有熱故熱之所過血為凝滯而蓄膿致吐膿成則死以臟真不可傷也肺癰喘不得臥葶藶大棗瀉肺湯主之葶藶大棗瀉肺湯方葶藶熬令黃色搗丸加彈子大大棗十二枚上先以水三升煮棗取二升去棗納葶藶煮取一升頓服肺癰氣逆則喘喘自不得臥葶藶瀉肺大棗甘以緩之甘以瀉之也咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之解見本篇第四節桔梗湯方桔梗一兩甘草二兩上二味以水三升煮取一升分溫再服則吐膿血也肺癰膿成則死然既有膿血則又宜吐出本草云甘草吐肺癰之膿血者以甘能瀉熱也桔梗色白味苦辛入肺經苦以泄之辛以散之能升提氣血為舟楫之劑所以載甘草上升而使之吐也肺癰胸脹滿一身面目浮腫鼻寒清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞葶藶大棗瀉肺湯主之肺在胸中癰則胸為脹滿一身面目浮腫者肺主氣合皮毛火升氣逆也鼻寒涕出不聞香臭酸辛者肺開竅於鼻肺氣壅塞也咳逆上氣喘鳴迫塞總屬肺氣不利所致上氣面浮腫肩息其脈浮大不治又加利尤甚肺在上而其氣則常下降所謂地道宜上升天氣宜下濟也咳逆上氣則氣逆矣面浮腫者氣升火載肩息者喘息抬肩此氣之上脫也浮大者脈暴出而內虛此氣之外散也故不治加利則脾土更衰不生肺金此氣之下泄也故尤甚上氣喘而躁者屬肺脹欲作風水發汗則愈內經水熱穴論曰腎者至陰也至陰者盛水也肺者太陰也其本在腎其末在肺皆積水也腎者胃之關也關門不利故聚水而從其類也勇者勞甚則腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府汗空也行於皮膚傳為胕腫胕腳面也本之於腎名曰風水故水病腎為胕腫大腹肺為喘呼不得臥者標本俱病也腎是本肺是標又評熱病論云少氣時熱從胸背上至頭汗出手熱口乾苦渴小便黃目下腫腹鳴身重難以行月事不來煩不能食正偃則咳名日風水又大奇論腎肝並沉為石水並浮為風水合內經觀之腎病水氣上逆因致肺脹以肺為母腎為子因子病而害及於母所以喘出於肺躁出於腎也發汗則愈者肺合皮毛汗出則風水之邪從皮毛中泄去肺脹自消矣肺脹咳而上氣煩躁而喘脈浮者心下有水小青龍加石膏湯主之心下有水則水寒射肺故致肺脹而有喘咳煩躁之證水病脈宜沉而反浮者水氣泛溢上壅又心肺居上焦其脈原屬浮也小青龍加石膏湯方麻黃桂枝芍藥各三兩甘草乾薑各三兩五味子半夏各半升細辛三兩石膏二兩上九味以水一斗先煮麻黃去上沫納諸藥煮取三升強人股一升羸者減之日三服小兒服四合龍能變化施雨水經云陽之汗以天地之雨名之故發汗用大青龍行水用小青龍此命名制方之本意也心下有水麻黃桂枝發汗以泄水於外半夏乾薑細辛溫中以散水於內芍藥五味子收逆氣以平肺甘草益脾土以制水加石膏以去煩躁兼能解肌出汗也咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之凡人風熱外壅氣急咳喘則口開目瞪以出逆氣又內熱鬱悶者鼻竅閉塞目珠疼脹溜火此皆目如脫狀之意也脈浮為風大為熱治宜疏風清熱越婢加半夏湯方麻黃六兩石膏半斤甘草二兩生薑三兩大棗十五枚半夏半斤上六味以水六升先煮麻黃去上沫納諸藥煮取三升分溫三服脾運水穀主為胃行津液取卑如婢湯名越婢者取發越脾氣通行津液之義也今治肺脹則麻黃散表邪石膏清內熱甘草大棗養正緩邪半夏生薑散逆下氣也咳而上氣喉中水雞聲射干麻黃湯主之射干麻黃湯方射干三兩麻黃四兩半夏半升洗細辛款冬花紫菀各三兩五味子半升生薑四兩大棗七枚上九味以水一斗二升先煮麻黃兩沸去上沫納諸藥煮取三升分溫三服喉中水雞聲痰氣壅塞而作聲也麻黃細辛開壅塞而泄風痰射干半夏紫菀款冬花皆保肺定喘之藥生薑辛以散之大棗甘以緩之李升璽曰此湯近似小青龍亦證挾停飲者以不煩躁故不如前加石膏咳逆上氣時時吐濁但坐不得眠皂莢丸主之皂莢丸方皂莢八兩刮去皮用酥炙上一味末之蜜丸梧子大以棗膏和湯服三丸日三夜一服唾濁者腎不納氣而水泛為痰也坐不得眠肺氣不降而上壅為逆也皂莢味辛鹹辛以散肺氣咸以走水氣而勝腎邪棗膏和服即葶藶大棗瀉肺湯之意咳而脈浮者厚朴麻黃湯主之脈沉者澤漆湯主之厚朴麻黃湯方厚朴五兩麻黃四兩石膏如雞子大杏仁半升五味子半升半夏半升細辛二兩乾薑二兩小麥一升上九味以水一斗二升先煮小麥熟去滓納諸藥煮取三升溫服一升日三服咳者水寒射肺也脈浮者停水而又挾風以鼓之也麻黃去風散脅逆與半夏細辛乾薑五味子石膏同用即前小青龍加石膏為解表行水之劑也然土能制水而地道壅塞則水亦不行故用厚朴疏敦阜之土使脾氣健運而水自下泄矣杏仁下氣去逆經云喘家加厚朴杏子小麥入心經能通火氣以火能生土助脾而共成決水之功也澤漆湯方澤漆三升以東流水五斗煮取一斗三升人參桂枝各三兩半夏半升黃芩三兩甘草三兩生薑五兩白前五兩紫參五兩上九味㕮咀納澤漆汁中煮取五升溫服五合至夜盡脈沉為水以澤漆為君者因其功專於消痰行水也水性陰寒桂枝行陽氣以導之然所以停水者以脾土衰不能制水肺氣逆不能通調水道故用人參紫參白前甘草補脾順肺同為制水利水之坊黃芩苦以泄之半夏生薑辛以散之也澤漆即大戟苗也生時摘葉有白汁故以為名紫參主心腹積聚散邪逐瘀大逆上氣咽喉不利止逆下氣者麥門冬湯主之咽喉肺系也即會厭所在為氣之道路大逆上氣咽喉不利則肺虛矣方內補虛益氣之品即所以止逆下氣也麥門冬湯方麥門冬七升人參二兩半夏一升甘草二兩大棗十二枚粳米三合上六味以水一斗六升煮取六升溫服一升日三夜一服肺主氣大逆上氣者脾土不能生肺金東垣所謂脾胃一虛肺氣先絕是也人參甘草大棗粳米同為補土生金之劑麥冬清潤咽喉半夏解散痰飲皆所以止逆下氣也奔豚氣病脈證治第八腎居下部而其氣每欲上凌如腎液為唾痰唾者腎水之上泛也腎脈循喉嚨咽痛者腎經之客寒熱也或龍火上升而為目赤齒痛以腎合骨骨之精為瞳子齒者骨之餘也或風氣相搏而為耳癢蟬鳴以腎開竅於耳也至於奔豚者腎氣上發也腎屬水豚亦水畜位屬北方亥宮故取象於豚奔者言其勢衝突莫御也難經云腎之積日奔豚發於少腹上至心下若豚狀或上或下無時令人咳逆骨痿少氣蓋脾病傳腎腎當傳心心以夏適王王者不受邪腎復欲還脾脾不肯受留結為積故奔豚以夏丙丁日得之然難經所謂奔豚者以平日漸積而言本經所謂奔豚者則不拘一病病起無時或得之傷寒誤治者而然也師曰病有奔豚有吐膿有驚怖有火邪此四部病皆從驚發得之內經云肝病發驚駭肝藏魂魂搖則驚又云脾移熱於肝為驚衄又二陽一陰病主驚駭二陽胃也一陰肝也又陽明終者善驚又胃病聞木音則惕然而驚胃土也聞木音驚者土惡木也由是觀之則心肝脾胃皆有所驚也今以奔豚從驚發得者言之傷寒論云太陽傷寒者加溫針必驚也蓋心主血汗者心之液燒針發汗則損陰血而驚動心氣腎邪因心虛而凌上發為奔豚水剋火也則因驚以致奔豚此驚發之屬於心者也以吐膿血從驚發得者言之胃為水穀之海驚則飲食停滯氣血不行蓄而為熱內不能容外無所泄於是腐化為膿病胃脘癰而吐膿血者有之嘔吐出於胃則因驚以致吐膿血此驚發之屬於胃者也以驚怖從驚發得者言之內經云驚則氣亂以心無所倚神無所歸丹溪謂心藏神驚則神出於舍舍空痰客血氣入舍痰拒其神不得歸則因驚而驚怖不已此驚發之亦屬於心者也以火邪從驚發得者言之經云諸病驚駭皆屬於火心惡熱火動則心惕不寧又相火寄旺在肝膽肝多驚木旺則心火愈炎肝屬木如小兒熱劇者其受驚必多發搐者則肝火彌熾則因驚致火邪此驚發之屬於心而亦屬於肝膽者也此病情宜細審也師曰奔豚病從少腹起上衝咽喉發作欲死復還止皆從驚恐得之王肯堂曰內經無有稱驚怖者始於金匱要略奔豚條云有驚怖又云驚恐由是見驚怖即驚恐蓋怖懼也恐亦懼也於義且同然驚因觸於外事內動其心心動則神搖恐因惑於外事內歉其志志歉則精卻故內經謂驚則心無所依神無所歸慮無所定故氣亂矣恐則精卻則上焦閉閉則無氣以還則下焦脹故氣不行矣此驚與恐之所由分也奔豚從驚恐得之解見前張子和云驚者為自不知故也恐者為自知也蓋驚者聞響即驚恐者自知如人將捕之之狀及不能獨自坐臥必有人伴侶方不恐懼或夜無燈燭則亦恐懼是也奔豚氣上衝胸腹痛往來寒熱奔豚湯主之奔豚者陰氣上攻故沖胸腹痛也往來寒熱邪正相搏也奔豚湯方芎藭當歸芍藥各二兩半夏四兩黃芩二兩甘草二兩生薑四兩生葛五兩甘李根白皮一升上九味以水二斗煮取五升溫服一升日三夜一服心氣虛則奔豚腎邪得而凌之芎藭辛以行氣當歸溫以和血芍藥酸以斂陰配甘草又止腹痛皆所以助心行氣使不上衝也甘草甘以緩之李根白皮苦辛止心煩逆氣生葛發散寒熱黃芩苦以降逆半夏生薑辛以散逆也李瑋西曰奔豚加桂枝宜也此用黃芩涼劑何歟不知往來寒熱尚有半表半裡症在黃芩與半夏甘草生薑同用即小柴胡湯例也芎藭入肝經散寒熱與用柴胡無異發汗後燒針令其汗針處被寒核起而赤者必發奔豚氣從小腹上至心灸其核上各一壯與桂枝加桂湯主之桂枝加桂湯方桂枝五兩芍藥三兩甘草二兩炙生薑三兩大棗十二枚上五味以水七升微火煮取三升去渣溫服一升汗者心之液汗後又加燒針則損陰血而驚心氣心虛則腎氣凌心而上逆發為奔豚因針處被寒先灸核上以散寒芍藥養陰生薑散邪桂枝導引陽氣以泄腎邪甘草大棗補土以剋水也發汗後臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之茯苓桂枝甘草大棗湯方茯苓半斤桂枝四兩甘草二兩炙大棗十五枚上四味以甘瀾水一斗先煮茯苓減二升納諸藥煮取三升去渣溫服一升日三服甘瀾水法取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之汗多亡陽汗後臍下悸者陽氣虛而腎邪上逆臍下為腎氣發汗之地也茯苓泄水以伐腎邪桂枝行陽以散逆氣甘草大棗甘溫助脾土以平腎水煎用甘瀾水者揚之無力全無水性取其不助腎邪也腎屬水李升璽曰合二方觀之前因燒針發汗陰陽兩虛故用桂枝加桂行陽芍藥養陰此發汗不加燒針但亡陽耳不傷陰分故不用芍藥養陰也胸痹心痛短氣病脈證治第九此論胸痹首云上焦極虛則氣必先虛而後成痹也經云陽受氣手胸中則胸中者陽氣之所起也若陽虛而血結氣聚痰飲垢膩凝滯不行則痹生焉然胸在上焦心居膈上則胸中者心之所舍也故心下滿而不痛者為痞滿而痛者為胸痹痹者閉也正氣為邪氣閉而不通故痛也然則胸痹與心痛有異否乎曰或問丹溪心痛即胃脘痛然歟曰心與胃各一臟腑病形不同因胃脘痛處在心下故有當心而痛之名豈胃脘痛即心痛哉若此之所謂心痛者乃胸痹之心痛非心之自病而為痛也經云南方生於夏病在心俞在胸脅蓋心為火臟夏時屬火令風從其俞穴而入之則致胸痹而連及於心也然心痛何以徹背背痛何以徹心乎經云背者胸中之府心在胸中且背為陽陽中之陽心也人五臟藏於胸腹其系皆附於背心系著於脊之第五椎則心與背雖有前後之分而實一氣貫輸者矣但胸既成痹則氣道阻塞上下呼吸自然不利故曰短氣不足以息者實也究之實者邪氣實則虛為陽氣虛可知矣雖然心主血肺主氣短氣肺病也觀諸方皆用薤白半夏附子桂枝乾薑生薑等行氣之藥則治胸痹心痛者尤當以利肺氣溫陽氣為事歟師曰夫脈當取太過不及陽微陰弦即胸痹而痛所以然者責其極虛也今陽虛知在上焦所以胸痹心痛者以其陰弦故也內經云胃脈平者不可見太過不及則病見矣太過者邪盛也不及者正衰也寸脈為陽以候上焦正應胸中部分若陽脈不及而微則為陽虛知在上焦故成胸痹尺脈為陰主病在裡然陰弦何以致胸痹心痛蓋弦為肝脈肝屬木經云木實則痛又傷寒陽脈澀陰脈弦當腹中急痛者小建中湯雖心與腹部位不同而陰弦為內有虛寒俱主裡痛則無異也此陽微陰弦皆不及之脈也沈子華曰陽受氣於胸中診法上以侯上寸微應得上焦胸痹之病然尺脈在下與上焦無干何以並見陰弦之脈不知尺為陰弦亦屬陰總是純陰無陽故胸痹並見此脈也平人無寒熱短氣不足以息者實也寒熱者表症也病人短氣有寒熱則邪尚在表非裡實也若平人無寒熱則外無表症而短氣不足以息此為裡實以邪氣填塞胸中即胸痹是也然觀後數節胸痹短氣如栝蔞薤白茯苓杏仁橘枳薑湯之類皆用辛散下氣之藥以邪在上焦氣分非如傷寒陽明證熱邪入府用承氣湯下之之實也傷寒喘而胸滿者不可下然首節云責其極虛此又何以雲實不知經云邪之所湊其氣必虛留而不去其病為實是也按短氣與少氣有辨少氣者氣少不足於言內經云言而微終日乃復言者此奪氣是也短氣者氣短不能相續似喘非喘若有氣上衝而實非氣上衝故似喘而不搖肩似呻吟而無痛是也李升璽曰觀首節上焦陽虛句則短氣亦有屬虛者須分初病能食脈有力為實久病不能食脈無力為虛此又不可不辨也胸痹之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數栝蔞薤白白酒湯主之痹在胸中氣道窒礙故喘息咳唾短氣也胸背痛者背為陽胸中陽氣虛則其背亦虛寒邪外徹故牽引而痛也寸脈主上焦脈沉而遲者經云沉為在裡遲為在臟也胸痹為陽虛關脈小者陽氣不充又緊則為寒數則為虛也栝蔞薤白白酒湯方栝蔞實一枚搗薤白半斤白酒七升上三味同煮取二升分溫再服薤白辛而滑能散結氣栝蔞甘而潤能盪滌胸中垢膩痰飲不用冽酒而用白酒者虛人飲冽酒力不能勝多致氣逆而喘今胸痹短氣不可再令氣喘故但用白酒取其通行痹氣足矣內經所謂氣薄則發泄厚則發熱味厚則泄薄則通是也李時珍曰仲景治胸痹及結胸證皆用栝蔞實取其甘寒不犯胃氣能降上焦之火使痰氣下降也成無己云栝蔞泄熱蓋不嘗其味厚不苦隨文傅會耳胸痹不得臥心痛徹背者栝蔞薤白半夏湯主之胸痹陽虛氣逆故不得臥也心痛徹背寒氣相引也解見前節傷寒結胸病二三日不能臥但欲起心下必結脈微弱者此本有寒分也夫胸痹結胸名雖不伺而俱不得臥總之邪在胸中胸痹為陽虛即結胸之有寒分也結胸有寒分即胸痹之陽虛也二證正可互相發明栝蔞薤白半夏湯方栝蔞實一枚薤白三兩半夏半升白酒一斗上四味同煮取四升溫服一升日三服此即前湯加半夏為辛以散結之意然甲乙經用半夏治夜不眠義本靈樞蓋不得臥者陰陽之氣不通於內外也經脈以太陽為開陽明為合少陽為樞半夏入少陽經為轉運樞機之劑使陰陽既通其臥立至此半夏治不得臥之精義也按仲景小陷胸湯治小結胸症用半夏栝蔞實今治胸痹亦用此二藥但彼因裡虛熱入故佐黃連此因上焦陽虛故用薤白白酒以行陽氣也胸痹心中痞留氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之心君主也心痞胸滿則主衰不得令肝經相火竊君火以行權故脅下逆搶心相火寄在肝膽肝經循脅裡然相火盛而水旺則用枳實薤白桂枝湯以平之心主衰而陽虛用人參湯溫補之可也枳實薤白桂枝湯方枳實四枚薤白半斤桂枝一兩厚朴四兩栝蔞實一枚搗上五味以水五升先煮枳實厚朴取二升納諸藥煮數沸分溫三服枳實厚朴所以去痞泄滿薤白辛以散之脅下逆搶心者肝邪也肝屬木木得桂而枯故用桂枝伐肝人參湯方人參白朮甘草乾薑各三兩上四味以水八升煮取三升溫服一升日三服此即理中湯也人參白朮補虛甘草和中乾薑溫中行氣此養正邪自消也胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘枳薑湯亦主之肺主氣其脈起於中焦正當胸中部分胸痹氣塞短氣側肺氣不利矣茯苓杏仁甘草湯下氣和中橘枳薑湯亦寬胸利氣行陽散逆之劑也茯苓杏仁甘草湯方茯苓三兩杏仁五十個甘草一兩上三味以水一斗煮取五升溫服一升日三服不差更服橘枳薑湯方橘皮一斤枳實三兩生薑半斤上三味以水五升煮取二升分溫再服胸痹緩急者薏苡附子散主之薏苡附子散方薏苡仁十五兩大附子十枚炮上二味杵為散服方寸匕日三服胸痹者中氣虛寒痞塞所致緩急者或緩而痛暫止或急而痛復作也薏苡仁入脾以和中入肺而利氣附子溫中行陽為散服則其效更速矣心中痞諸逆心懸痛桂枝生薑枳實湯主之靈樞腎脈從肺出絡心心如懸若飢狀此腎病也蓋心君上而火欲其下降腎居下而水欲其上升為水火既濟心中痞則心火不下降腎水亦不上升是為心腎不交故諸氣上逆心懸痛虛懸而空痛用桂枝生薑行陽而止痛枳實下氣而散逆也桂枝生薑枳實湯方桂枝生薑各三兩枳實五枚上三味以水六升煮取三升分溫三服心痛徹背背痛徹心烏頭赤石脂丸主之烏頭赤石脂丸方烏頭一分炮赤石脂一兩附子半兩炮乾薑一兩蜀椒一兩上五味末之蜜丸如梧子先食服一丸三服不知稍加服心痛在內而徹背則內而達外矣背痛在外而徹心則外而入於內矣故既有附子溫中而復用烏頭走表乾薑行陽散寒蜀椒下氣開鬱然心主血不可無入血分之藥以和之赤石脂入心經血分性溫體重性溫則能生陽氣於陰血之中體重則能降痹氣於胸膈之下矣附九痛丸治九種心痛人參一兩附子二兩巴豆一兩去皮心熬研如脂吳茱萸一兩乾薑一兩生狼牙一兩炙上六味末之煉蜜丸如梧子大酒下強人初服三丸日三服弱者二丸兼治卒中惡腹脹痛口不能言又治連年積冷流注心胸痛並冷衝上氣落馬墜車血疾等皆主之忌口如常法心痛九種飲食寒熱氣血悸蟲疰也一云次食風寒熱悸蟲忤疰諸書亦各不同總之心痛悉屬虛寒用人參補之薑附吳茱萸巴豆等以溫之狼牙味苦酸有毒散邪氣殺腹臟蟲也腹滿寒疝宿食病脈證治第十夫脾經入腹胃經挾臍循腹裡是腹者脾胃二經所過之處胃病大腹水腫脾病腹脹善噫則腹滿痛皆屬脾胃二經所致故經云諸濕腫滿皆屬脾土是也然內經舉痛論言腹痛者十四條惟一條屬熱余皆屬寒若腹滿病悉屬於寒故經云臟寒生滿病是也然腹滿亦有屬熱者經云諸腹脹大鼓之如鼓皆屬於熱是也又有不因寒熱而陰陽反作病多逆從者經云清氣在下則生飧泄濁氣在上則生䐜脹是也又有統於腎者由命門火衰既不能自制陰寒又不能溫養脾土則陰不從陽而精化為水氣聚為脹者有之若本篇所云腹滿則屬寒者居多也肝經循股陰絡陰器故疝屬肝病然內經任脈為病內結七疝以至五臟膀胱亦皆有疝蓋肝主筋指疝為筋病挾肝邪則可若云止在厥陰一經則與內經悖矣大抵疝病寒則多痛熱則多縱濕則腫墜虛者亦致腫墜在血分者不移在氣分者多動故諸寒收引則血泣而歸肝下注於左丸諸氣膹郁則濕聚而歸肺下注於右丸且睪丸所絡之筋非盡由厥陰而太陰陽明之筋亦入絡也故患左丸者痛多腫少患右丸者腫多痛少此可驗也若宿食者其受病不一而此篇但舉宿食之脈證尚未究及病因然宿食與腹滿正可參看如腹滿按之痛者為實可下之此有宿食者也痛而閉者厚朴三物湯主之腹滿不減當須下之此有宿食者也能觸類而通之則庶幾矣趺陽脈微弦法當腹滿不滿必便難兩胠疼痛此虛寒從下上也以溫藥服之趺陽胃脈也在腳面上胃經循腹裡微為陰脈弦屬肝脈此陽氣不足胃中虛冷所致內經云胃中寒則脹滿是也不滿者必便難寒氣閉結也胠脅下也肝經布脅肋胠痛肝氣滯也虛則必寒肝居下部胃居中焦在肝之上由肝而至胃此虛寒從下而上乃肝木侮脾之象也服溫藥以散虛寒之氣病者腹滿按之不痛為虛痛者為實可下之舌黃未下者下之黃自去虛者寒氣也實者食積也舌黃熱聚於胃也下之黃自去熱邪解也然云未下者下之則已下者屬虛熱又未可再下矣腹滿時減復如故此為寒當與溫藥腹滿不減者實而可下若有時而減後復滿如故是寒氣在裡聚散無時故當與溫藥病者痿黃躁而不渴胸中寒實而利不止者死此腹滿而見陽虛氣脫之症也痿者脾氣虛黃者脾色困也躁者陰盛格陽陽氣欲脫而爭將與形離也若躁而煩渴者為熱則陽氣尚存猶為可治今躁而不渴陽氣虛也胸中寒實邪氣盛也兼利不止元氣又下泄矣不治在一躁字傷寒少陰下利不煩而躁者死寸口脈弦者即脅下拘急而痛其人嗇嗇惡寒也此腹滿而見肝氣鬱滯之症也弦者肝脈亦陰脈也肝經布脅肋性宜疏散故經云臟真散於肝散者即透達疏越之意今肝經鬱於內故脅下拘急而痛肝氣怯於外故嗇嗇惡寒也嗇嗇不足也即惡寒之貌李升璽曰脅在身之兩旁經云左右者陰陽之道路也今見弦脈乃肝經氣逆而陰陽氣血俱為凝滯故內則脅痛拘急外則惡寒夫中寒家喜欠其人清涕出發熱色和者善嚏靈樞云陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數欠是欠者陽氣未盡而欲入於陰或陰加於陽也又運氣欠嚏有三其一曰太陽司天寒氣下臨心氣上從寒清時舉鼽嚏數欠故中寒家喜欠也清涕者鼻中清冷之液蓋肺合皮毛開竅於鼻皮毛外受風寒內入於其所合則肺經亦寒而清冷之液出於其竅也發熱者經云人傷於寒則為病熱古人名傷寒為熱病色和者三陽經皆上於面今陽氣稍充尚不為寒所困故色和靈樞云陽氣和利滿於心出於鼻故為嚏此陽氣欲通也劉河間云嚏者鼻中因癢而氣噴作於聲也鼻為肺竅癢為火化心火邪熱干於陽明發於鼻而癢則嚏也或故以物擾之癢而嚏者擾癢屬火故也或視日而嚏者由目為五臟精華太陽真火晃矅於目心神躁亂而熱發於上則鼻中癢而嚏也中寒其人下利以裡虛也欲嚏不能此人肚中寒上節中寒欠涕等證其病在表此下利慾嚏其病在裡在表者其寒淺故色和善嚏陽氣欲通也在裡者其寒深欲嚏不能則陽氣未通故知為肚中寒夫瘦人繞臍痛必有風冷穀氣不行而反下之其氣必沖不沖者心下則痞也瘦人中氣凝寒繞臍痛有風冷穀氣不行者當與溫中藥為是反下之虛其裡氣虛而氣逆則上衝虛而氣結則作痞傷寒病發於陰而下之因作痞但滿而不痛者是也蓋陰在內陽之守也下多亡陰則氣已無根無根者必致上竄此沖與痞所由作也病腹滿發熱十日脈浮而數飲食如故厚朴七物湯主之腹滿里症也發熱十日飲食如故則日數已久漸成裡實若脈仍浮數即表邪尚在又難大下厚朴七物湯表裡兼治即傷寒大柴胡湯小柴胡湯加芒硝桂枝加大黃湯之意厚朴七物湯方厚朴半斤大黃三兩枳實五枚桂枝二兩甘草三兩生薑五兩大棗十枚上七味以水一斗煮取四升溫服八合日三服嘔者加半夏五合下利去大黃寒多者加生薑至半斤厚朴大黃枳實即小承氣湯也所以攻裡桂枝甘草生薑大棗即桂枝湯例也但少芍藥所以發表此表裡雙解之劑嘔加半夏散逆也下利去大黃恐寒胃也寒多加生薑溫中也腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子粳米湯主之腹中者脾胃過脈之處雷鳴切痛胸脅逆滿嘔吐皆脾胃受寒虛而上逆為肝木所侮也肝經循脅附子粳米湯方附子一枚炮粳米半升半夏半升甘草一兩大棗十枚上五味以水八升煮米熟湯成去渣溫服一升日三服脾胃喜溫惡寒附子溫中為主半夏散逆甘草大棗粳米以實脾也痛而閉者厚朴三物湯主之內經云熱氣留於小腸癉熱焦渴堅幹不得出故痛而閉不通此痛而閉者為內熱也厚朴三物湯方厚朴八兩大黃四兩枳實五枚上三味以水一斗二升先煮二味取五升納大黃煮取三升溫服一升以利為度厚朴泄滿枳實去痞大黃瀉實即小承氣湯也按之心下滿痛者此為實也當下之宜大柴胡湯要看心下二字凡痛在腹中者邪已入府故宜大下此滿痛在心下未全入府邪熱未深故不用大承氣而用大柴胡於攻裡之中仍兼和解之法此心下與腹中有上下深淺之別也大柴胡湯方柴胡半斤半夏半斤洗黃芩三兩生薑五兩大棗十二枚大黃二兩枳實四枚炙芍藥三兩上八味以水一斗二升煮取六升去渣再煎溫服一升日三服大法表寒宜汗裡熱宜下邪在半表半裡雖未為熱實而寒已漸化為熱下可汗下宜小柴胡湯和解之若邪已入里里症既急而表症猶在者則於小柴胡湯中加大黃枳實芍藥以泄熱瀉實為表裡兼治之法茲以里有實邪而滿痛尚在心下故主此湯攻裡仍不忘半表裡和解之意也腹滿不減減不足言當須下之宜大承氣湯腹滿不減者實也當用大承氣湯下之若減則不足言實不可輕下矣大承氣湯方大黃四兩酒洗芒硝三合枳實五枚炙厚朴半斤炙去皮上四味以水一斗先煮二物取五升去渣納大黃煮取二升去渣納芒硝更上火微煮一二沸分溫再服得下止服內經云濁氣在上則生䐜脹大黃苦寒瀉熱經所謂攻裡不遠寒是也厚朴苦以行滯枳實下氣最速故能泄滿消脹芒硝辛以潤燥咸以軟堅經云熱淫於內治以鹹寒佐之以苦是也張卿子先生云乾陽亢極於上而日有悔悔字即陰承於下五行家所謂陰生於午坤象所謂順承天亢害承製之義爽然此湯不曰制火不曰生陰而曰承氣仲景真法天而為方者也心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛而不可觸近大建中湯主之心胸寒痛嘔不飲食寒在上膈也腹中寒上衝寒在中焦也皮起出見有頭足乃寒氣上衝之象非真有一物具頭足也寒氣凝結故上下痛不可觸近非裡實不可按之痛也故但宜建中不可攻下大建中湯方人參二兩乾薑四兩蜀椒二合去汗上三味以水四升煮取二升去渣納膠飴一升微火煎取一升半分溫再服如一炊頃可飲粥二升後更服當一日食糜溫覆之人參膠飴甘溫以補裡虛乾薑辛熱以散內寒蜀椒溫中下氣以腹中寒上衝也方名建中者建立也脾主中州則上下四旁寒邪悉散陽春舒布矣脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜大黃附子湯脅者肝之部分脅下偏痛發熱此肝氣實經云木實則痛是也弦者肝脈緊則為寒又云緊為裡實後節云脈數弦者當下其寒脈大而緊者陽中有陰可下之此肝氣實則脾氣鬱變為寒中經云土鬱則奪之是宜土中瀉木而中寒者又當用溫中之藥瀉之故主大黃附子湯大黃附子湯方大黃三兩附子三枚炮細辛二兩上三味以水五升煮取二升分溫三服若強人煮取二升半分溫三服服後如人行四五里進一服實者下以大黃加附子溫中細辛散寒是謂以溫藥下之也仲景治傷寒少陰證反發熱者有麻黃附子細辛湯此用大黃附子湯或以溫藥發表或以溫藥攻裡二方並立皆用附子細辛而一配以麻黃一配以大黃寒熱並用表裡互施真神方也寒氣厥逆赤丸主之王履曰仲景言四逆與厥者非一未嘗分逆為不溫厥為冷也既曰不溫則冷矣尚何異乎然四肢與手足卻有所分凡舉四逆者是通指手足臂脛以上言也若手足厥逆手足厥冷等及無手足字者是獨指手足言也傷寒少陰證四逆而死者二條其手足厥冷煩躁者治以吳茱萸湯可見四逆重於厥冷成氏謂厥甚於逆謬矣此但言厥逆則專指手足不主四逆可知赤丸方茯苓四兩半夏四兩洗一方用桂烏頭二兩炮細辛一兩上六味方內失去二味末之納真朱為色煉蜜丸如麻子大先食飲酒下三丸日再夜一服不知稍增之以知為度手足為諸陽之本因寒氣厥逆則陽氣衰矣不用附子而用烏頭者以手足主表故用烏頭走表以通行陽氣然必有水飲內蓄以致陽氣不溫於手足故用半夏茯苓行飲細辛散水氣以去內寒也腹痛脈弦而緊弦則衛氣不行即惡寒緊則不欲食邪正相搏即為寒疝繞臍痛若發則白汗出手足厥冷其脈沉緊者大烏頭煎主之疝屬肝經為陰寒冷濕之病肝經抵小腹宜止小腹痛此云腹痛並繞臍痛者篇首所謂虛寒從下上也衛氣行於表弦為肝脈亦陰脈以陰病而見陰脈表上陽虛故惡寒也緊則為寒寒停胃口故不欲食白汗者囊中冷濕出陰汗也手足厥冷陽衰不溫於四末也脈沉緊者寒在裡也緊則為寒沉為在裡故主大烏頭煎以溫之或云汗從皮毛中出肺合皮毛其色白故名白汗烏頭煎方烏頭大者五枚熬去皮不㕮咀上以水三升煮取一升去渣納蜜二升煎令水氣盡取二升強人服七合弱人肌五合不差明日更服不可一日再服烏頭性輕疏而氣剽悍故能散寒逐濕止用此一味取其力專而行速也但恐過於猛峻故用蜜煎甘以緩之且解毒也寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯主之疝屬肝病肝藏血其經布脅肋腹脅並痛者血氣寒而凝澀也當歸通經活血生薑溫中散寒裡急者內虛也用羊肉補之內經云形不足者溫之以氣精不足者補之以味是也當歸生薑羊肉湯方當歸三兩生薑五兩羊肉一斤上三味以水八升煮取三升溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加橘皮二兩白朮一兩加生薑者亦加水五升煮取三升二合服之寒多加生薑辛以散之也痛多而嘔者加橘皮散逆白朮補中寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當烏頭桂枝湯主之腹痛寒結於內也手足逆冷不仁身痛寒徹於外也此中外皆寒故用烏頭溫中散寒佐桂枝以行陽走表烏頭桂枝湯方烏頭上一味以蜜二斤煎減半去渣以桂枝湯五合解之令得一升後初服二合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病服藥如醉狀藥力行也得吐為中病者疝屬肝病肝屬木內經云木鬱則達之肝喜疏泄故也其脈數而緊乃弦狀如弓弦按之不移脈數弦者當下其寒脈緊大而遲者必心下堅脈大而緊者陽中有陰可下之此亦疝病也蓋疝乃肝病弦屬肝脈緊者如轉索無常弦與緊相似其脈數而緊乃弦者謂數有轉動之勢似乎緊脈其實非數而緊乃數而弦也恐人不知弦脈體狀故又以弓弦比之脈數弦者仍是數而弦非數而緊矣蓋數者邪氣乘之急也與數為熱異弦者陰寒斂之深也當下其寒者以沉寒蘊結於中必通利之而後消散也脈大者邪盛也兼緊與遲仍屬寒邪內結故心下堅又脈大為陽大則病進脈緊為陰緊為裡實故云陽中有陰可下之與當下其寒相應即前節大黃附子湯其脈緊弦此寒也以溫藥下之之意問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食大承氣湯主之方見前腸胃脈不應在寸口脈浮大亦不主宿食其知有宿食者在按之反澀尺中亦微而澀二句蓋澀者津液閉結之脈初覺浮大按之反澀則沉而澀矣沉為在裡澀為氣滯又尺中正應大腸部分亦微而澀故知有宿食也然宿食脈應滑大今微澀者何也本經云趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約麻仁丸主之可與此參看王三陽曰尺澀亦有屬血虛者須審外證惡食氣否及胸膈飽悶否方是宿食脈數而滑者實也此有宿食可下之宜大承氣湯滑者水穀之氣勝也若滑而兼數則實熱已入胃府矣經云數則為熱故云有宿食可下之下利不欲食者有宿食也當下之宜大承氣湯下利裡虛則欲食其不欲食者宿食氣滯不能推陳致新也故當下之宿食在上脘當吐之宜瓜蒂散食入腸胃則宜下食在上脘則未曾入胃氣從上湧為便內經云其高者因而越之吐是也上脘在臍上五寸足陽明手太陽任脈之會瓜蒂散方瓜蒂一分熬赤小豆一分煮上二味杵為散以香豉七合煮取汁和散一錢匕溫服之不吐者少加之以快吐為度而止亡血及虛者不可與之瓜蒂香豉味若赤小豆味酸內經云酸苦湧泄為陰是也脈緊如轉索無常者有宿食也緊為裡實故知有宿食然必沉而緊也若浮而緊則風寒在表安可遽為宿食乎轉索無常四字形容緊脈最妙譬如絞索一般不轉則不緊愈轉則愈緊若有外感者脈愈轉愈緊以致陰寒斂束筋骨痛而無汗其成裡實者脈亦愈轉愈緊以致邪氣深入而宿食搏聚此命名緊脈之精義也脈緊頭痛惡風寒腹中有宿食不化也此脈與證似傷寒而非傷寒者以身不疼腰脊不強故也然脈緊亦有辨浮而緊者為傷寒沉而緊者為傷食甲乙經云人迎緊盛傷於寒氣口緊盛傷於食左為人迎右為氣口俱在關前一分則寒與食又以左右手為辨耳若頭痛惡風寒為表證何以知有宿食曰此非表證也傷寒十棗湯有頭痛證彼以心下停飲水氣泛溢故頭痛此以胃有宿食穀氣熏蒸故亦頭痛也白虎湯有背微惡寒證彼以陽氣內陷故外微惡寒此以胃氣內郁故外亦惡風寒也然既有宿食仲景不言下法若欲下之宜大柴胡湯或厚朴七物湯小柴胡加芒硝湯之類李瑋西曰冬時正傷寒而外又有類傷寒數證痰積傷食虛煩腳氣疝氣等今脈緊頭痛惡風寒乃傷食之類傷寒者也五臟風寒積聚病脈證治第十一身形衛外五臟居中則五臟何以有風寒也內經云五臟有合痹久而不去者內舍於其合也故骨痹不已舍於腎筋病不已舍於肝脈痹不已舍於心肌痹不已舍於脾皮痹不已舍於肺此五臟在內而實外與身形通者也經又以春甲乙傷風者為肝風夏丙丁傷風者為心風季夏戊已傷風者為脾風秋庚申中風者為肺風冬壬癸中風者為腎風此五臟因四時而受風寒者也且太陽經行身之背凡俞穴亦皆在背風寒從俞而入而俞有一定在背者亦有不定在背隨四時為轉移者如肺俞在三椎下心俞在五椎下肝俞在九椎下脾俞在十一椎下腎俞在十四椎下與臍平各去脊中二寸此俞之一定在背者也其不一定在背者如內經云東風生於春病在肝俞在頸項南風生於夏病在心俞在胸脅西風生於秋病在肺俞在肩背北風生於冬病在腎俞在腰股中央為土病在脾俞在脊此俞之不定在背而五臟風寒隨四時之俞而入之者也然則俞果有不定者乎曰其在背者俞之穴也在頸項胸脅等處者此氣之所出入而隨四時以為貫輸者非穴也氣也此五臟所以有風寒而風寒以中五臟者為重也難經云積者五臟之所積聚者六腑之所聚也肝之積名肥氣在左脅下如覆杯有頭足心之積名伏梁起臍上大如臂上至心下脾之積名痞氣在胃脘覆大如盤肺之積名息奔在右脅下覆大如杯腎之積名奔豚上下無時茲篇雖積聚並舉後但言積不言聚者以臟病為重也然難經但言積之證不及積之脈茲篇既言證而更言積聚之脈各應其部者又補難經之所未及者歟肺中風者口燥而喘身運而重冒而腫脹內經云臟真高於肺以行榮衛陰陽蓋肺主氣肺氣不和風邪得以中之於是氣擁而津液不行故口燥氣逆而呼吸不利故氣喘也又正氣虛則身運而冒邪氣盛則身重而腫脹靈樞經云肺病脹滿膨膨而喘咳胸滿而瞀是也瞀目不明也即冒狀肺中寒吐濁涕五液入肺為涕肺合皮毛開竅於鼻寒邪從皮毛而入於肺則肺竅不利而鼻塞涕唾稠黏壅遏不通並出於口也肺死臟浮之虛按之弱如蔥葉下無根者死肺脈原浮然以浮而有力為佳若無力是浮之虛也脈弱如蔥葉有似芤脈之狀但芤脈中間無浮沉有猶為有根故止於傷精失血而不至於死若下無根則不惟中間無而沉之亦無矣是謂氣血俱脫故死肝中風者頭目瞤兩脅痛行常傴令人嗜甘肝經上出額與督脈會於巔又肝開竅於目目得血而能視肝中風則頭目瞤動以風性動搖靡定經云風勝則動是也肝經布脅肋脅痛肝氣不利也肝主筋而藏血行常傴者風燥血枯筋失所養而攣急傴者背曲不能伸也嗜甘者經云肝苦急急食甘以緩之之理也肝中寒者兩臂不舉舌本燥喜太息胸中痛不得一轉側食則吐而汗出也肝藏血寒則血脈凝澀而兩臂不舉本經中風歷節篇云或但臂不遂者此為痹是也舌本燥者肝脈循喉嚨之後上入頏顙寒則津液閉而不流靈樞云肝病嗌乾是也肝屬木性宜疏暢喜太息者肝氣鬱而不伸也肝經上貫膈布脅肋寒邪凝斂經氣不利故胸中痛不得轉側也靈樞云肝脈挾胃所生病者胸滿嘔逆今食則吐者胃冷不納食也又吐則倉廩倒出津液外泄故腠理開而汗亦隨之而出也肝死臟浮之弱按之如索不來或曲如蛇行者死肝脈宜沉若浮之弱謂舉之無力也按之如解索是絕脈也不來者即代脈往而不能自還精氣脫也經云肝脈沉而弦長若曲如蛇行則不弦不長失肝脈之本體而胃氣絕矣故死肝著其人常欲蹈其胸上先未苦時但欲飲熱旋覆花湯主之方缺肝主疏泄著則氣鬱不伸常欲人蹈其胸上以舒其氣蹈者按摩之謂又以寒氣固結於中欲飲熱以散其寒旋覆花咸能軟堅且主下氣溫能解散可利心胸也心中風者翕翕發熱不能起心中飢食即嘔吐心屬火中風則風火相熾翕翕者熱氣鬱悶不散之貌心飢食即嘔吐者經云邪熱不殺穀諸逆衝上皆屬於火故也心中寒者其人苦病心如啖蒜狀劇者心痛徹背背痛徹心譬如蠱注其脈浮者自吐乃愈心屬火為寒氣斂束則火鬱不得散故心如啖蒜狀嘈雜不耐煩之意也劇甚也甚則心背徹痛寒之極也蠱疰病宜吐若脈浮則病在上膈故如蠱疰自吐出寒氣乃愈然曰自吐則不可強之使吐明矣按蠱者粵人以蟲蛇諸毒聚瓷中令自相啖食食盡止存一蟲最毒名曰蠱能隨飲食變化入腹還生食人五臟注者疰也亦言住也若人血氣衰弱則風邪鬼氣住人身內留連肌腠並著臟腑或皮膚掣動或心腹刺痛或體熱皮腫至死死復注易旁人心傷者其人勞倦即頭面赤而下重心中痛而自煩發熱當臍跳其脈弦此為心臟傷所致也勞倦則陰火攻衝故頭面赤也下重者火升於上而下部沉滯無氣以舉也心主血心痛自煩發熱皆血虛火升之證經云臍上築者腎氣動也此心氣虛而水寒欲上凌心故當臍跳也弦乃風脈心病見此虛火上炎熱極生風也李升璽曰按難經心脈外證面赤口乾內證臍上有動氣煩心心痛此節心傷亦本難經心死臟浮之實如麻豆按之益躁疾者死難經云心脈浮大而散若浮之實如麻豆按之益躁疾則真臟脈見胃氣全無故死內經云真心脈至堅而搏即躁疾意如循薏苡子累累然即如麻豆意可與此參看邪哭使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人畏合目欲眠夢遠行而精神離散魂魄妄行陰氣衰者為癲陽氣衰者為狂此言肺肝腎三臟俱虛而總之統於心虛也內經云肺藏魄主氣肝藏魂主血腎藏精主志又云肺主哭精氣並於肺則悲並於肝則憂並於腎則恐而心則藏神以心為君主之官也心虛則肺肝腎俱虛因而魂魄不安精氣血皆竭此主不明則十二官危也其人則畏以心舍空虛神不守舍也經云五臟精華上注於目合目欲眠精華去也夢遠行者心腎精神離散肝肺魂魄妄行故夢寐中飄搖靡定也陰氣收斂不能暴發故陰衰為癲陽氣慓悍易於發越故陽衰為狂然內經云重陽者狂重陰者癲與此陰衰陽衰相反何也蓋彼云重陽重陰者以邪氣言此云陰衰陽衰者以正氣言也內經云骨癲疾者顑齒諸腧分肉皆滿而骨居汗出煩悗筋癲疾者身蜷攣急脈癲疾者暴僕四肢脈皆脹而縱又云有病怒狂者陽氣暴折而難決故喜怒名陽厥也又陽明病甚則陽盛而四肢實故登高棄衣妄言罵詈不食也難經云狂之始發少臥不飢自高賢也自辯智也自貴倨也妄笑好歌樂妄行不休癲始作意不樂直視僵仆又狂則暴病癲則久病又狂多開目陽蹻盛也癲多閉目陰蹻盛也脾中風者翕翕發熱形如醉人腹中煩重皮目瞤瞤而短氣翕翕發熱風邪外加正氣怫鬱也風氣疏泄屬陽邪形如醉人言其面赤而四肢軟也脾主四肢脾經入腹因風氣內擾故腹中煩重皮目上下眼胞也脾屬土眼胞亦屬土瞤瞤動貌經云風勝則動是也肺主氣短氣者東一垣云脾胃一虛肺氣先絕也脾死臟浮之大堅按之如覆杯潔潔狀如搖者死內經云脈弱以滑是有胃氣浮之大堅則胃氣絕真臟脈見矣杯覆則內空潔潔者此中毫無所有之象重按脈體似之言其外實中空裡氣不足也狀如搖者脈躁疾不寧氣將脫也故死趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約麻子仁丸主之趺陽胃脈也胃為水穀之海浮為陽脈故胃氣強而能食小便數則津液亡故脈澀蓋脾主為胃行津液此以胃強脾弱約束津液不得四布但輸膀胱致小便數而大便堅也麻子仁丸通腸潤燥麻子仁丸方麻子仁二升杏仁一升芍藥半斤大黃一斤枳實一斤厚朴半斤上六味末之煉蜜和丸如梧子大飲服十丸日三以知為度大黃厚朴枳實即小承氣湯苦以泄之也麻仁潤燥杏仁利氣芍藥斂津液而通壅塞以但津液內亡非同實熱故不用湯之峻而用丸之緩也腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣里冷濕久久得之腰以下冷痛腹重如帶五千錢甘姜苓朮湯主之此非內傷虛損乃外感寒濕故名腎著著者留而不去之謂言腎為邪氣所著也蓋腎為水臟水性本濕同氣相感所受皆陰寒濕滯之病故體重腰冷如坐水中帶脈為病亦腰溶溶如坐水中內經云寒勝則浮故形如水狀而體若虛腫也不渴內無熱也小便利水泉不藏腎氣不自秘固也飲食如故病不在胃也腎在下濕性亦趨下故病在下焦身勞汗出言所以成腎著之故因煩勞而津液外泄衣里冷濕汗亦濕類也腰者腎之府腰下冷痛寒濕氣勝也腹重土不制水濕氣深沉也脾屬土其經入腹如帶五千錢形容腹重之狀也甘草乾姜茯苓白朮湯方即名腎著湯甘草二兩乾薑四兩茯苓四兩白朮二兩上四味以水五升煮取三升分溫三服腰中即溫甘草白朮補脾制水茯苓乾薑滲濕祛寒然經云損其腎者益其精則宜用腎氣丸之類而主此方者以寒濕外著故主溫中滲濕之劑此形勞與精傷者不同也腎死臟浮之堅按之亂如轉丸益下入尺中者死腎脈宜沉石而濡音軟若浮之堅則不惟不沉而且不濡是無胃氣之脈內經謂腎脈辟辟如彈石曰死是也亂如轉丸下入尺中則陽氣下陷根本脫離之象內經云脈至如丸滑不直手者按之不可得也棗葉生而死此脈如轉丸可參看三焦竭部上焦竭善噫何謂也師曰上焦受中焦氣未和不能消穀故能噫耳下焦竭即遺溺失便其氣不和不能自禁制不須治久則愈經云上焦如霧中焦如漚下焦如瀆言各有其常何病之有惟三焦各有虛竭之部分是謂三焦竭部而各失其常矣竭氣盡無餘也噫即噯氣內經云心為噫又云太陰上走心為噫蓋陰盛而上走陽明陽明絡屬心也夫心在上焦太陰陽明在中焦必中焦胃納水穀脾行津液其氣始得熏蒸灌溉於上焦此上焦受中焦和氣之義也若中焦脾胃不和不能消穀則氣餒矣上焦亦何由而受中焦之熏蒸灌溉也昔賢謂噫者是火土之氣鬱而不得發正以心屬火居膈上脾胃屬土主中州則上焦受中焦之義益明矣又下焦腎主二便今腎氣竭失其閉藏之職不得約束津液而遺溺失便也不須治久則愈待腎氣充足則津液自閉固矣李瑋西曰上焦受中焦氣可見以中焦為主即遺溺失便亦中焦不和而致下焦之竭也東垣云補腎不如補脾則中下二焦輕重較然矣師曰熱在上焦者因咳為肺痿熱在中焦者則為堅熱在下焦者則尿血亦令淋閉不通大腸有寒者多鶩溏有熱者便腸垢小腸有寒者其人下重便血有熱者必痔此言三焦之有寒有熱者其受病各不同也肺屬金畏火居膈上位在上焦若熱氣上壅則咳而肺熱葉焦為肺痿熱在中焦則入陽明胃府為實熱證故為堅熱在下焦者尿血腎虛而膀胱熱也古人云見血無寒淋閉不通即膀胱不利為癃也鶩溏也鴨性冷糞多清水為鶩溏大腸有寒者似之便腸垢大腸蓄熱不清也小腸有寒則氣滯而血凝不行故下重便血有熱者必痔以小腸與心為表裡內經云諸痛癢瘡皆屬心火又云腸澼為痔是也問曰病有積有聚有䅽氣何謂也師曰積者臟病也終不移聚者府病也發作有時展轉痛移為可治䅽氣者脅下痛按之則愈復發為䅽氣諸積大法脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍旁上關上積在心下微下關積在少腹尺中積在氣衝脈在左積在左脈在右積在右脈兩出積在中央各以其部處之䅽氣即本經首篇䅽飪之邪宿食是也䅽氣傷脾脾之大絡布脅肋而脅下章門穴為脾之募故脅下痛按之則氣散而愈或氣聚而復發也積為臟病深入在裡故脈細而附骨也寸關尺上下左右別積病之所在皆指細而附骨之部分即內經前以候前後以侯後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也積聚解見前總論中痰飲咳嗽病脈證治第十二咳動脾濕曰痰水停心下曰飲所由分矣茲由本篇觀之五臟俱有痰飲不獨在脾猶內經五臟俱有咳嗽不獨在肺也且飲有四此獨以痰飲名篇總之水積為飲飲凝為痰則分而言之飲有四合而言之總為痰飲而已然有痰者必致咳則因痰飲而類及咳嗽咳者無痰有聲肺氣傷而不清也嗽者無聲有痰脾氣虛而聚濕也咳嗽是有痰有聲因傷肺氣而咳動於脾濕而嗽也本篇後數條有云嗽家其脈弦為有水又云支飲咳煩又云久咳有支飲在胸中故也豈非咳嗽起於痰飲痰飲必致咳嗽二證每相為終始哉然咳嗽有自外感者風寒暑濕先自皮毛而入皮毛者肺之合故雖外邪欲傳臟腑亦必先從其所合而為嗽此自外入者也有自內發者七情飢飽內有所傷則邪氣上逆肺為氣出入之道故五臟之邪上蒸於肺而為嗽此自內發者也然風寒暑濕亦有不為嗽者蓋所感者重竟傷本臟不留於皮毛也七情亦有不為嗽者蓋病尚淺止在本臟未即上攻也若本篇則咳嗽因於痰飲痰飲多致咳嗽故痰飲與咳嗽相兼併論也問曰夫飲有四何謂也師曰有痰飲有懸飲有溢飲有支飲問曰四飲何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳唾引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲咳逆倚息短氣不得臥其形如腫謂之支飲水飲內漬則肌肉外消故素盛今瘦腸間有聲水氣流注也飲之稠者即凝為痰故為痰飲脅在身之兩旁經云左右者陰陽之道路水流脅下則氣道壅塞不利且脅下為肝經部分肝脈入肺中故或咳或唾牽引而痛也懸飲者如懸空傾瀉飛瀑四射也四肢者諸陽之本水歸四肢則陽氣浮越汗出則水散不汗出則水停體疼且重以水性沉著故也溢者氾濫之義言水飲橫流激逆故為溢飲水寒射肺故咳逆倚息短氣也水來乘土胃氣上逆經云胃不和則睡不安故不得臥也其形如腫濕氣浸淫也支者支撐之意與傷寒論心下支結後條水在肝脅下支滿之支同義言水在腹脅鶻突下不安故為支飲李時珍曰飲有五皆因內啜水漿外受濕氣郁為留飲流於腸胃則為痰飲流於肝則為懸飲流於經絡則為溢飲流於肺則為支飲流於心下則為伏飲水在心心下堅築短氣惡水不欲飲心屬火惡水水在心則心下堅硬而築築然動悸心火不安也短氣者水飲內蓄氣道不利也惡水心下水多也水在肺吐涎沫欲飲水五液入脾為涎水在肺而吐涎沫者子能令母虛脾不攝誕也土生金肺為脾子欲飲水者涎沫去而津液亡也水在脾少氣身重水在脾而少氣者以肺主氣脾土既虛不能生肺金也身重者脾主肌肉濕氣勝也水在肝脅下支滿嚏而痛肝經布脅肋故水在肝則脅下支滿嚏出於鼻鼻者肺之竅肝脈上注肺二臟經脈相通故嚏則脅下亦牽而痛也水在腎心下悸腎經水氣凌心故心下悸悸者動也夫心下有留飲其人背寒冷如手大內經云背者胸中之府心在胸中其系則附於背心俞在脊之第五椎又云背為陽陽中之陽心也故心下留飲則陰寒氣徹於背而陽氣衰息背寒冷如手大也留飲者脅下痛引缺盆咳嗽則轉甚留飲水飲停留不散也肝經布脅肋飲留脅下則肝氣不利故呼吸窘迫痛引缺盆咳嗽則缺盆痛轉甚膽經合缺盆病則缺盆中腫痛肝膽相為表裡篇首云飲後水流在脅下咳唾引痛為懸飲此其是也胸中留飲其人短氣而渴四支歷節痛胸中留飲病在肺虛不能通調水道分布津液故短氣而渴也四支歷節痛經云濕流關節也首節飲水流行歸於四支身體疼重為溢飲此其是也脈沉者有留飲經云沉潛水蓄是也膈上病痰滿喘咳吐發則寒熱背痛腰痛目泣自出其人振振身瞤劇必有伏飲膈上痰滿喘咳吐飲逆於上也寒熱腰背痛目泣出飲搏於外也振振身瞤劇水飲泛溢正氣虛也飲流心下為伏飲伏飲者飲伏於中證見於外如此夫病人飲永多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣心肺俱在膈上水寒射肺肺氣上逆故喘滿短氣經云形寒飲冷則傷肺是也水停心下則水氣凌心心火不安故悸脈雙弦者寒也皆大下后里虛脈偏弦者飲也雙弦者兩手脈俱弦偏弦者一手脈獨弦也弦為肝脈由大下後脾氣虛寒木來乘土故見雙弦之脈若未經大下而有飲者以脾虛不能運化精微而制水氣亦為肝木所侮故猶見偏弦之脈但不似雙弦之甚耳後云脈沉而弦者懸飲內痛此為懸飲可知矣肺飲不弦但苦喘短氣弦為肝脈故肺飲不弦苦喘短氣肺邪迫塞也首節云咳逆倚息短氣為支飲是也支飲亦喘不能臥加短氣其脈平也支飲病在肺其本在腎經云不得臥臥則喘者水氣之客也夫水者循經液而流也腎者水臟主津液主臥與喘也東垣云不得臥臥則喘者水氣逆行乘於肺肺得水而浮使氣不得流通也脈平者謂適得肺之本脈如雲肺飲不弦是也弦即脈不平矣病痰飲者當以溫藥和之中氣虛寒不能腐熟水穀運化精微故積為痰飲溫藥和之則痰飲自散以脾胃喜溫惡寒也心下有痰飲胸脅支滿目眩苓桂朮甘湯主之苓桂朮甘湯方茯苓兩四桂枝白朮各三兩甘草二兩上四味以水六升煮取三升分溫三服小便則利胸脅支滿痰飲停滯於中也目眩痰飲濁氣熏蒸於上也茯苓淡滲以利水飲桂枝宣導以行陽氣白朮去濕健脾甘草和中益氣同為補土製水之劑夫短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之方見虛勞水飲停積有二因一因脾土衰不能制水一因腎主水為胃之關腎虛關門不利故積飲於中此利小便為行飲要法苓桂朮甘湯內有白朮茯苓補土以利小便脾土旺則飲自行此治脾虛停飲之劑也腎氣丸內有茯苓澤瀉補腎以利小便關門通則飲自去此治腎虛停飲之劑也然肺主氣短氣有微飲是肺氣虛滯不能通調水道下輸膀胱也今補脾制水以利小便則土旺生金而小便利矣脾屬土肺屬金補腎壯水以利小便則子能令母實而肺氣亦利矣腎屬水是肺之子夫脾腎兩補肺氣旋通有何微飲之不去乎此制方之妙義也病者脈伏其人慾自利利反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之飲伏於中故脈亦伏欲自利利反快留飲欲去之兆心下續堅滿留飲欲去而來得盡去也要看續字甘遂半夏湯方甘遂大者三枚半夏十二枚以水一升煮取半升去渣芍藥五枚甘草如指大一枚上四味以水二升煮取半升去渣以蜜半升和藥汁煎取八合頓服之甘遂為直決水飲之藥半夏辛以散之白芍入脾經斂陰氣而通壅塞非酸收之義也緩以甘草潤以白蜜恐甘遂過於峻利故耳李瑋西曰甘遂與甘草性相反今並用之者反則使二藥自相攻擊水飲自排蕩而去矣脈浮而細滑傷飲飲脈當沉今脈浮者水在肺也細為虛濕滑為痰飲脈弦數有寒飲冬夏難治弦者氣斂而不條暢前節云脈偏弦者飲也數者氣虛而不紆徐經云數則為虛皆邪盛正衰寒飲凝結之脈冬夏難治以水飲旺於冬夏伏陰在內也然冬夏難治則春秋當易治矣以春屬肝木正水飲泄氣之時且肝主疏泄可以行飲脈弦者肝之邪氣春令者肝之正氣正氣旺則邪氣消秋屬肺金肺主通調水道散飲利痰也脈沉而弦者懸飲內痛病懸飲者十棗湯主之脈沉為水蓄弦乃肝邪內痛咳唾引脅下痛也十棗湯方大戟芫花熬甘遂各等分上三味搗篩以水一升五合先煮肥大棗十枚取八合去渣納藥末強人服一錢匕羸人服半錢平旦溫服之不下者明日更加半錢得快利後糜粥自養三物皆味苦苦以泄之能直達水飲窠囊之處但恐峻利泄人真元故加大棗甘以緩之且棗為脾果補土所以制水也病溢飲者當發其汗大青龍湯主之小青龍湯亦主之方見肺痿溢飲病在四肢屬表證故主大青龍發汗然小青龍主行飲而亦主發汗者內有麻黃桂枝細辛皆表藥也大青龍湯方麻黃六兩去節桂枝二兩去皮杏仁四十個去皮尖甘草二兩炙生薑三兩大棗十二枚石膏如雞子大碎上七味以水九升先煮麻黃減二升去上沫納諸藥煮取三升去渣溫服一升取微似汗汗多者溫粉粉之大青龍湯原治風寒外壅而閉熱於經者今以之治溢飲則飲從汗出無不瀰漫透徹故湯名大青龍內經所謂陽之汗以天地之雨名之是也李時珍曰仲景治傷寒太陽證心下有水氣表不解者用小青龍湯治未解表邪使飲從毛竅出內經所謂開鬼門法也其表已解用十棗湯驅逐里邪使水飲從二便出所謂潔淨府去陳莝法也膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之虛者即愈實者三日復發復與不愈者宜木防己湯去石膏加茯苓芒硝湯主之喘滿痞堅膈間支飲逆上也面黑者飲屬北方水色也脈沉為飲緊為寒皆陰脈以水飲稟陰寒之氣也吐下俱行不愈則陰陽之氣俱虛木防己湯補虛散飲虛者受補即愈實者飲邪固結不解故復發復與不愈乃寒氣凝聚未解故去石膏恐寒胃也加茯苓淡以滲飲芒硝咸以軟堅木防己湯方木防己三兩石膏十二枚雞子大人參四兩桂枝二兩上四味以水六升煮取二升分溫再服防己利水入膀胱經以泄水飲於下石膏味辛能解肌出汗以散水飲於外人參補中氣以制水桂枝行陽氣以逐水也木防己去石膏加茯苓芒硝湯方木防己桂枝各三兩人參茯苓各四兩芒硝三合上五味以水六升煮取二升去滓內芒硝再微煎分溫再服微利則愈心下有支飲其人苦眩冒澤瀉湯主之澤瀉湯方澤瀉五兩白朮二兩上二味以水二升煮取一升分溫再服地氣上為云則天漢為之昏沉支飲熏蒸於上則頭目為之眩冒內經云清陽出上竅以支飲濁氣上蒸蔽其清明之氣故也澤瀉行飲白朮補土以制飲也支飲胸滿者厚朴大黃湯主之厚朴大黃湯方厚朴一尺大黃六兩枳實四枚上四味以水五升煮取二升分溫再服支飲至於胸滿則水氣愈泛溢矣用厚朴大黃湯行飲然此節小承氣湯也以胸滿而非腹滿故不用大承氣或問曰行飲何不用十棗五苓青龍等湯而用厚朴大黃湯以瀉脾胃何也曰胃納水穀脾行津液二經如常則水飲何自而蓄哉以脾胃土也凡土弱則水勢為之崩潰土壅則水道為之不通今支飲胸滿因脾胃不運則中焦塞窒下流壅淤水無從泄故逆行而至於胸滿今疏敦阜之土以決橫逆之波瀉中州之實以浚下流之壅則舍厚朴大黃湯奚屬哉此禹治水先掘地而注之海也支飲不得息葶藶大棗瀉肺湯主之方見肺癰肺主氣而惡寒支飲不得息水寒射肺肺氣上逆也葶藶疏肺壅而止咳嗽定喘促而消痰飲佐以大棗即十棗湯之意嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之此專以治嘔言嘔家渴者為欲解以胃中陽氣得復也若心下有支飲則濕漬泛溢不渴而嘔半夏生薑溫能和胃氣辛能散逆氣為嘔家聖藥小半夏湯方半夏一升生薑半斤上二味以水七升煮取一升半分溫再服腹滿口舌乾燥此腸間有水氣已椒藶黃丸主之腹滿水聚於胃也腸間有水氣則濕漬中焦津液不為灌溉故口舌乾燥篇首雲水走腸間瀝瀝有聲為痰飲此腸間有水氣即痰飲也己椒藶黃丸方防己椒目葶藶熬大黃各一兩上四味末之蜜丸如梧子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩服一丸疑有誤本草十劑云泄可去閉葶藶大黃之屬二藥皆大苦寒一泄氣閉一泄血閉水飲無所容矣椒目溫中下氣防己利水行經為治水之要藥芒硝味辛鹹今人但取其咸不用其辛殊不知其辛潤腎燥故渴者加之卒嘔吐心下痞膈間有水眩悸者半夏加茯苓湯主之水停心下成痞水逆於上則在膈間故令卒然嘔吐濁亂其清陽而汩沒其神明則眩悸眩目昏也悸心動也半夏生薑止嘔加茯苓以行飲半夏加茯苓湯方半夏一升生薑半斤茯苓六兩上三味以水七升煮取一升五合分溫再服假令瘦人臍下有悸吐涎沫而癲眩此水也五苓散主之腎主水臍下悸者腎氣上奔也脾主涎吐涎沫者脾虛不攝液也癲眩水氣熏蒸神明濁亂也瘦人氣不充足故病此五苓散補脾利水溫經行陽徹表裡而治之此治瘦人水飲例也五苓散方茯苓三分豬苓三分去皮澤瀉一兩一分白朮三分桂枝二分去皮上五味為末白飲服方寸匕日三服多飲暖水汗出愈白朮補土燥濕茯苓豬苓澤瀉使水從小便中泄去桂枝發汗泄奔豚之氣多飲暖水助之令汗出愈使水從毛竅中散去也則開鬼門潔淨府一舉兩得之矣咳家其脈弦為有水十棗湯主之前云脈沉而弦者懸飲內痛此脈弦為懸飲也水寒射肺故咳十棗湯解見前夫有支飲家咳煩胸中痛者不卒死至一百日或一歲宜十棗湯水流於肺為支飲咳煩肺病也前支飲胸滿此胸中痛則水飲內窒氣道更自不通百日或一歲飲蓄已深非十棗湯不除久咳數歲其脈弱者可治實大數者死其脈虛者必苦冒其人本有支飲在胸中故也治屬飲家久咳則肺氣已虛經云脈弱以滑是有胃氣且脈與病相應故可治若實大數則邪盛正衰真臟脈見胃氣全無土敗不能生金故死今人論脈將虛弱二字並說者非也蓋弱在沉脈內見虛在浮脈上見此虛脈泛泛在上按之無力乃水飲浮越之象苦冒者濁氣熏蒸於上經云上虛則眩又云心下有支飲其人苦眩冒是也咳逆倚息不得臥小青龍湯主之小青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時覆冒者與茯苓桂枝五味甘草湯治其氣衝沖氣即低而反更咳胸滿者用桂苓五味甘草湯去桂加乾薑細辛以治其咳滿咳滿即止而更復渴沖氣復發者以細辛乾薑為熱藥故也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復納半夏以去其水茯苓桂枝五味甘草湯去甘草去桂加細辛乾薑半夏湯主之水去嘔止其人形腫者加杏仁主之其證應納麻黃以其人遂痹故不納之若逆而納之者必厥所以然者以其人血虛麻黃髮其陽故也若面熱如醉此為胃熱上衝熏其面加大黃以利之咳逆倚息不得臥支飲也小青龍湯解義見前長於行飲故主之下已者服小青龍藥後也多唾水飲泛溢也口燥津液不行也寸脈宜浮而反沉經云沉潛水畜也尺脈微者尺脈主腎水飲下流腎氣虛衰也手足厥逆或痹即本經飲水流行歸於四支是也氣從小腹上衝胸咽欲作奔豚也面翕熱如醉狀胃熱上衝熏其面也復下流陰股小便難者水性趨下濕濁瘀塞下流水道不利也時覆冒濁氣上蒸清陽眩亂也余義見後方解下桂苓五味甘草湯方桂枝四兩去皮茯苓四兩五味子半斤甘草一兩炙上四味以水八升煮取三升去渣分溫三服桂枝使水飲外散茯苓使水飲下行甘草補土以防水五味子收斂肺氣使氣不上衝以通調水道下輸膀胱也桂苓五味甘草湯去桂加乾薑細辛湯方茯苓四兩五味子半升甘草乾薑細辛各三兩上五味以水八升煮取三升去渣溫服半升日三咳者水寒射肺裡氣逆也胸滿者經云臟寒生滿病又云胃中寒則脹滿桂枝走表不主裡故去之加乾薑溫中以散逆氣細辛散水以去內寒故咳滿俱治桂苓五味甘草湯去甘草去桂加乾薑細辛半夏湯方茯苓四兩五味子半升乾薑細辛各二兩半夏半升上五味以水八升煮取三升去渣溫服半升日三支飲渴止水寒內漬臟腑不溫也濁氣上蒸故冒寒飲泛逆故嘔去甘草嘔家不喜甘故也半夏辛溫能散逆止嘔且性燥兼去水也苓甘五味姜辛半夏加杏仁湯方於前湯加杏仁半升去皮尖余依前法煎服形腫水飲外薄也杏仁利氣氣行則飲散矣苓甘五味姜辛半杏加大黃湯方於前方加大黃三兩余依前法煎服加大黃去胃熱所謂陽有餘以苦瀉之是也李升璽曰已上五方皆從小青龍湯加減變化是知小青龍湯為行飲之主方也先渴後嘔為水停心下此屬飲家小半夏茯苓湯主之先渴則飲水多水停心下遂逆而嘔半夏生薑辛以散之可止嘔茯苓淡以滲之能行飲也消渴小便利淋病脈證治第十三素問云二陽結謂之消二陽者足陽明胃也又云心移熱於肺為鬲消又云癉成為消中則消者熱證也故消有三飲水多而小便多曰消渴此上消也經謂之鬲消消穀善飢不甚渴小便數而消瘦者經謂之消中此中消也渴而飲水不絕腿瘦而小便有脂者經謂之腎消此下消也所以名為消者一從火斷如火能消物也若小便之利與不利悉以膀胱為主蓋膀胱藏精液氣化則小便出經所謂膀胱不利為癃不約為遺溺又云實則癃閉虛則遺溺是也然膀胱雖主小便而飲入於胃由肺以通調水道是肺實為生化之源故曰水出高源也淋病者腎虛而膀胱熱也腎虛則小便數膀胱熱則水道澀其證小便澀痛常急欲溺及去點滴莖中痛極有氣淋血淋砂石淋膏淋勞淋五者之別淋與白濁異者濁病在精道淋病在溺道其源又不同經云脾受積濕之氣小便黃赤甚則淋又云風火鬱於上而熱其病淋則淋病概可知矣厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食即吐蛔下之利不止此條見傷寒論厥陰篇本說厥陰傷寒有消渴證意不專在消渴也今在本經則但論消渴旁引傷寒見消渴亦有屬陰證虛寒者之不同也或曰厥陰何能成熱而為消渴乎答曰厥陰消渴成無己注為傳經熱邪不知此為直中陰經故消渴氣上衝心心中疼熱皆陰盛格陽冷極似火如傷寒少陰篇云虛故引水自救以明其津液之竭也又內經云心移熱於肺為肺消飲一溲二死不治則陰寒何嘗不作消渴乎觀下文消渴用腎氣丸內有桂附可見且消渴為上消即肺消也故但飲水不欲食若消中則又消穀能食不甚渴矣飢不欲食胃中冷也傷寒六經惟厥陰有蛔厥證以其屬風木氣化故能生蟲蛔聞食臭出故食即吐蛔又經云胃中冷則吐蛔也若果屬熱證則下之當愈何為利不止乎此傷寒論所云厥陰消渴原屬寒證本經掇取原文其意專在消渴而旁引厥陰見消渴又有屬陰寒一證者在也李升璽曰癉成為消中則消渴原屬熱證若厥陰消渴又屬虛寒猶本經熱在上焦者因咳為肺痿然有不咳遺尿為上虛不能制下屬肺冷者可見一病各有寒熱不可拘也寸口脈浮而遲浮即為虛遲即為勞虛則衛氣不足勞則榮氣竭此為上消故脈見寸口脈浮亦主病在膈上經云遲為在臟今見於寸口是肺病也蓋肺主氣虛則衛氣不足心火乘之經所謂心移熱於肺為鬲消是也勞則氣耗而陽亢陰虛故榮氣竭則水衰火熾安得不成消渴乎趺陽脈浮而數浮即為氣數即消穀而大堅氣盛則溲數溲數即堅堅數相搏即為消渴趺陽在足面上即胃經動脈浮數皆陽脈也浮即為氣所謂氣有餘便是火也數即消穀大堅胃中有實熱也氣盛則津液偏滲膀胱而大便愈燥故云溲數即堅此與下節皆屬消中非上消之消渴也然病消中而以消渴名之者因病之統名而命之耳趺陽脈數胃中有熱即消穀引食大便必堅小便即數中消屬胃有熱則自能食而小便亦多津液愈竭故大便堅小便數與上節溲數即堅同意男子消渴小便反多以飲一斗小便一斗腎氣丸主之此腎消也王肯堂曰六味丸壯水之主以制陽光則渴飲不思加桂附益火之源以消陰翳則便溺有節也方見虛勞樓全善曰腎消飲一溲二溲如膏油即膈消消中之傳變王注謂肺臟消爍氣無所持是也蓋肺藏氣肺無病則氣能管攝津液而津液之精微者收養筋骨血脈余者為溲肺病則津液無氣管攝而精微亦隨溲下故飲一溲二而溲如膏油其筋骨血脈無津液以養之故形瘦焦乾也然肺病本於腎虛腎虛則心寡於畏妄行凌肺而移寒與之肺得病消故仲景治渴小便反多者用腎氣丸補腎救肺後人因名腎消及下消也或曰經即云肺消死不治仲景復用腎氣丸治之豈能令其復生歟曰飲一溲二者死不治若飲一未至溲二病尚淺猶為可治故腎氣丸治飲水一斗小便亦一斗之證若小便過於所飲者治亦無及矣脈浮小便不利微熱消渴者宜利小便發汗五苓散主之方見痰飲脈浮微熱邪在表也故宜發汗小便不利消渴熱蓄於中也又宜利小便五苓散內有桂枝是發汗藥也有茯苓豬苓澤瀉是利小便藥也白朮生津止渴壯中氣以灌溉上下且有汗能止無汗則發此方為發汗利小便之兼劑然此但為太陽傷寒之消渴也或問消渴為無津液也五苓散利小便則津液不愈亡而愈渴耶答曰太陽傷寒傳本則渴以熱蓄於中致小便不利今利小便使熱氣從水道中瀉去此釜底抽薪之法是五苓散用以泄熱熱去則津液自生非泄津液也成無己曰此上焦燥也與五苓散生津液和表裡渴欲飲水水入則吐者名曰水逆五苓散主之內有積水故水入則拒格而上吐名曰水逆也五苓散利水故主之渴欲飲水不止者文蛤散主之文蛤散方文蛤五兩上一味杵為散以沸湯和服方寸匕渴飲不止亦水停而津液不布也文蛤咸走腎邪可勝水氣故主之水去則津生而渴止矣淋之為病小便如粟狀小腹弦急痛引臍中小便如粟狀砂石淋也似海水煎鹽之義此膀胱熱而腎虛故小腹弦急痛引臍中淋家不可發汗發汗必便血汗即津液也淋家傷精血已亡津液又為發汗則津液愈竭而繼之以血矣針經云奪血者無汗是陰虛津脫也因汗而便血是迫血妄行也小便不利者有水氣其人苦渴栝蔞瞿麥丸主之水氣停積中焦故小便不下行者津液亦不得上布而渴也栝蔞瞿麥丸方栝蔞根二兩瞿麥一兩茯苓薯蕷各三兩附子一枚炮上五味末之煉蜜丸梧子大飲服三丸日三服不知增至七八丸以小便利腹中溫為知栝蔞根潤燥以生津茯苓瞿麥淡滲而泄水薯蕷入脾肺二經補脾可以制水又肺為水之上源能通調水道而行飲也然水者寒氣也濕則消而去之故佐附子溫經行陽以助膀胱氣化又按五苓散亦治小便不利而渴與此方同為利水生津之劑此用薯蕷即五苓用白朮之義也但五苓兼外有微熱故用桂枝走表此內惟水氣故用附子溫中也小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之蒲灰散方蒲灰七分滑石三分上二味杵為散飲肌方寸匕日三服蒲灰味鹹而走水滑石利竅以通便滑石白魚散方滑石二分白魚二分亂髮二分燒上三味杵為散飲服半錢匕日三服滑石利竅通便白魚下氣泄水亂髮灰味苦通淋行瘀以利水道茯苓戎鹽湯方茯苓半斤戎鹽彈丸大一枚白朮二兩上三味以水六升煎取三升分溫三服茯苓淡以利水道戎鹽咸以走腎邪白朮苦甘補中氣以生津也圖經云戎鹽一名胡鹽生胡地鹽山及西羌北地酒泉福祿城東南角北海青南海赤陶隱居注云胡地鹽有九種今人不能遍識醫家治眼及補下藥多用青鹽疑即戎鹽也渴欲飲水口乾舌燥者白虎加人參湯主之熱燥津液亦熱傷元氣故用白虎清胃解熱加人參益氣生津成無己云此熱客中焦者脈浮發熱渴欲飲水小便不利者豬苓湯主之五苓散治太陽微熱消渴內用桂枝以利水之中兼發汗之義是表裡雙解法也豬苓湯治陽明脈浮發熱不用表藥但利小便以裡熱得清而表證自撤矣然活人書云太陽病無汗而渴者不得用白虎陽明病有汗而渴者不得用豬苓此又不可不知者也成無己曰此熱客下焦豬苓利小便瀉下焦之熱張兼善曰脈浮發熱上焦熱也渴欲飲水中焦熱也小便不利下焦熱也但熱客下焦津液亦不得上升故亦有作渴者瀉下焦之熱熱不得阻塞中焦肺與膀胱津液流通而病自愈矣豬苓湯方豬苓去皮茯苓澤瀉滑石阿膠各一兩上五味以水四升先煮四味取二升去渣納下阿膠烊盡溫服七合日三服豬苓茯苓澤瀉皆利小便藥也但熱盛則陽亢用阿膠養陰氣以濟之加滑石利竅以導濕熱也或曰消渴飲一溲二小便自多此數條俱云渴而小便不利此與消渴病有異否平曰白虎五苓豬苓等湯俱治傷寒方也因內兼渴證故並收入本經消渴病內以示病機與治法有相通者耳但醫者自有活法或遇主病傷寒而兼見渴證或專治消渴而病非傷寒亦在神明其意而已況本篇自淋之為病已下凡屬小便不利者亦皆淋病之類也但小便不利有不渴者有兼渴者東垣云小便閉而不渴者熱在下焦血分真水不足膀胱乾涸乃無陰則陽無以化治宜黃柏知母苦寒之藥以補腎與膀胱使陰氣行而陽自化則小便自通其渴者熱在上焦氣分與豬苓湯熱在下焦而渴者又異肺中伏火不能生水膀胱絕其化源宜氣味俱薄淡滲之藥以瀉肺火清肺金而滋水之化源由東垣之言觀之則渴之一證在消渴病固有之在傷寒病亦有之在小便不利諸雜證俱有之得其意則治傷寒者即可以治消渴治消渴者並可以治小便不利諸雜證又何拘乎一偏也哉水氣病脈證治第十四許學士曰臍腹四肢悉腫者為水但腹脹四肢不甚腫為蠱蠱即脹也然脹亦有頭面手足盡腫者大抵先腹大後四肢腫者脹也先頭足腫後腹大者水也然其致病之由則有故焉丹溪云脾虛不能制水水漬妄行當補脾氣得實自能健運升降樞機運動則水自行矣又內經云腎者至陰也至陰者盛水也肺者太陰也其本在腎其末在肺皆積水也蓋腎者胃之關也關門不利故聚水而從其類也上下溢於皮膚為胕腫又云諸氣膹郁皆屬於肺諸濕腫滿皆屬於脾諸腹脹大皆屬於熱三者相因為病蓋濕者土之氣土者火之子故濕每生於熱熱氣亦能自濕者母氣感子濕之變也濕氣盛肺氣不行而膹郁矣故水腫病者脾失運化之職清濁混淆因鬱而為水脾土既病肺為其子而亦虛榮衛不布氣停水積凝聚濁液滲透經絡窒礙津液灌入隧道血亦化水故有氣分血分之名又經云三焦者決瀆之官水道出焉三焦病者腹氣滿小腹尤堅不得小便窘急溢則水多即為脹則水氣病所由來概可知矣師曰病有風水有皮水有正水有石水有黃汗風水其脈自浮外證骨節疼痛惡風皮水其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰膿風水者水病兼風也風自外至故脈浮表挾風氣故骨節痛而惡風也胕腳面也陽明經動脈之處又脾經入腹脾胃皆屬土土虛不能制水而反為水所乘故胕腫腹如鼓內經雲水病下為胕腫大腹是也未嘗受風故不惡風水氣泛溢故不渴水在皮膚之間故名皮水其病在表故脈浮當發汗也靈樞云胃病大腹水腫今水氣橫逆直犯陽明為正經受病故曰正水脈沉者水性下流遲者陰寒內積也自喘者水來乘土水氣逆行則胃氣亦逆而上擁經所謂咳喘者水氣並於陽明是也又經云陽明結邪多陰少陽曰石水又云腎肝並沉為石水故其脈亦沉腹滿不喘者水伏於內不上逆也黃汗者汗如柏汁之黃濕熱之氣發泄於外則為發熱鬱蒸於內則為胸滿也四肢頭面腫者水氣無所不漬久致癰膿者濕熱醞釀已深腐化而外漬也風水解見肺痿脈浮而洪浮則為風洪則為氣風氣相搏風強則為隱疹身體為癢癢為泄風久為痂癩氣強則為水難以俯仰風氣相擊身體洪腫汗出乃愈惡風則虛此為風水不惡風者小便通利上焦有寒其口多涎此為黃汗風邪盛於表故脈浮水氣鼓於中故脈洪隱疹風濕怫鬱成斑也泄風者風邪披拂在表正氣為之疏泄也痂癩眉落髮稀肉腐腥臭經云脈風成癩是也氣強為水者濁氣壅瘀水道不利也大腹水腫故難俯仰汗出則風散水利故愈水病兼風故表虛惡風也黃汗不惡風病不挾風也小便通利者以上焦有寒不能約束津液也蓋肺合皮毛居上部黃汗以汗出入水浴水從汗孔入得之經所謂形寒則傷肺是為上焦有寒也其口多涎脾虛不能攝涎也涎者脾之液黃者脾之色土弱不能制水為黃汗寸口脈沉滑者中有水氣面目腫大有熱名曰風水視人之目窠上微擁如蠶新臥起狀其頸脈動時時咳按其手足上陷而不起者風水脈沉滑者象水之性面目腫大現水之形水氣鬱蒸不散故化而為熱內經云諸腹脹大皆屬於熱是也目窠目上下胞也擁者腫也微擁如蠶新臥起狀者內經云水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫也頸脈陽明胃經人迎脈也陽明屬土為水所乘故頸脈跳動水氣上逆故咳也按手足上陷不起者脾主肌肉水氣氾濫於肌肉之間也太陽病脈浮而緊法當骨節疼痛反不疼身體反重而酸其人不渴汗出即愈此為風水惡寒者此為極虛發汗得之渴而不惡寒者此為皮水身腫而冷狀如周痹胸中窒不能食反聚痛暮躁不得眠此為黃汗痛在骨節咳而喘不渴者此為脾脹其狀如腫發汗即愈然諸病此者渴而下利小便數者皆不可發汗太陽氣化原屬寒水經行身表易受風寒故脈浮則衛氣微緊則營中寒法當骨節疼痛以風寒外束經氣不利也風水反不疼體重而酸者水性沉著故也不渴水漬胃中濕氣有餘也汗出則風散水消故愈極虛發汗則表虛而亡陽故惡寒也皮水則渴以中焦濕滯肺氣不張津液不能灌溉也表氣未虛故不惡寒黃汗身腫而冷以水具陰寒之性經所謂陽氣少陰氣多身寒如從水中出是也狀如周痹邪在腠理之中上下游行如周痹之周身俱痛也胸窒不食反聚痛者水停心下積滯不散也暮躁不眠者暮屬陰水亦屬陰陰極發躁經所謂不得臥臥則喘是水氣之逆也脾脹痛在骨節濕流關節也咳喘者水氣上逆不渴者陰寒氣甚也脾經入腹主四肢合肌肉故腹與四肢肌肉狀如腫也發汗即愈寒濕氣散也水病固當發汗然汗者人之津液若渴而下利小便數皆津液已竭故禁汗也里水者一身面目黃腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴也越婢加朮湯主之越婢加朮湯當在故令病水之下越婢加朮湯方麻黃六兩石膏半斤甘草二兩生薑二兩大棗十五枚擘白朮六兩上六味以水六升先煮麻黃去上沫納諸藥煮取三升分溫三服水氣泛溢故一身面目黃腫水在裡故脈沉小便不利則水道愈澀故主越婢加朮湯此湯視大青龍少杏仁內有麻黃髮汗以一身面目黃腫故汗以散之小便不利則熱閉於內石膏清涼撤熱亦能解肌出汗也加白朮即本經所謂濕家身煩疼可與麻黃加朮湯一補一發水氣得以漸散也要知小便不利而渴者濕熱內蓄津液不得上布而然若小便自利而渴則內亡津液無以為灌溉之資發汗亡津液又非所宜即上節渴而小便數者不可發汗是也趺陽脈當伏今反緊本自有寒疝瘕腹中痛醫反下之下之則胸滿短氣趺陽脈當伏今反數本自有熱消渴小便數今反不利此欲作水趺陽脈在足面即胃脈也水盛則土衰其脈當伏緊則為寒疝瘕腹痛皆寒證也下之則裡氣更虛虛氣上逆故胸滿短氣脈數為熱熱消津液當消渴小便數今反不利此熱結於內而水氣壅瘀不行故欲作水寸口脈浮而遲浮脈則熱遲脈則潛熱潛相搏名曰沉趺陽脈浮而數浮脈即熱數脈即止熱止相搏名曰伏沉伏相搏名曰水沉則絡脈虛伏則小便難虛難相搏水走皮膚即為水矣脈浮與沉伏相反寸口趺陽兩脈既雲浮矣何以復名曰沉曰伏乎不知浮者指脈象而言沉伏者指水氣而言也蓋脈浮則陽氣暴於外故曰熱遲則水寒結於內故曰潛潛者伏匿之意數則熱氣閉塞水道愈為不利故曰止止者水凝不流也沉則絡脈虛水氣充塞於絡脈之內邪盛則正衰也伏則小便難水氣泛溢於腸胃之中膀胱氣不化也寸口脈弦而緊弦則衛氣不行即惡寒水不沾流走於腸間少陰脈緊而沉緊則為痛沉則為水小便即難內經云陽氣者衛外而為固也故名衛氣弦緊皆陰脈陰寒氣澀則陽氣不得宣通無以護衛身表故弦則衛氣不行即惡寒也水不沾流走於腸間陽氣外虛則陰邪內蓄也少陰主水其脈緊沉則陰寒更盛故搏於腸胃則為痛溢於皮膚則為水又少陰腎與足太陽膀胱為表裡氣化則小便出今陽氣虛水道淤塞故小便難也脈得諸沉者當責有水身體腫重脈沉水伏於內也身體腫重水溢於外也水病脈出者死脈出者出上出下不安本位即難經上入魚際下入尺中為關格覆溢之意也難經云關前者陽之動也脈當見九分而浮遂上魚為溢為外關內格此陰乘之脈也關後者陰之動也脈當見一寸而沉遂入尺為覆為內關外格此陽乘之脈也是真臟之脈不病而死也或云脈者筋脈也水病大腹洪腫則筋脈為之綻出即靈樞所謂色蒼黃腹筋起之狀也夫水病人目下有臥蠶面目鮮澤脈伏其人消渴面目鮮澤象水之色本經云色鮮明者有留飲是也脈伏者象水之性消渴者水氣濕漬壅淤則津液不得四布滋潤也臥蠶解見前病水腹大小便不利其脈沉絕者有水可下之腹大者水乘土位邪入陽明之府也小便不利水氣壅塞也沉絕者脈來沉伏之極水性趨下也下之以通地道問曰病下利後渴飲水小便不利腹滿陰腫者何也答曰此法當病水若小便自利及汗出者自當愈下利後脾氣弱而津液亡故渴而引水自救小便反不利下流壅塞也腹滿土虛水泛也脾經入腹陰腫濕氣下墜也小便利則膀胱氣化自出有汗則玄府關竅可開故自當愈然此便是治法若小便不利汗不出者又宜發汗利小便矣心水者其身重而少氣不得臥煩而躁其人陰腫心屬火屬陽為水氣湮鬱不伸則火衰而陽氣不克運行周身故身重也少氣者水寒凌心陽氣不充也本經雲水在心心下堅築短氣內經云水病者不得臥臥則水氣逆上喘咳殊甚也煩者心火內郁躁者陰盛格陽腎主水其脈從肺出絡心心水而致陰腫所謂腎邪干心寒氣盛也肝水者其腹大不能自轉側脅下腹痛時時津液微生小便續通肝有水則木邪剋土故腹大肝脈布脅肋循身之側故不能自轉側脅下腹痛也時時津液微生小便續通肝主疏泄水氣不致大壅也肺水者其身腫小便難時時鴨溏肺主通調水道者也肺有水則失其降下之職而水道不通身腫便難矣鴨溏者肺與大腸為表裡經云濕勝則濡瀉是也鴨性冷故其糞溏脾水者其腹大四肢苦重津液不生但苦少氣小便難脾經入腹主四肢故脾水腹大肢重靈樞云脾病腹脹水閉身體皆重又脾主為胃行津液脾困則約束津液不能上行灌溉故津液不生下流壅塞故小便難也少氣者脾主氣脾土濕滯不生肺金也腎水者其腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷面反瘦腎為水臟今又病水水邪乘土故腹大臍腫脾屬土其經入腹腰者腎之府腎水故腰痛也不得溺陰下濕者腎主二便開竅於二陰水氣淹郁陰寒下壅也足逆冷者水性趨下也面瘦者頭面陽氣日衰靈樞云腎病面如漆柴漆言其黑柴言其瘦也師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈腎主水繫於腰故水病在上在下俱從腰間分界腰以下腫者水性趨下利小便使水氣從下泄也腰以上腫者水勢泛上發汗使水氣從外散也又腰以下屬陰利小便通陰氣也腰以上屬陽發汗舒陽氣也師曰寸口脈沉而遲沉則為水遲則為寒水寒相搏趺陽脈伏水穀不化脾氣衰則鶩溏胃氣衰則身腫少陽脈卑少陰脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分寸口脈通指上中下三部而言水性趨下故脈沉寒氣斂澀故脈遲趺陽胃脈也在足面上伏則氣血凝滯故水穀不化脾主運化胃合肌肉衰則土不制水陰寒氣勝故一則鶩溏一則身腫也少陽者三焦也經云三焦者決瀆之官水道出焉卑者沉伏之象脈卑則三焦失決瀆之職而水道不通少陰者腎也腎有真水真火為胃之關水衰則關門不利邪壅而為脹滿火衰則命門虛冷不能消導陰翳故脈細而男子小便不利婦人經水不通蓋經為血血先不利水氣滲入與血混淆血亦為水名曰血分謂血之與水當有分別也師曰寸口脈沉而數數則為出沉則為入出則為陽實入則為陰結趺陽脈微而弦微則無胃氣弦則不得息少陰脈沉而滑沉則為在裡滑則為實沉滑相搏血結胞門其瘕不瀉經絡不通名曰血分寸口肺脈也肺主氣氣行則血行氣滯則血亦滯出入作內外二字解陽實身形脹滿也陰結血結胞門也趺陽胃脈也胃多氣多血微則氣血兩虛故無胃氣一呼一吸為息不得息者弦脈肝木侮土胃虛氣少不足以息氣不統血也少陰腎脈也腎藏精精血同為一類沉為在裡血結於內也滑則為實瘀血停留也此血所由結而血分所由成也按臍下三寸為關元穴關元左二寸為胞門右二寸為子戶瘕者石瘕也石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血不瀉血以留止狀如懷子月事不得以時下皆生於女子可導而下問曰病有血分水分何也師曰經水前斷後病水名曰血分此病難治先病水後經水斷名曰水分此病易治何以故去水其經自下血分經水前斷正氣虛也水分先病水邪氣盛也邪氣盛者祛邪可為正氣虛者養正不足故治有難易去水其經自下因先病水致經斷此澄源以清其流也王肯堂曰婦人血分病大小產後多有之惟產前腳腫不同產前腳腫名皺腳產後皆敗血所致當於血上治之問曰病者苦水面目身體四肢皆腫小便不利脈之不言水反言胸中痛氣上衝咽狀如炙肉當微咳喘審如師言其脈何類師曰寸口脈沉而緊沉則為水緊則為寒沉緊相搏結在關元始時當微年盛不覺陽衰之後榮衛相干陽損陰盛結寒微動腎氣上衝喉咽塞噎脅下急痛醫以為留飲而大下之氣急不去其病不除後重吐之胃家虛煩咽燥欲飲水小便不利水穀不化面目手足浮腫又與葶藶丸下水當時如小差食飲過度腫復如前胸脅苦痛象若奔豚其水揚溢則浮咳喘逆當先攻擊沖氣令止乃治咳咳止其喘自差先治新病病當在後此節發明水病之原當以陽氣為主蓋陽盛則氣血溫和而通利陽衰則氣血陰冷而凝澀此水病之所由來也關元穴在臍下三寸當人身上下四旁之中故又名大中極乃男子藏精女子畜血之處醫者誤吐誤下安知為陽損陰盛結寒微動之故乎咽燥飲水因吐下後亡津液也先治新病謂先攻結寒以降沖逆病當在後謂後治其水以止咳嗽也風水脈浮身重汗出惡風者防己黃耆湯主之腹痛加芍藥方見濕病脈浮汗出惡風者風也身重者水也防己去水白朮甘草補脾以制水黃耆實腠理以司開合則風水俱去芍藥入脾經能於土中瀉木腹痛者加之以通壅也風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之惡風脈浮汗出風性疏泄也身腫不渴表無大熱水氣泛溢也然風令汗出水氣濕漬亦令汗出此風水病之在表者故主越婢湯以發散之越婢湯方麻黃六兩石膏半斤甘草二兩生薑三兩大棗十五枚上五味以水六升先煮麻黃去上沫納諸藥煮取三升分溫三服惡風加附子一枚炮越婢湯汗劑也麻黃髮汗甘草和中石膏味辛解肌薑棗通行津液惡風加附子固表而行陽也或曰經云發表不遠熱用麻黃桂枝辛熱發表宜也此何以用石膏曰風水邪盛壅淤不通鬱而為熱熱閉於經風水何由得出配以石膏辛涼解表則榮衛俱通風水悉去矣皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之四肢為諸陽之本腫者陽氣不運也聶聶動者水氣激射與正氣相搏也防己茯苓湯方防己三兩茯苓六兩黃耆桂枝各三兩甘草二兩上五味以水六升煮取二升分溫三服皮水病在表故用桂枝發汗行陽黃耆養正實表以壯衛氣衛氣壯則水邪無所容而自散矣更用防己茯苓利水滲濕者以通之甘草補土勝水者以和之也里水越婢加朮湯主之甘草麻黃湯亦主之里水病在裡而欲其發於表以外泄其邪故二方俱用麻黃以開通壅塞也越婢加朮即麻黃加朮湯以固中氣之意蓋中氣既壯則發汗愈有力且白朮功能燥濕無汗能發有汗又能止也甘草麻黃湯恐麻黃髮汗過烈佐甘草以甘緩之也甘草麻黃湯方甘草二兩麻黃四兩上二味以水五升先煮麻黃去上沫納甘草煮取三升溫服一升重覆汗出不汗再服水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水病發其汗即已脈沉者宜麻黃附子湯浮者宜杏子湯少陰水臟也脈沉者水之性小者陽氣不充故聚水為病浮脈屬表風自外至故脈浮水有形氣無形故無水虛脹者為氣水病發汗則腠理開水氣泄而即已此麻黃為通用之要藥也然脈沉者佐附子以溫經脈浮者加杏仁以利氣經行氣利水自消矣麻黃附子湯方麻黃三兩附子一兩炮甘草二兩上三味以水七升先煮麻黃去上沫納諸藥煮取二升半溫服八分日三服杏子湯方麻黃四兩杏仁五十個甘草二兩炙上以水七升先煮麻黃減二升去上沫納諸藥煮取二升去渣溫服一升得汗止服厥而皮水者蒲灰散主之方見消渴厥者手足逆冷也皮水陰寒在表故致厥蒲灰味鹹能走腎邪勝水氣滑石開竅利水為佐或曰此何以不先治厥而但利水也曰因皮水而致厥故先用蒲灰散利水以治本病與傷寒論厥而心下悸者宜先治水當服茯苓甘草湯同意問曰黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如柏汁脈自沉何從得之師曰以汗出入水中浴水從汗孔入得之宜黃耆芍桂苦酒湯主之汗出腠理開入水浴則水氣乘虛而入故身腫渴者津液不行也發熱汗如柏汁濕熱外蒸也脈沉水蓄於內也桂枝行陽氣芍藥泄邪熱黃耆實腠理以司開合則水氣無所容而自散矣苦酒醋也經云味過於酸肝氣以津是酸味能收而亦能泄也觀啜醋者鼻上汗出可見李升璽曰按汗出浴水亦是偶舉一端言之耳大約黃汗由脾胃濕久生熱積熱成黃濕熱交蒸而汗出矣黃耆芍桂苦酒湯方黃耆五兩芍藥三兩桂枝三兩上三味以苦酒一升水七升相和煮取三升溫服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也黃汗之病兩脛逆冷假令發熱此屬歷節食已汗出又身常暮盜汗出者此勞氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃耆湯主之黃汗脛冷水濕下流也發熱則兼表證為風濕相搏故為歷節非黃汗也然前節黃汗亦發熱食已汗出胃氣外泄也日暮屬陰盜汗為陰虛血屬陰此屬勞氣以勞則氣耗故令津液溢出而盜汗亦非黃汗也盜汗見虛勞發熱則榮衛不和氣血銷鑠故身甲錯發熱不止則熱蓄腐爛故生惡瘡濕勝則身重汗出輒輕濕氣散也然表虛亡陽不免身瞤且陽受氣於胸中亡陽故胸痛也腰以上汗出下無汗則濕氣鬱滯不克外散故腰髖弛痛如有物在皮中狀也劇者不能食以脾惡濕濕勝則脾困也身疼重濕流關節也煩躁小便不利水氣不泄邪正相攻而成懊憹也桂枝湯解肌加黃耆以實表按仲景麻黃桂枝二湯俱汗劑也然去濕則用麻黃加朮湯以固中氣治黃汗則用桂枝加黃耆湯以實衛氣可見發汗者不可令如水流漓但令微微似有汗出者此風濕俱去也桂枝加黃耆湯方於桂枝湯方中加黃耆二兩余如桂枝法取微汗師曰寸口脈遲而澀遲則為寒澀為血不足趺陽脈微而遲微則為氣遲則為寒寒氣不足則手足逆冷手足逆冷則榮衛不利榮衛不利則腹滿腸鳴相逐氣轉膀胱榮衛俱勞陽氣不通即身冷陰氣不通即骨疼陽前通則惡寒陰前通則痹不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺尿名曰氣分寸口肺脈也有遲而澀之見證則不能通調水道趺陽者胃脈也有微而遲之諸證則土弱不能制水此水氣病之所由來也陰陽不通者氣為鬱結也陰陽前通者氣又散亡也故陽結則氣衰而身冷陰結則血澀而骨疼陽亡則表虛而惡寒陰亡則為血虛而痹不仁也大凡水病所生皆因氣不利而水亦為之不利故必陰陽相得正氣乃行元氣為大氣大氣一轉邪氣乃散而水亦散矣實者脾經邪氣實也即前腹滿之謂靈樞云脾經得後與氣則快然如衰故實則失氣大便穢氣虛者膀胱正氣虛也即前氣轉膀胱之謂經云膀胱不約為遺溺故虛則遺尿氣轉謂氣下泄也即不約之意此皆邪盛正衰故失氣者邪氣仍不得散遺尿者水氣仍未嘗行而為氣分也王肯堂曰血分謂血不通利而脹氣分謂氣不通利而脹非脹滿之外又有血分氣分之病也蓋氣血不通利則水亦不通利而尿少尿少則腹中水漸積而為脹但血分者血積胞門而病發於下先經斷後病水脹氣分者心下堅大而病發於上先病水脹後經斷也氣分心下堅大如盤邊如旋杯水飲所作桂枝去芍藥加麻黃附子細辛湯主之心下屬上焦陽部故心下堅大如盤為氣分也邊如旋杯高而小也水氣凝結之狀下文邊如旋盤低而大也水氣散漫之形即此便有表裡之分故本方汗劑也服後當汗出如蟲行皮中水氣外散也下節枳朮湯內消藥也服後得腹中軟則水氣亦潛通矣桂枝去芍藥加麻黃附子細辛湯方桂枝三兩麻黃一兩附子一枚炮細辛一兩甘草二兩生薑三兩大棗十二枚上七味以水七升煮麻黃去上沫納諸藥煮取二升分溫三服當汗出如蟲行皮中即愈桂枝湯去芍藥恐酸斂也加麻黃出汗附子溫經細辛散水氣以去內寒此即內經發表不遠熱之意心下堅大如盤邊如旋盤水飲所作枳實白朮湯主之枳實白朮湯方枳實七枚白朮二兩上二味以水五升煮取三升分溫三服腹中軟即水散也枳實消脹苦以瀉之也白朮去濕苦以燥之也後張易水治痞用枳朮丸亦從此湯化出但此乃水飲所作用湯以盪滌之彼屬食積所傷則用丸以消磨之一湯一丸各有深意非漫無主張也黃疸病脈證治第十五疸有五有黃疸黃汗谷疸酒疸女勞之分丹溪云五疸同是濕熱不必分也然疸由濕起有身黃而名為疸者亦有身黃不名為疸仍屬濕者如經云色如熏黃一身盡痛乃濕病也色如橘子黃身不痛乃疸病也此不可不分者也故疸病有肺氣虛不能通調水道下輸膀胱而成濕者亦有腎為胃之關關門不利而為濕者推原其故屬太陰脾經者居多蓋黃者中央土色脾屬土性惡濕既為濕困復挾熱邪則鬱而生黃譬如造麴以濕物而又加覆蓋濕熱相搏未有不成黃者故疸有五而總以黃疸概之猶本經飲有四而總以痰飲概之也其症有宜分而循乎法者有不必分而通其意者不出汗吐下與建中利水諸法是在圓機者得心應手而已寸口脈浮而緩浮則為風緩則為痹痹非中風四肢苦煩脾色必黃瘀熱以行浮則為風者熱極生風邪氣外擁也緩則為痹者土性緩緩為痹疾脾經濕熱不攘也太陽中風脈浮而緩太陰傷寒亦脈浮而緩經云脈浮而緩者系在太陰太陰身當發黃此痹屬太陰恐誤認為太陽中風故辯云痹非中風也四肢苦煩者脾主四肢濕熱外困也脾屬土故色黃瘀熱行故成黃疸此統論疸病之大概也趺陽脈緊而數數則為熱熱則消穀緊則為寒食即為滿尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食谷即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸趺陽胃脈也胃熱者不應復寒消穀者不應中滿今趺陽脈緊而數寒熱並見消穀與中滿並行者何也蓋胃屬陽明為水穀之海其氣近熱變為熱中故主消穀然胃與脾為表裡脾屬太陰濕土今又為濕所困濕氣本寒故云緊則為寒也脾又不能運化精微為胃行其津液故食即為滿此胃強脾弱所致也尺脈屬腎宜沉浮則為風風邪外泄腎氣不得閉藏故傷腎趺陽脈屬土宜緩緊則為寒寒濕內郁脾氣不得運磨故傷脾是為風寒相搏也食谷即眩胃中濕熱上蒸蔽其清陽之氣也前云熱則消穀此何以雲谷氣不消蓋谷雖消而谷之氣仍不消也於是濕蒸熱淤胃中苦濁濁氣下流小便壅塞不通矣陰為太陰被寒者濕為陰邪其性本寒也熱流膀胱者濕鬱為熱小便癃閉故身體盡黃為谷疸也額上黑微汗出手足中熱薄暮即發膀胱急小便自利名曰女勞疸腹如水狀不治女勞疸屬腎額為三陽部分黑為水色額上黑者陰乘陽也微汗出濕熱熏蒸也手足背屬陽手足心屬陰日中為陽薄暮屬陰手足中熱薄暮即發陰虛生內熱也膀胱急者裡虛氣不內充也小便利者腎虛不能閉藏津液也腹如水狀氣虛中滿腎邪乘土脾屬土其經入腹故不治心中懊憹而熱不能食時欲吐名曰酒疸酒性濕熱心中懊憹而煩不食欲吐者胃為濕熱所困氣壅上逆為酒疸陽明病脈遲者食難用飽飽則發煩頭眩小便必難此欲作谷疸雖下之腹滿如故所以然者脈遲故也此即內經減谷則愈之旨陽明者胃也主納飲食脈遲為無陽此邪熱不殺穀故食難用飽也飽則發煩以胃虛食鬱致熱也頭眩者胃中苦濁濁氣上蒸也小便難則食鬱不得下泄膀胱無陽以化而穀氣積久濕熱蒸發於外故欲作谷疸因其發於穀氣之不運非實熱內結也下之徒虛其胃氣故腹滿如故經云脈遲尚未可攻是也夫病酒黃疸必小便不利其候心中熱足下熱是其證也大寒凝海惟酒不冰以其濕熱甚也酒入於胃胃中苦濁小便不利則濕熱內壅無所分消故鬱於上則心中熱流於下則足下熱也胃脈貫膈下足跗內經云酒氣盛而慓悍腎氣日衰陽氣獨勝故手足為之熱也喻嘉言曰酒者清冽之物不隨濁穢下行惟喜滲入者也滲入之處先從胃入膽膽為清淨之府同氣相求故也然膽之攝受無幾其次從胃入腸膀胱滲之化溺而出迨至化溺則所存者酒之餘質其烈性惟膽獨當之每見善飲者必淺斟緩酌以待腹中之滲若連飛數斛有傾囊而出耳故飲酒醉後其膽氣愈橫不可降伏而膽之熱汁滿而溢出於外以漸滲於經絡則身目皆黃為酒疸之病以其滲而出也小便不利者宜轉驅而納諸膀胱從溺道分消可也酒黃疸者或無熱靜言了了腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之酒性慓悍聚散不常當其散時或無熱靜言了了及其聚也濕熱鬱蒸腹滿欲吐胃熱熏肺肺開竅於鼻孔胃脈起於鼻之交頞中故鼻燥也浮脈屬陽病在膈上故先吐之經所謂其高者因而越之也沉弦脈屬陰病在腹裡故先下之經所謂中滿者汙之於內也酒疸心中熱欲嘔者吐之愈心熱者酒氣鬱蒸欲嘔者胃氣上逆也因勢利導宜吐以散其濕熱之氣李升璽曰酒在胃中濕熱不散故多作嘔葛花解醒湯用豆蔻砂仁辛香快氣之品皆治嘔之意以酒客不喜甘故也心中雖熱亦忌過用苦寒以胃寒則愈嘔故吐以散之為宜李瑋西曰按仲景吐有二法虛煩內熱則用梔子豉湯胸寒氣衝則用瓜蒂散此酒疸心中熱大約梔子豉湯為宜酒疸下之久久為黑疸目青面黑心中如啖蒜齏狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故知之酒疸不宜妄下下之則胃虛內熱久為黑疸以熱極反兼水化也水色黑肝開竅於目濕熱上蒸目失清明之氣而反見本臟之色也肝屬木其色青陽明脈循面胃熱故面黑也心中如啖蒜齏狀者濕熱熏蒸心火內煩也大便正黑濕熱下滲也皮膚不仁濕熱外壅也脈浮者邪氣發於外弱者正氣虛於內也黑者水色黃者土色雖黑微黃水上爭勝互相剋賊也師曰病黃疸發熱煩喘胸滿口燥者以病發時火劫其汗兩熱所得然黃家所得從濕得之一身盡發熱而黃肚熱熱在裡當下之黃家濕熱兼有此云從濕得之者先從濕氣鬱勃而後熱氣熏蒸原其始而言也此濕熱蒸於外則為發熱鬱於內則為煩喘胸滿口燥夫疸熱也火劫其汗則愈熱是謂兩熱相得此黃疸始於濕而繼之以熱也若身盡發熱而黃肚熱是熱在裡宜下之以去在裡之濕熱脈沉渴欲飲水小便不利者皆發黃脈沉而渴濕熱在裡也小便不利則濕熱內蓄無從分消故發黃或問五苓散治小便不利而渴今可治此發黃證否答曰五苓治消渴小便不利以其脈浮則病在表故用桂枝於利水之中兼發汗之意此脈沉則病邪入里鬱而發黃五苓散非所宜也腹滿舌痿黃躁不得眼屬黃家腹滿者濕熱內壅也舌為心竅濕熱內壅則心經湮鬱火氣不伸故令痿黃也躁不得眠者經云胃不和則睡不安也黃疸之病當以十八日為期治之十日以上瘥反劇者為難治疸者脾邪濕熱所致脾屬土土無定位寄旺於四時之季月各十八日則十八日乃土之成數也十八日為期則土氣衰而病愈故治之十日以上當漸瘥也若反劇是濕熱留連土邪終未消散故難治疸而渴者其疸難治疸而不渴者其疸可治發於陰部其人必嘔陽部其人振寒而發熱也疸者濕熱也濕則津液困滯熱則津液銷鑠故多渴渴者濕熱已甚故難治不渴者濕熱未甚故可治陰部陽部者表裡之分發於陰部則濕熱在裡胃氣上逆故嘔陽部則濕熱在表衛氣疏泄故振寒發熱也谷疸之為病寒熱不食食即頭眩心胸不安久久發黃為谷疸茵陳蒿湯主之濕熱外擁故發寒熱穀氣不運故不食濁氣上蒸故食即頭眩濕熱內郁故心胸不安茵陳去濕熱梔子開鬱結大黃苦以泄之皆分消濕熱之劑也茵陳蒿湯方茵陳蒿六兩梔子十四枚大黃二兩上三味以水一斗先煮茵陳減六升納二味取三升去渣分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疽其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治消礬散主之黃家原屬陽明濕熱陽明旺於申酉戍當日晡所發熱而反惡寒者此女勞陰陽俱虛非陽明病也蓋膀胱屬足太陽為諸陽主氣少腹屬足少陰為生氣之原二者相為表裡膀胱急者陽氣虛也少腹滿者陰邪盛也額為陽分額上黑者陰乘陽也腎脈斜趨足心湧泉穴水衰火盛故足下熱也腎屬水其色黑女勞傷腎因作黑疸不離水色也脾經入腹腹脹如水狀者腎邪乘脾也大便黑者精氣不充瘀血內蓄也與酒疸便黑不同時溏者腎虛下焦不固也腹滿者中州虛極脾氣將絕也故難治或問女勞屬陰虛何以致疸答曰此有數義不可不詳也蓋腎與膀胱為表裡經云腎者胃之關也膀胱者津液之府氣化始出今腎虛則關門不利膀胱津液亦不能氣化而出由是濕熱內瘀胃中苦濁蒸為疸病此一義也又女勞陰虛水竭虛熱內生而腎主閉藏熱邪內不得清外無所泄由是郁遏於中而熏蒸於外因以致疸此亦一義也且腎者水臟也水氣不足土氣凌之見其本色發黃自屬常理此又一義也故谷疸酒疸屬於胃女勞疸起腎也又問本經云黃家從濕得之此云女勞腹脹如水而非水也夫無水何以腹脹而成疸乎答曰譬如臟寒生滿病又何嘗有水也腎雖水臟而腎氣既虛則腎中陰邪自充斥於內而腹為脹滿腎中虛火自鬱蒸於外而色顯黃黑究其病原自屬虛脹全無水氣亦猶風氣通於肝肝虛內自生風而不同外感之風也明矣消石礬石散方消石礬石燒各等分上二味為散以大麥粥汁和服方寸匕日三服病從大小便去小便正黃大便正黑是候也消石火消也質生於水而火伏於內味辛鹹而性燥烈能發散沉霾宿垢之疾礬石酸以斂之使濕熱之氣聚在一處從消石盡發散於外此一開一合之義也大麥粥和服以麥入心而助火火氣既張則陰翳消散矣酒黃疸心中懊憹或熱痛梔子大黃湯主之梔子大黃湯方梔子十四枚大黃一兩枳實五枚豉一升上四味以水六升煮取二升分溫三服心中懊憹虛煩憒悶之意或熱痛皆酒氣濕熱所聚也梔子豉為吐劑使濕熱從上越大黃枳實為下藥使濕熱從下泄此上下分消法也諸病黃家但利其小便假令脈浮當以汗解之宜桂枝加黃耆湯主之方見水氣利小便使濕熱從水道中去經云在下者引而竭之是也脈浮者病在表當汗解桂枝湯汗劑也加黃耆以實腠理司開合則濕熱無所容而黃自散矣諸黃豬膏發煎主之豬膏發煎方豬膏半斤亂髮如雞子大三枚上二味和膏中煎之發消藥成分再服病從小便去豬膏潤經脈而滑澤亂髮入血分而去瘀蓋經脈通則水道利瘀血去則濕熱消矣觀本方病從小便去可見黃疸病茵陳五苓散主之茵陳五苓散方茵陳蒿末十分五苓散五分方見痰飲上二味和先食飲服方寸匕日三服五苓散發汗利小便表裡雙解之劑也加茵陳苦以泄水寒以撤熱則去濕熱更捷而共成治疸之功此亦發汗利小便法也黃疸腹滿小便不利而赤自汗出此為表和里病當下之宜大黃消石湯大黃消石湯方大黃消石黃柏各四兩梔子十五枚上四味以水六升煮取二升去渣納消更煮取一升頓服腹滿小便不利而赤里病也自汗出表和也里病者濕熱內甚用梔子清上焦濕熱黃柏清下焦濕熱消石則於苦寒瀉熱之中而有燥烈發散之意使藥力無所不至而濕熱悉消散矣黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者小半夏湯主之方見痰飲小便色不變欲自利里無濕熱可知腹滿而喘脾氣虛而肺氣不利耳用苦寒藥攻裡除熱則胃寒而虛氣上逆故噦宜小半夏湯散逆止噦諸黃腹滿而嘔者宜柴胡湯此大柴胡湯也方見腹滿腹滿宜下兼嘔則邪氣未盡入里尚在半表半裡之間又未可峻攻大柴胡湯以大黃芍藥枳實以攻裡柴胡半夏黃芩薑棗以和中解表此表裡雙解法也男子黃小便自利當與虛勞小建中湯方見虛勞黃病濕熱內郁當小便不利今反利者中州虛竭也蓋黃病屬脾而脾主中州行津液脾虛則小便利而津液亡小建中湯建立中氣使脾土健運不息足以制水而濕熱自去此內經養正邪自消之方也本經水氣篇云小便自利此亡津液故令渴也又云病水者渴而下利小便數者皆不可發汗是也
