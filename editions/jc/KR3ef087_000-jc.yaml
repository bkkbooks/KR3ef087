body:
  text: 余序張仲景金匱要略以下簡稱金匱作為是中醫臨床奠基之作其首注本為元趙以德所撰金匱要略衍義嗣後整個明代未見有注本傳世迄清代初期先後有數位醫家詮註此書李彣即為其中之一康熙年間略早於李氏之徐彬金匱要略論注和程林之金匱要略直解均有多種刊本李彣編注之金匱要略廣注現僅存康熙二十一年年刻本及抄本故一般不易獲見此書之全帙今杜曉玲同志覓取康熙本之複印件結合現存抄本予以點校整理使這部早期具有一定學術影響的注本得以為廣大讀者所閱習這無疑是為弘揚仲景學說做了一件很有意義的事泛閱金匱要略廣注我認為此書具有以下學術特色書名廣注李氏引述前賢見解頗多如書中徵引徐之才朱肱許叔微張子和朱丹溪王履張兼善趙養葵樓全善王三陽喻嘉言以及婦科之郭稽中武之望本草之陳藏器李時珍等著述外旁及周易尚書虎鈐經等非醫學論著所引醫說多屬學驗豐富之名家李氏既重視先賢包括上述歷代名醫及其師潘鄧林精論又注意提攜後學如李彣的學生和侄輩能恰當地反映他們較為可取的學術觀點這在古代的中醫學術界殊不多見李彣對金匱原文中或有難以直解之處不妄下臆斷不強予詮釋這種求實的科學態度也給讀者留下深刻的印象作為是金匱的全注本此書於各篇之前均能概述此篇大意綜括篇論中之精粹內涵其撰述能圓熟地將內經與仲景學說予以結合闡發精審而富有啟發性當前的金匱注本已近百種金匱要略廣注的重要學術價值通過杜曉玲同志點校本的問世將為越來越多的讀者所瞭解和加深認識在此書即將付印之際爰書數語以為薦介余瀛鰲一九九一年一月自序數十年來醫學駸駸日盛余向因多病幾與李百藥同歷苦口亦復留心於此從事張卿子潘鄧林兩師門下兩師固醫宗多善誘然余登其堂茫無畔岸自疑醫學甚艱闡揚精粹未能草營人命不可奈何其易言之兩師進而教之曰醫學上乘靈素尚已此後則仲景傷寒論金匱要略諸書得其意一以貫之余無難也於是窮年力索竊意傷寒論及金匱要略二書相為表裡不讀傷寒論者不可與言醫不讀金匱要略者並不可與言傷寒論蓋其證之表裡虛實治之補瀉溫涼法不同而理同方不同而意同即理與意未必盡同而所以引伸乎理與意之中與神明乎理與意之外者正可由不同而推之以極於無有不同則欲入仲景之室而究傷寒論之旨者舍金匱要略無由從於是取而釋之亦既歷有年所友人過而哂之謂醫乃名耳術耳昔曹氏云常人貴遠而賤近向聲而背實自古且然有識所嘆而奚金匱要略之慇慇也余笑而唯唯著說益力書成未敢自信質之兩師師云行世有餘何惜剞劂爰為之序旋因卜居郭外十餘年來應酬瑣屑此書置之高閣者已久邇復與同學及家季新章猶子瑄琯輩日為講論幸潘子夔師汪子我浚時與折衷謂余道不第行於今時而貴垂之後祀也學不期見知於俗人而貴深信於曉人也力勸授梓發篋張師序猶存愴然久之不勝今昔之感仍為弁冕不敢忘師訓也祗以管窺未徹鉤索難窮求深得乎仲景之精微而仰副兩師之教益也心竊惴惴但期同志者共為發明不詭經術於以扶靈蘭之秘典而起凋敝之沉疴也豈僅托諸空言已哉康熙二十一年壬戍夏月錢塘李彣珥臣識
