body:
  text: 卷上臟腑經絡先後病脈證治第一五臟屬陰六腑屬陽內經云五臟藏精氣而不泄故滿而不能實六腑傳化物而不藏故實而不能滿也然臟有五而扁鵲謂有六臟者因腎有兩臟其左為腎右為命門也腑有六而止言五腑者以五臟各一腑三焦亦是一腑然不屬於五臟故言腑有五焉又內經云形臟四神臟五則自心肝脾肺腎而外若頭角者耳目者口齒者胸中者亦得名之為臟而以類推焉經者手足三陰三陽合為十二經也直者為經橫者為絡循內者為經浮外者為絡難經云經有十二絡有十五蓋又有陽蹻之絡陰蹻之絡及脾之大絡也素問云經有常色而絡無常變也陰絡之色應其經陽絡之色變無常隨四時而行者也先後病者總臟腑經絡而言蓋臟腑經絡相傳之病有先有後治臟腑經絡之病者亦有宜先宜後云爾問曰上工治未病何也師曰夫治未病者見肝之病知肝傳脾當先實脾四季脾王不受邪即勿補之中工不曉相傳見肝之病不解實脾惟治肝也夫肝之病補用酸助用焦苦益用甘味之藥調之酸入肝焦苦入心甘入脾脾能傷腎腎氣微弱則水不行水不行則心火氣盛則傷肺肺被傷則金氣不行金氣不行則肝氣盛則肝自愈此治肝補脾之要妙也肝虛則用此法實則不在用之經云虛虛實實補不足損有餘是其義也餘臟仿此此所謂治臟腑之病也當以肝虛用此法一句為主通節皆治肝虛之法也肝屬木脾屬土木能剋土故當先實脾以培土土無定位寄旺於四時之季月三月六月九月十二月是也故云四季脾旺不受邪也夫見肝之病此肝之已病者也肝病實脾此脾尚未病而先治之夫人稟五常因風氣而生長風氣雖能生萬物亦能害萬物如水能浮舟亦能覆舟若五臟元貞通暢人即安和客氣邪風中人多死千般疢難不越三條一者經絡受邪入臟腑為內所因也邪自表入里故為內因二者四肢九竅血脈相傳壅塞不通為外皮膚所中也肢竅血脈皮膚病在外為外因三者房室金刃蟲獸所傷此不內外因以此詳之病由都盡若人能養慎不令邪風乾忤經絡適中經絡未流傳臟腑即醫治之四肢才覺重滯即導引吐納針灸膏摩勿令九竅閉塞更能無犯王法禽獸災傷災傷二字兼承王法禽獸言房室勿令竭乏服食節其冷熱苦酸辛甘不遣形體有衰病則無由入其腠理遣使也腠者是三焦通會元真之處為血氣所注理者是皮膚臟腑之文理也前節云上工治未病此云不遣形體有衰病無由入其腠理亦治未病之意也五常者人之性即仁義禮智信也人因風氣生長言風兼言氣者以風中有氣如莊子云大塊噫氣禮經云煦嫗覆育萬物是也靈樞云風從其所居之鄉來者為實風主長養萬物是因風氣而生也從其沖後來者為虛風主殺主害素問云風者百病之始是因風氣而獸也通節以元真二字為主元真者藏真之元氣經云藏真散於肝通於心濡於脾高於肺下於腎所謂天真是也五臟元真通暢人即安和即內經恬淡虛無真氣從之精神內守病安從來也客氣者客忤不正之氣以邪從外感如客自外來故云客氣也邪風者經云八風發邪以為經風觸五臟邪氣發病又云虛邪賊風避之有時故中人多死也三條即內因外因不內外因也頭面七竅合前後二陰為九竅也三焦又見中卷第十一篇李時珍曰三焦者元氣之別使命門者三焦之本原蓋一原一委也命門指所居之府而名為藏精系胞之物三焦指分治之部而名為出納腐熟之司蓋一以體名一以用名其體非脂非肉白膜裹之在七節之旁兩腎之間二系著脊下通二腎上通心肺貫屬於腦為生命之原相火之主精氣之府人物皆有之生人生物皆由此出靈樞本臟論已著其厚薄緩急之狀扁鵲難經不知原委體用之分以右腎為命門謂三焦有名無形者非也問曰病有氣色見於面部願聞其說師曰鼻頭色青腹中痛苦冷者死鼻頭色微黑者有水氣色黃者胸上有寒色白者亡血也設微赤非時者死其目正圓者痓不治又色青為痛色黑為勞色赤為風色黃者便難色鮮明者有留飲治病有望聞問切四法此望而知之之法也蓋面為諸陽之會內經云聲合五音色合五行脈以應月色以應日又云精明五色者氣之華也故氣色可驗於面部脾屬土鼻者土之位青者木之色鼻頭色青是肝木侮脾土以脾經入腹色青為寒故主腹痛苦冷死也黑為水色鼻頭色微黑是水來乘土故主有水氣脾脈上膈胃脈下膈皆喜溫惡寒若胸上有寒則中焦塞窒胃不能受納水穀脾不能運化精微故自現其本色而黃也血者心之所主內經云心合脈其榮色也又心之華在面亡血則血無以華其色而心氣衰經云血脫者色白夭然不澤是也微赤見於秋月是火來剋金為非其時故主死痓屬太陽症目者心之使神之舍也目正圓者不治以太陽脈起目內眥經云瞳子高者太陽不足戴眼者太陽已絶也肝木色青腹乃脾部此木實則痛故主腹痛也腎藏精勞則精竭傷腎故本色見而黑經云煩勞則張精絶又云腎虛面如漆柴是也風為陽邪故色赤本經云里水者一身面目黃腫小便不利黃家濕熱內瘀小便不利故身黃者便難也一云小便淋閉鼻色必黃則黃色專主界言蓋鼻者肺之竅肺主通調水道今小便難者以熱灼津液水道不利故鬱蒸而鼻發黃色也鮮明者水之色留飲者水所聚本經云水病目下有臥蠶面目鮮澤是也師曰病人語聲寂寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病此聞而知之之法也骨節心膈頭中諸病皆指疼痛言而痛病之發於語聲有各異者以所痛之部位不同也驚呼者忽然而呼若驚狀也蓋骨節痛無常時或暫時痛止則語聲寂然及忽然掣痛則亦忽然驚呼內經云肝主筋諸筋皆屬於節又云肝病發驚駭肝在聲為呼此驚呼者肝病也經所謂風氣通於肝諸痛屬於木是也肝屬木人胸前有膈膜一層前齊鳩尾後齊脊骨之十一椎遮隔濁氣不使上熏心肺故名膈心在膈上肺雖主聲音然腎為生氣之原呼吸之門則語聲發於腎間動氣自下而達上者也心膈間病則上焦阻塞礙其上達之氣道故語聲喑喑然不徹也喑喑者呻吟低小之聲不徹者聲不透達也若頭在上部三陽經皆上頭肝經出額交巔病則與胸中氣道無礙語聲得以上達透徹故聲長然頭者精神之府病則精神虛憊故語聲仍啾啾然細而長也啾啾痛楚不耐煩之聲師曰息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿吐沫一呼一吸謂之息肺主氣凡呼吸皆屬於肺堅實也心中血結氣聚呼吸則氣道不利難以升降牽引而痛肩為搖聳此邪實也內經云皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒外內合邪則為肺咳故息引胸中上氣者咳此氣逆也本經云熱在上焦者因咳為肺痿張口短氣者欲咳不能咳乃喘喝不寧之狀氣虛不能攝涎故吐沫此肺虛也師曰吸而微數其病在中焦實也當下之即愈虛者不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治難經云呼出心與肺吸入腎與肝中焦實則上下之氣不得升降欲呼不得出欲吸不能入故吸而微數者氣促也經云短氣腹滿而喘可攻裡也下去中焦之實則上下之氣宣通可以升降自如而愈矣虛者邪盛正衰既不可下又不可補故不治邪在心肺者其氣升而不降但浮於上焦以上焦部位甚近故吸促促者急也病在肝腎者丹田元氣將絶氣又降而難升移時方得一吸不能接續如常以下焦部位甚遠但覺出入之氣濡遲故吸遠遠字作遲字解與促字對看此正虛邪亦不盛但云難治若呼吸動搖振振則氣與形離虛之極矣故不治振動也振振動搖之貌李升璽曰呼吸相連不呼則亦不吸吸後必致再呼故言吸而呼在其中然獨言吸者以氣之入為主也師曰寸口脈動者因其王時而動假令肝王色青四時各隨其色肝色青而反色白非其時色脈皆當病脈有寸關尺三部凡經中單言寸脈則不及關尺如言寸口則有但指寸脈而別乎關尺者亦有兼舉寸關尺三部而總名為寸口者以此脈即肺經之太淵穴去尺澤穴一尺故名尺去魚際穴一寸故名寸也如難經云寸口者脈之大會內經云氣口成寸以決死生氣口即寸口此皆統舉寸關尺三部而言者也因其王時而動者如春時木旺則肝脈動而弦其色青夏時火旺則心脈動而鉤其色赤長夏土旺則脾脈動而緩其色黃秋時金旺則肺脈動而毛其色白冬時水旺則腎脈動而石其色黑是四時各隨其色也肝色青而反色白則金來剋木故力非時推而言之心色赤而反色黑脾色黃而反色青肺色白而反色赤腎色黑而反色黃皆非時色脈而當病者也問曰有未至而至有至而不至有至而不去有至而太過何謂也師曰冬至之後甲子夜半少陽起少陽之時陽始生天氣溫和以未得甲子天因溫和此為未至而至也以得甲子而天未溫和此為至而不至也以得甲子而天大寒不解此為至而不去也以得甲子而天溫如盛夏五六月時此為至而太過也人身通乎天地以陽氣為主若天地之陽氣不和則人身之陽氣亦乖感之者遂有傷寒溫暑時病等疾故推冬至後甲子日夜半甲子時少陽起為定例以陽生於子也少陽者甲膽一陽之氣謂之初陽又名稚陽因陽氣初生未壯盛也易經復卦云先王以至日閉關商旅不行安靜養微陽也有未至者以未得甲子言也有至者以已得甲子言也而至而不至而不去而太過以天氣溫和未溫和或大寒或如盛夏言也此即天時節氣寒暖之乖沴而人因此受病矣按黃帝使大撓作甲子以正天時造歷者取冬至年月日時皆會於子為曆元後則陰陽度數不齊不能皆會於子越數千餘年而後冬至始得年月日時復會於子故每年甲子俱在冬至之後然堯時甲子冬至日在虛一度後至秦莊襄元年凡二千二十八年冬至日在鬥二十二度迄宋慶曆甲申凡一千二百九十二年冬至日在鬥五度今已在箕六度矣上距堯時差四十餘度不幾差四十餘日乎今寒燠愆期不時或者歲差故耶出群書備考則至與不至或不去太過等未必不由此也師曰病人脈浮者在前其病在表浮者在後其病在裡腰痛背強不能行必短氣而極也寸脈為前屬陽凡外感者寸脈必浮故主病在表尺脈為後屬陰其脈不當浮而浮此腎氣虛損之象本經云尺脈浮為傷腎是也故主病在裡靈樞云腎脈上股貫脊故虛則腰病背強不能行又腎為生氣之原呼吸之門故短氣而極者精血已竭五勞六極之謂此皆病在裡之症也問曰經云厥陽獨行何謂也師曰此為有陽無陰故稱厥陽厥陽即陽厥也內經云陽氣衰於下則為寒厥陰氣衰於下則為熱厥下者足也熱厥必起於足下者以陽氣起於足五指之表陰脈者集於足下而聚於足心故陽氣勝則足下熱也又云酒氣與穀氣相薄熱盛於中故熱遍於身夫酒氣盛而慓悍腎氣衰故手足為之熱也又云有病怒狂者名曰陽厥蓋陽明常動巨陽少陽不動不動而動大疾此其候也此厥陽獨行有陽無陰之大概也問曰寸脈沉大而滑沉則為實滑則為氣實氣相搏血氣入臟即死入腑即愈此為卒厥何謂也師曰唇口青身冷為入臟即死如身和汗自出為入腑即愈卒音猝厥逆也卒厥者猝然僵仆昏不知人也實則邪氣在內故脈沉氣與風痰鼓激故脈滑臟屬陰而在裡唇青身冷陰寒盛也故入臟即死腑為陽而屬表身和汗出陽氣通也故入腑即愈按厥症有六陽厥陰厥痰厥氣厥蛔厥尸厥是也又仲景傷寒論云少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥問曰脈脫入臟即死入腑即愈何謂也師曰非為病百病皆然譬如浸淫瘡從口起流向四肢者可治從四肢流來入口者不可治病在外者可治入里者即死此承前節說來前卒厥脈沉滑者有入臟入腑之異此並言脈脫者又有入臟入腑之異亦指卒厥而言浸淫瘡濕漬腐爛不已從口流向四肢則自內出外邪氣漸散之兆故可治從四肢流來入口則自外侵里邪氣漸深之徵故不可治然入腑者病在外而淺故可治入臟者病在裡而深故即死耳李瑋西曰病在外二句推開說概指諸病而言即上文百病皆然之意入里者死如痹氣入臟腳氣衝心之類仲景治少陰下利厥逆無脈者白通加豬膽汁湯服湯脈暴出者死以正氣驟泄也微續者生以陽氣漸復也此又為脈脫者決死生之明驗歟或問曰既云脈脫則其人必死矣遑問入臟入腑乎曰此因卒厥一時氣逆故脈為之伏匿望其陽氣漸復而脈漸起耳若果真氣絶而脈脫且奈之何哉問曰陽病十八何謂也師曰頭痛項腰脊臂腳掣痛陰病十八何謂也師曰咳上氣喘噦咽腸鳴脹痛心痛拘急五臟病各有十八合為九十病人又有六微微有十八病合為一百八病五勞七傷六極婦人三十六病不在其中清邪居上濁邪居下大邪中表小邪中里䅽飪之邪從口入者宿食也五邪中人各有法度風中於前寒中於暮濕傷於下霧傷於上風令脈浮寒令脈急霧傷皮腠濕流關節食傷脾胃極寒傷經極熱傷絡頭項等皆在表故為陽病咳上氣等皆屬裡故為陰病清邪居上即霧傷於上也霧性陰寒滲潤不似雨露暴注淋漓故名清邪濁邪居下即濕傷於下也風為百病之長故名大邪風傷衛故中表寒氣遒緊故名小邪寒傷榮故中里䅽飪邪從口入即後濕傷脾胃也五邪即風寒霧濕熱也法者條理也度者時候也風為陽邪故中於午前以午前屬陽也寒為陰邪故中於日暮以日暮屬陰也風性鼓動故令脈浮寒性凝斂故令脈急脈急與脈數異脈數者以至數速疾而言脈急者寒邪鼓激脈體徑直切指按之緊如弦者是也霧為清邪濛濛滲溉故傷上部又傷皮腠濕為濁邪重滯浸灌故傷下部又流關節循內者為經浮外者為絡寒傷營深中於里則經脈凝澀故傷經熱氣浮外又夏氣在絡故傷絡也按六微取之於合胃合入於三里大腸合入於巨虛上廉小腸合入於巨虛下廉三焦合入於委陽膀胱合入於委中央膽合入於陽陵泉凡六合所病皆屬於微微者邪在六腑而外合於經絡為病之輕微者也五勞者心勞神損肺勞氣損脾勞食損肝勞血損腎勞精損也七傷者大飽傷脾大怒氣逆傷肝強力舉重久坐濕地傷腎形寒飲冷傷肺憂愁思慮傷心風雨寒暑傷形大怒恐懼傷志也六極者肝傷筋極心傷脈極脾傷肉極肺傷氣極腎傷骨極臟腑氣衰視聽已卸為精極也婦人三十六病千金方載十二癥九痛七害五傷三痼不通是也問曰病有急當救里救表者何謂也師曰病醫下之續得下利清穀不止身體疼痛者急當救里後身體疼痛清便自調者急當救表也此治傷寒例也傷寒里症已實而表症尚在者當先解表而後攻裡若先下之則裡虛表邪陷里為結胸痞滿等病如表症未罷里症已虛者宜先救里而後治表蓋治以裡虛為重也今病表症未除醫誤下之下利清穀此裡虛也故雖身疼痛急當救里後得清便自調則里症已愈尚身體疼痛表症仍在故急當救表也傷寒論救里宜四逆湯救表宜桂枝湯夫病痼疾加以卒病當先治其卒病後乃治其痼疾也上節因病有表裡而為治之緩急此節又因病有新舊而為治之先後舊病為痼疾宜緩以治本新病為卒病謂猝然得之者宜急則治標也按本篇名臟腑經絡先後病如首節肝病傳脾是臟腑病也次節經絡受邪入臟腑又云適中經絡是經絡病也此節痼疾加以卒病是先後病也一篇血脈關鍵在此師曰五臟病各有得者愈五臟病各有所惡各隨其所不喜者為病病者素不應食而反暴思之必發熱也難經云五臟有五色皆見於面當與寸口尺內相應假令色青脈當弦而急色赤脈中緩而大色白脈浮澀而短色黑脈沉濡而滑是色脈相應為各有得故愈也各有所惡如內經心惡熱肺惡寒肝惡風脾惡濕腎惡燥之類各隨其所不喜如內經辛走氣氣病無多食辛咸走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸為五禁之類思食發熱由胃有虛火從中達外也夫諸病在臟欲攻之當隨其所得而攻之如渴者與豬苓湯余皆仿此髒字作里字解腑為表臟為里攻治也隨其所得而攻之謂有如是之病治以如是之法順其機而不悖也傷寒脈浮發熱渴欲飲水小便不利者此下後熱客下焦與豬苓湯利小便以瀉下焦之熱此即隨其所得而攻之之法也痓濕暍病脈證第二成無己云痓當作痙蓋痙者強也痓者惡也非強也此傳寫之誤也故論其症則如角弓反張論其因則太陽中風重感寒濕之所致也濕者六氣之一也自方隅論之西北地高乳醪酪面濕在內東南土薄風雨山蒸濕在外然有寒濕濕熱風濕之異治法自發汗利小便外古人多用風藥升散之以風能勝濕故耳暍者暑病也暑有二有夏時暴感暑氣而發者有冬受寒毒至夏變為暑病者俗名晚發即熱病是也然亦有辨寒毒變暑者其脈盛夏時暴感之暑其脈虛然夏時暴感之暑又有辨東垣云靜而得之為中暑蓋因納涼飲冷使周身陽氣為陰寒所遏不得伸越其症頭痛惡寒體痛煩心肌熱無汗昔人稱為陰症王履謂此是傷寒之類不可以中暑名之須用辛溫輕揚發散之劑治之是也動而得之為傷熱如農夫行人日中勞役頭疼發躁大渴惡熱肌膚大熱脈洪大多汗無氣以動此熱傷氣也人參白虎湯主之然經謂太陽痓濕暍三病與傷寒相似蓋太陽主表凡屬外感皆得傷之然亦有似是而非者其外症皆發熱惡寒似也而亦有不同者傷寒脈盛濕脈沉細痓脈沉遲弦細暍脈虛而弦細芤遲是也其症又有各別者傷寒初病無汗亦未至煩渴暍病初即自汗而渴濕則不渴身疼痓則身不疼也太陽病發熱無汗反惡寒者名曰剛痓太陽病謂傷寒症屬太陽經脈浮惡寒頭項強痛也友熱者寒邪客於經中陽氣怫鬱所致此太陽中風重感寒者也寒傷榮凝斂津液而無汗無汗為表實則不當惡寒故云反惡寒也剛痓者以其無汗而寒性徑冽也太陽病發熱汗出不惡寒者名曰柔痓風傷衛則疏泄腠理而汗出汗出為表虛當惡寒其不惡寒者是太陽中風重感寒濕者也柔痓者以其有汗而濕性濡潤也王肯堂曰濕勝者自多汗出活人書云剛痓宜葛根湯柔痓宜桂枝加葛根湯通用俱宜小續命湯剛痓去附子柔痓去麻黃又云合面而臥為陰痓仰臥為陽痓太陽病發熱脈沉而細者名曰痓為難治痓屬太陽其病主表發熱者表症也反得沉細裡虛之脈此脈不與病應故難治李升璽曰下文痓脈沉遲者栝蔞桂枝湯主之此脈但沉而細何云難治蓋遲則為寒尚可解肌細為氣少難於發表故也太陽病發汗太多因致痓經云陽氣者精則養神柔則養筋此汗多亡陽筋失所養故致痓夫風病下之則痓復發汗必拘急下多亡陰則液脫不能榮筋故成痓汗多亡陽則氣虛不能衛外故拘急惡寒之狀也瘡家雖身疼痛不可發汗汗出則痓經云奪血者無汗瘡家亡血損陰故身痛非外感也發汗則又亡陽傷衛故成痓或云身疼屬外感然恐瘡家重亡津液故禁汗病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痓病也若發其汗者寒濕相得其表益虛即惡寒甚發其汗已其脈如蛇暴腹脹大者為欲解脈如故反伏弦者痓痓症屬太陽其脈上額交巔別下項夾脊抵腰中下至足風寒客於經中則筋脈拘急故頸項強急而背反張也身熱者邪客於經陽氣怫鬱也惡寒者邪在於表衛氣不固也足寒有二義重感寒濕者濁邪中於下發汗太多者陽氣衰於下也時頭熱面赤目赤者風傷於上風為陽邪故面目赤也三陽經聚於頭面足太陽脈起於目內眥為目之上綱頭搖者風動之象也猝然口噤寒主筋急也手三陽之筋結入於頷頰足陽明之筋上夾於口風寒乘虛入其筋則攣故令牙關急而口噤痓病原屬太陽中風重感寒濕今汗虛陽氣則邪盛正衰寒濕仍伏而不散是謂寒濕相得徒令其表益虛即惡寒甚也其脈如蛇者即弦緊之意暴腹脹大者寒濕之氣忽然渙散自內而出於外也妙在於暴字蓋邪欲外解急不能待倏忽向外脹大故為欲解若漸漸腹脹邪便從外入里矣暴字與卒口噤卒字同解脈伏為在裡表邪深入也弦屬肝脈風氣尚存故成痓也夫痓脈按之緊如弦直上下行風令脈弦寒令脈緊然經云緊如轉索無常弦如弓弦不移則二脈相似又恐其易混故云緊如弦而實非弦也直者不柔和而堅搏切指也上下行者自寸至尺皆見緊直之脈也痓病有灸瘡難治痓病筋脈強急陽氣消亡加以素有灸瘡則焦骨傷筋血氣虧損此陰陽兩虛之症非表藥所能解散故難治脈經曰痓病其脈伏堅直上下行伏者裡虛而表邪深入堅者切指而強急不和亦邪盛正衰之脈太陽病其症備身體強几几然脈反沉遲此為痓栝蔞桂枝湯主之幾音殊以下節剛痓觀之則此為柔痓也症備者兼有太陽病之頭項強痛發熱惡風寒之症也几几伸頸之貌身體強者狀亦如之太陽傷寒則脈浮緊中風則脈浮緩今脈反沉遲是太陽中風重感寒濕之脈蓋濕則脈沉寒則脈遲也栝蔞桂枝湯方栝蔞根二兩桂枝三兩芍藥三兩甘草二兩生薑三兩大棗十二枚上六味以水九升煮取三升分溫三服取微汗汗不出食頃啜熱粥發桂枝湯中風解肌方也桂枝行陽芍藥養榮甘草和中生薑大棗行脾之津液而和榮衛加栝蔞根者以其能生液潤枯榮筋徹熱為身體強急者所宜也太陽病無汗而小便反少氣上衝胸口禁不得語欲作剛痙葛根湯主之寒傷榮則凜栗收斂閉固律液故無汗而小便反少也氣上衝胸寒邪逆上也寒則筋急故口噤不得語無汗故欲作剛痓葛根湯方葛根四兩麻黃三兩去節桂枝二兩去皮芍藥二兩甘草二兩炙生薑三兩大棗十二枚上七味㕮咀以水一斗先煮麻黃葛根減二升去沫納諸藥煮取三升去渣溫服一升覆取微似汗不須啜粥余如桂枝湯法將息及禁忌此即桂枝湯加麻黃葛根也經云桂枝本為解肌不更發汗今因剛痓無汗故加麻葛即桂枝麻黃各半湯之例或曰經云發汗太多因致痓今既成痓又用葛根湯發汗何也曰既見太陽表症剛痓無汗安得不小發其汗乎況麻葛桂枝雖能行陽發表而內有芍藥以養陰和榮甘草薑棗皆行津液和榮衛之品又取微似汗不令多汗則於發散之中仍寓潤養之意於汗多成痓之戒何拘先煮麻黃葛根去沫者去其浮越慓悍之性亦不欲其過於發汗也痓為病胸滿口噤臥不著席腳攣急必齗齒可與大承氣湯凡痓屬太陽惟此傳入陽明故不冠以太陽病而但云痓為病也蓋陽明病胃家實也其經下膈屬胃循腹裡挾口環唇入上齒中以其從經入府為實熱症故胸滿即前氣上衝胸之意口噤齘齒噤甚則上下齒相切也臥不著席腳攣急者即如角弓反張之意邪在陽明則口噤邪在太陽則攣急龐安常曰痓病臥不著席者小兜腰間去席二指大人手側掌為難治與大承氣湯以下里實大承氣湯方大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合上四味以水一斗先煮二物取五升去渣內大黃煮取二升去渣內芒硝更上火微一二沸分溫再服得下止服按經文凡云某湯主之者謂決宜用此湯以之為主也凡云可與某湯者尚有慎重斟酌不敢輕用之意太陽病關節疼痛而煩脈沉而細者此名濕痹濕痹之候小便不利大便反快但當利其小便太陽經行身之表外邪皆得傷之故亦易受濕氣也關節疼痛者濕流關節也煩者濕氣鬱蒸而內熱也經云沉潛水蓄沉細為濕脈然痓病亦沉遲弦細何以別之要知痓病身不疼而反張濕則關節疼煩為可辨耳痹者閉塞不通之謂即內經濕氣勝者為著痹之意小便不利濕壅於內也大便快濕勝則濡瀉也利小便則濕去而疼煩止矣濕家之為病一身盡疼發熱身色如熏黃也黃家為濕熱交蒸之病但濕不熱但熱不濕俱下發黃傷寒陽明瘀熱則黃色鮮明如橘子色陽黃也此太陰受濕則黃色昏黯如熏黃色陰黃也王海藏云色如橘子黃黃病也一身不痛如煙燻黃濕病也一身盡痛蓋脾主肌肉屬濕土土色黃脾惡濕也陽明表裡有熱則身不疼此身疼非傷寒客熱知濕邪在經而為黃也發熱亦濕氣熏蒸所致濕家其人但頭汗出背強欲得彼覆向火若下之早則噦或胸滿小便不利舌上如胎者以丹田有熱胸上有寒渴欲得水而不能飲則口燥煩也前節濕熱發黃此屬寒濕相搏也濕家多汗此兼寒氣凝斂故但頭汗出也背強者太陽經行身之背寒濕外搏經氣不利也覆被向火寒濕在表自惡寒也噦而胸滿小便不利者下後虛氣上逆津液內竭也又下后里虛上焦陽氣因虛而陷於下焦為丹田有熱舌上白胎滑者表間寒氣乘虛入於胸中為胸上有寒惟丹田有熱則渴欲飲水惟胸上有寒雖得水不能飲但口燥煩也活人書云病人表實裡虛玄府不開則陽氣上出汗見於頭凡頭汗者五臟乾枯胞中空虛津液少也慎不可下下之為重虛玄府汗孔也濕家下之額上汗出微喘小便利者死若下利不止者亦死濕在表下之則反虛其裡氣額者諸陽之會額上汗出是孤陽無根而上脫也微喘者裡氣不守而上逆也經云汗出發潤喘不休者肺絶也小便利或下利者陰氣不藏而下泄也此陰陽離絶之症故死李瑋西曰前云濕家當利小便以濕氣內瘀小便原自不利宜用藥利之此下后里虛小便自利液脫而死不可一例概也風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也蓋發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也風濕相搏搏者凝結不解之義一身盡疼表症也自宜發汗值天陰雨又當濕勝之時然風屬陽邪其性輕浮濕屬陰邪其性凝滯成注謂風在外濕在內者非此俱屬表症也汗大出者以發之太驟則輕浮者易去而凝滯者難驅故不愈也微微似欲汗出經所謂漬形以為汗妙在漬字有浸潤透徹之義即桂枝湯通身漐漐微似有汗者佳勿如水流漓也王宇泰曰此宜麻黃加朮湯桂枝附子湯桂枝加白朮湯之類濕家病身疼發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈內字作納此中濕之淺者故症在表不在裡兼言寒濕者以濕性原屬寒也身疼者濕著於表也頭痛者濕浮於上也濕怫鬱而發熱濕熏蒸而面黃或喘鼻塞而煩者濕壅滯不宣而氣為之不利也脈大者病在表能飲食者邪未入里也此受濕尚淺但頭中寒濕故鼻塞納藥鼻中以泄頭中寒濕病自愈矣經云天氣通於肺肺開竅於鼻東垣云內傷症顯在口而口為之不和外感症顯在鼻而鼻為之不利故鼻塞為濕氣外薄也王宇泰曰宜瓜蒂散其方用瓜蒂二十枚赤小豆黍米各十四粒為細末如大豆許一粒納鼻中縮入當出黃水慎不可吹入濕家身煩疼可與麻黃加朮湯發其汗為宜慎不可以火攻之身煩疼濕邪在表也麻黃湯恐汗大出風氣去濕氣在故加白朮以緩中而燥濕欲其一發一補所謂微微似欲汗出者風濕俱去之意也火攻則濕與熱並或邪氣鬱而為黃病或正氣虛而為亡陽矣麻黃加朮湯方麻黃二兩去節桂枝二兩去皮杏仁七十個去皮尖白朮四兩甘草一兩炙上五味以水九升先煮麻黃減二升去上沫納諸藥煮取二升半去渣溫服八合覆取微似汗麻黃桂枝發邪於表杏仁利氣於中然恐過於發散故加甘草甘以緩之所以緩麻黃之峻烈也白朮苦以燥之所以燥脾土之濕滯且白朮益脾又有無汗則發有汗則止之功病者一身盡疼發熱日晡所劇者名風濕此病傷於汗出當風或久傷取冷所致也可與麻黃杏仁薏苡甘草湯身疼者濕也發熱者風也陽明王於申酉戌時病則日晡所劇今風濕外薄亦日晡所劇者何也蓋陽明者土也主肌肉而惡濕凡外感風濕肌肉受傷皆屬陽明經症故當其王時則邪正相爭而亦病劇也汗出當風得之者先客濕而後感風汗亦濕類也久傷取冷所致者或風或濕所感不論先後而並得傷之也成無己云此先傷風而後中濕者與此湯兼去風濕麻黃杏仁薏苡甘草湯麻黃半兩去節湯泡杏仁十個去皮尖炒薏苡仁半兩甘草一兩炙上銼麻豆大每服四錢匕水一盞煮八分去渣溫服有微汗避風麻黃髮表杏仁利氣甘草和榮衛又以緩麻黃之迅烈苡仁去濕入肺脾二經肺主通調水道脾土既燥則自能制濕矣風濕脈浮身重汗出惡風者防己黃耆湯主之脈浮者風也身重者濕也濕勝則多汗風傷衛表虛則亦汗出惡風也防己黃耆湯方防己一兩黃耆一兩一分去蘆白朮七錢半甘草半兩炒上銼麻豆大每抄五錢匕生薑四片大棗一枚水盞半煎八分去渣溫服良久再服喘者加麻黃半兩胃中不和者加芍藥三分氣上衝者加桂枝三分下有寒者加細辛三分服後當如蟲行皮中從腰下如冰後坐被上又以一被繞腰以下溫令微汗差經云邪之所湊其氣必虛汗出惡風者表虛也黃耆實表以固衛氣衛氣實則風濕無所容而自散矣風濕從皮毛而入肌肉白朮入脾胃二經能壯肌肉而燥濕與黃耆同為無汗則發有汗則止之劑甘草助脾土而制濕防己入膀胱經以利水為治風水要藥一云行十二經分木漢二種木防己治風漢防己治水加薑棗行津液而和榮衛也風壅於肺則喘加麻黃以通肺壅芍藥入脾經能於土中瀉木故胃不和者加之氣上衝者欲作奔豚也桂枝泄奔豚故加之細辛味辛氣溫能散水氣以去內寒故下有陳寒加之如蟲行皮中者藥氣行而風濕散也腰下如冰者濕性陰寒從下部滲去也故令重被繞腰溫令微汗以發之傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若大便堅小便自利者去桂加白朮湯主之煩者風也身疼不能轉側風濕在經也不嘔不渴里無邪也經云風則浮虛兼澀者濕也桂枝附子湯祛風逐濕大便堅小便利為內無津液桂枝發汗走津液故去桂加白朮以生津液桂枝附子湯方桂枝四兩去皮甘草二兩炙生薑三兩切大棗二十枚擘附子三枚炮去皮破八片上五味以水三升煮取一升去渣分溫三服桂枝湯解肌去芍藥恐其酸斂也加附子溫經行陽則風濕俱去矣白朮附子湯方白朮二兩附子一枚半炮去皮甘草一兩炙生薑一兩半切大棗六枚上五味以水三升煮取一升去渣分溫三服一服覺身痹半日許再服三服都盡其人如冒狀勿怪即是朮附並走皮中逐水氣未得除故耳張元素曰附子以白朮為佐乃除寒濕之聖藥宜少加之引經又益火之原以消陰翳則便溺有節也風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之經云濕家一身盡疼又太陽中風體痛此骨節疼煩掣痛風則傷衛濕流關節也風氣疏泄故汗出短氣中風表虛故惡風著衣小便不利濕內壅也身腫濕外薄也主此湯溫經以祛風濕甘草附子湯方甘草二兩炙附子二枚炮去皮白朮二兩桂枝四兩去皮上四味以水六升煮取三升去渣溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者服六七合為妙活人書云身腫加防風悸氣小便不利加白茯苓白朮補脾勝濕桂枝發表祛風甘草養正緩邪附子性走而不守浮中沉無所不致昔人謂能引發表藥逐在表之風邪引溫暖藥除中外之寒濕是也太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發其汗則惡寒甚加溫針則發熱甚數下之則淋甚此條中暍所見者皆傷寒暑虛症此以時逢長夏六月也濕熱令行氣虛受困非若勞人奔馳烈日病燥渴煩躁治以人參白虎湯例也然仲景無治法東垣以清暑益氣湯主之可見為濕熱交蒸之病無疑矣蓋發熱惡寒身重疼痛暑病有之濕病亦有之暑脈弦細芤遲濕脈亦沉而細也太陽經行身之表府屬膀胱溺所從出小便已灑灑然毛聳者因溺則太陽府虛故外而太陽經亦虛也手足逆冷者陽氣內虛不溫於四末也小有勞身即熱者暑傷氣也口開者濕熱壅盛肺氣不利也經云因於暑汗煩則喘喝齒燥虛渴也經云陽氣者衛外而為固也炅則氣泄濕則脾困故見此等證發汗惡寒者陽虛於外也溫針發熱者熱攻於內也下之淋甚者津液竭而膀胱不利也活人書問中暑何故惡寒答曰經云四時八風之中人也寒則皮膚急腠理閉暑則皮膚緩腠理開閉則熱而悶開則灑然寒全生集云夏月有四症傷風傷寒脈症互見中暑熱病疑似難明若脈緊惡寒謂之傷寒脈緩惡風謂之傷風脈盛壯熱謂之熱病脈虛身熱謂之傷暑以此別之也太陽中熱者暍是也汗出惡寒身熱而渴也白虎加人參湯主之熱傷氣氣泄則汗出氣虛則惡寒熱蒸肌腠則身熱熱消津液則作渴此惡寒身熱與傷寒相類所異者傷寒初起無汗不渴中暍初起即汗出而渴也白虎加人參湯方石膏一斤碎知母二兩甘草二兩人參三兩粳米六合上五味以水一斗煮米熟湯成去渣溫服一升日三服白虎西方金神也熾熱方張欲轉夏暑為秋涼故以白虎為名石膏氣味辛甘寒其甘也能止渴去火其辛也能解肌發汗知母辛苦寒下則潤腎燥以滋陰上則清肺金而瀉火人參益元氣而生津液甘草粳米資養脾土且甘溫除大熱也又按春屬木夏屬火木能生火故可轉冬為夏秋屬金冬屬水金能生水故可轉秋為冬若夏屬火秋屬金火能剋金何能轉夏為秋故用甘草粳米味甘屬土者使火生土土生金是謂轉夏為秋之義也東垣曰身以前胃之經也胸前肺之室也邪在陽明肺受火制故用辛寒以清肺氣所以有白虎之名太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也一物瓜蒂湯主之中暍邪在表故身熱傷冷水故身疼重暑傷氣氣虛故脈微弱也一物瓜蒂湯方瓜蒂二十個銼上銼以水一升煮取五合去渣頓服瓜蒂氣味苦寒治身面四肢浮腫散皮膚中水氣苦以泄之也百合狐惑陰陽毒證治第三活人書云傷寒虛勞大病後氣未平復變成百合病今由百脈一宗致病觀之當是心肺二經之病也蓋心合血脈肺朝百脈脈者血之府凡病在氣分者顯而易見病在血分者隱而難名如行臥飲食寒熱等症皆有莫可形容之狀在內經解亦病似之觀篇首如有神靈者豈非以心藏神肺藏魄人身神魄失守遂有恍惚錯妄之情乎千金云狐惑由溫毒氣所致乃狐惑正病也傷寒不發汗變成狐惑乃狐惑變病也活人書云狐惑傷寒與溫䘌皆蟲症初起狀如傷寒或因傷寒變此疾大抵傷寒腹內熱食少腸胃虛三蟲食人五臟及下部為䘌蟲病其侯齒無色舌白甚則唇黑有瘡四肢沉重喜眠蟲蝕其肛爛見五臟則死看其上唇有瘡蟲蝕其臟下唇有瘡蟲蝕其肛殺人甚急多因下利得之埤雅云狐性多疑此症令病者疑醫者惑故名狐惑也陰毒者感天地肅殺毒厲之氣而成陽毒者活人書云初病時邪毒深重加以當汗不汗當下不下或吐下後邪熱乘虛而入誤服熱藥使毒熱散漫延燎六脈沉實舌卷焦黑鼻如煙煤身面錦斑狂言直走登高棄衣皆其症也然陰陽毒多因時疫所感者要之此三病皆為熱症百合熱尚淺狐惑熱深陽毒則熱更甚矣痓濕暍三病與傷寒相似既於前篇詳辨之今百合狐惑陰陽毒常從傷寒所致復於此篇類推之也張卿子先生云金匱要略即傷寒論未盡之餘旨若竟作雜症視之則失之遠矣論曰百合病者百脈一宗悉致其病也意欲食復不能食常默默欲臥不能臥欲行不能行欲飲食或有美時或有不用聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脈微數每溺時頭痛者六十日乃愈若溺時頭不痛淅然者四十日愈若溺快然但頭眩者三十日愈其症或未病而預見或病四五日而出或病二十日或一月微見者各隨症治之病名百合以百脈合而成病也一宗者宗氣也人身榮氣出於中焦宗氣出於上焦正當膻中發源之處膻中任脈穴名在兩乳間難經云氣會膻中是為上氣海針經云五穀入胃其糟粕津液宗氣分為三隧宗氣積於胸中出喉嚨以貫心肺而行榮衛蓋分而為百脈合而為一宗也百病一宗悉致其病則源流上下表里無一不病矣所以致此病者內經云凡傷於寒則為病熱今之傷寒古名為熱病熱氣遺留不去伏於脈中則昏昏默默凡行臥飲食寒熱皆有一種虛煩不耐之象以致熱在上則口苦熱在下則便赤逆於上則為吐溢於下則為利也如有神靈者以心肺俱病神魄無所憑依而為之昏憒也身形不和而如和者熱伏於脈而不覺也脈微數者熱客脈中而傷榮也頭者諸陽之首膀胱者太陽之府溺從此出太陽經上額交巔溺則膀胱府虛陽氣下陷故經氣亦虛而頭痛也頭痛者其病深故六十日周一甲子之數始愈溺時但灑淅怯寒者表中陽氣尚未虛極故四十日愈若溺快然則太陽經氣已充但頭眩則較頭痛為漸輕故二十日愈其症二字指溺時頭痛淅然諸症而言或未病預見者謂未經百合病之先預見溺時頭痛等症也下三句仿此備隨症治之指下文諸治法言百合病發汗後者百合知母湯主之百合知母湯方百合七枚擘知母三兩切上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎知母取一升去渣後合和煎取一升五合分溫再服前節云各隨症治之此節以下皆隨症治之之法也病名百合即以百合治之前哲俱未發明今以臆解之實有至理存焉蓋古人用藥治病有因其名而治之者如治風用防風生産用益母草之類是也有因其形而治之者如川楝子荔枝核治疝胡桃肉沙苑蒺藜補腎大腹皮治腹脹之類是也可見醫者意也皆因名與形之相類而以意使之者也今病名百合藥亦名百合其名同也瓣瓣合成猶如心肺其形同也心形如未敷蓮花中有七孔三毛通天真之氣肺形六葉兩耳四垂如蓋中有二十四孔以分布諸氣二臟形皆如百合況百合氣味甘寒入心肺二經本草稱其有清心安神保肺益氣之功則以之治百合病乃仲景至精至巧之治神而明之者也但其熱在脈而不在皮毛發汗則陰氣既虛復亡津液知母入肺經而滋陰清熱以肺合皮毛汗從皮毛中出則肺虛故加知母以潤肺也百合病下之後者滑石代赭湯主之滑石代赭湯方百合七枚擘滑石三兩碎綿裹代赭石如彈丸大一枚碎綿裹上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去渣別以泉水二升煎滑石代赭取一升去滓後合和重煎取一升五合分溫服熱在脈而不在府下之則熱邪入里協熱遂利而下焦不固故加滑石之分利者泌水穀以分陰陽代赭石之重澀者鎮下焦而固虛脫百合病吐之後者百合雞子湯主之百合雞子湯方百合七枚擘雞子黃一枚上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去渣納雞子黃攪勻煎五分溫服吐則傷胃雞子黃純是血液所成能養胃氣以病邪在脈脈者血之府欲其入血分以和脈也百合病不經吐下發汗病形如初者百合地黃湯主之百合地黃湯方百合七枚擘生地黃汁一升上以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去渣納地黃汁煎取一升五合分溫再服中病勿更服大便當如漆百合病不經汗吐下未免熱鬱血脈中而不散生地黃甘寒入心經能養脈涼血所謂潤經益血復脈通心也大便如漆則瘀血行而積熱解矣百合病一月不解變成渴者百合洗方主之百合洗方上以百合一升水一斗漬之一宿以洗身洗已食煮餅勿以鹽豉也熱伏脈中久則消爍津液故變成渴煮百合洗之則血脈充暢津液流通而渴止矣按百合病成渴者心火上炎肺金銷鑠也然肺合皮毛而主氣故洗皮毛而氣通心合血脈食麵餅者以麥入心經心血既充則脈病自解矣勿以鹽豉者因病在血脈經云咸走血血病無多食鹽是也豉味苦而上湧氣多發越能令人吐又按作豉法雜姜椒鹽醋醋味酸斂鹽味走血姜椒辛烈散氣也百合病渴不差者栝蔞牡蠣散主之栝蔞牡蠣散方栝蔞根牡蠣熬等分上為細末米飲服方寸匕日三服渴不差者血虛內熱也栝蔞根能撤熱生津牡蠣水族鹹寒入腎經腎屬水張元素謂牡蠣壯水之主以制陽光則渴飲不思是也百合病變發熱者百合滑石散主之百合滑石散方百合一兩炙滑石三兩上為散飲服方寸匕日三服當微利者止服熱則除由內熱以致表熱用滑石利小便以瀉去內熱則表熱從此泄去此釜底抽薪法也又心合脈與小腸為表裡利小便即以瀉心火也百合病見於陰者以陽法救之見於陽者以陰法救之見陽攻陰復發其汗此為逆見陰攻陽乃復下之此亦為逆百合病多端前數條治法亦說不盡故此節總結上文而以大概治例言之也救與攻二字不同救者補其虛攻者去其實也故見陰之盛者如厥逆之類則當用補陽法救之以散其陰見陽之亢者如燥渴之類則當用滋陰法救之似抑其陽此正治也若見陽之亢則陰絶矣不能救陰而反攻其陰且復發汗以燥其津液見陰之盛則陽衰矣不能救陽而反攻其陽且復下之以損其真元則逆之甚也要知百合病原無汗下之法不可不慎狐惑之為病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面目乍赤乍黑乍白蝕於上部則聲喝甘草瀉心湯主之狐惑是傷寒遺熱所致故仍狀如傷寒也默默欲眠者內熱神昏經云蟲動則令人悗心是也喉肛與前陰皆關竅所通津液滋潤之處故蟲每蝕於此不欲飲食惡聞食臭是內熱而胃氣不和故有目不得閉臥起不安之證經云胃不和則臥不安蟲或動或伏無有定時故面目赤白黑亦無定色也蝕於上部即喉也喝者聲破而啞也甘草瀉心湯方甘草四兩人參三兩半夏半升黃芩三兩黃連一兩乾薑三兩大棗十二枚上七味水一斗煮取六升去渣再煎溫服一升日三服苦以泄之芩連之苦以清熱又殺蟲也蟲得苦則伏甘以補之人參甘草大棗之甘以和胃也辛以潤之半夏乾薑之辛以潤燥而和聲也蝕於下部則咽乾苦參湯洗之苦參湯方苦參一斤上以水一斗煎取七升去渣熏洗日三下部即前陰也蟲蝕之則津液竭於下而咽喉干於上凡蟲生於濕熱苦參氣味苦寒苦以燥濕寒能勝熱故主殺蟲蝕於肛者雄黃散熏之雄黃散方雄黃上一味為末筒瓦二枚合之燒向肛熏之厥陰屬風木而生蟲雄黃味苦有毒獨入厥陰為殺蟲解毒之聖藥陰與肛俱在下極藥力未必到此故用熏洗之法病者脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑若能食者膿已成也赤豆當歸湯主之此亦狐惑病也脈數為熱無熱者以熱伏於內不覺其熱也微煩者熱也默默欲臥內熱神昏也且熱自內蒸則汗從外泄經云臟腑精華上注於目其目赤如鳩眼四眥黑則熱毒已深膿成則熱毒並歸下部胃虛求食自助故能食也前不欲飲食是胃不和也此能食為胃虛經云脈數不止而熱不解則生惡瘡今膿成在何處大率在陰與肛之間蓋積熱生蟲亦積熱成膿是亦惡瘡之類也故主赤豆當歸散赤豆當歸散方赤小豆三升浸令芽出曝乾當歸十兩上二味杵為散漿水服方寸匕日三服當歸治惡瘡而和血赤豆心之谷也色赤入血分其性下行主散血排膿漿水即酸泔水也或云煮粟米飲釀成能解煩渴以味酸也能化滯物以其米味之變也亦猶神麯麥芽既經醞造能消食耳陽毒之為病面赤斑斑如錦文咽喉痛吐膿血五日可治七日不可治升麻鱉甲湯主之陽毒者疫氣化而為熱也病在陽明陽明經脈循面面赤斑斑如錦文者血熱毒盛胃火亢極夾血上浮於肌肉之外也陽明主肌肉靈樞云胃經循喉嚨入缺盆病則頸腫喉痹今毒氣上壅津液熱腐故咽喉痛吐膿血五日傳經未盡故可治七日傳經盡故不可治陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒主之陰毒者疫氣入於陰經也病在少陰腎經寒色悽慘故面目青寒氣斂束故身痛如被杖所謂寒傷形者此也吳綬云陽毒咽痛熱極也陰毒咽喉不利冷極也少陰脈循喉嚨挾舌本其病咽腫嗌痛蓋冷則經脈凝澀血氣閉固不通故咽喉亦痛也李升璽曰咽痛寒熱不一惟少陰傷寒咽痛有二證一以多汗亡陽用乾薑附子溫經復陽一以陰盛格陽用通脈四逆湯散陰通陽可見咽痛多屬寒證無疑升麻鱉甲湯方升麻二兩鱉甲手指大一片炙當歸一兩甘草二兩雄黃半兩研蜀椒炒去汗一兩上六味以水四升煮取一升頓服之老小再服取汗熱毒聚胃故用升麻入胃經以解毒鱉甲當歸養陰和血雄黃解毒散瘀甘草甘以緩之瀉之為解毒止痛吐膿血之聖藥蜀椒辛溫能引熱氣下行用治陽毒所謂從治之法引火歸源之意也然大法治斑不可下恐毒氣內陷也不可汗恐增斑爛也今此方云取汗者因毒氣鬱蒸為害須汗以通暢陰陽之氣要不似麻黃湯之大發汗也陰毒亦主此方者以陰毒蘊結不散故用升麻達陽氣以散凝陰鱉甲當歸甘草同為和陰血養正氣之劑則身痛咽痛俱止矣去雄黃蜀椒者以其不吐膿血則無取雄黃之散瘀血雄黃能使血化為水且身痛在表亦無取蜀椒之溫中耳或問仲景傷寒論治陽證以白虎承氣治陰證以四逆理中今治陽毒不用寒藥治陰毒不用熱藥僅用升麻鱉甲湯何也答曰此非正傷寒例也觀王趙二公論可知矣附録於左趙養葵曰此陰陽二毒是感天地疫癘非常之氣沿家傳染所謂時疫證是也觀方內老小再服可見王履曰仲景雖有陰毒之名然其敘證不過面目青身痛咽痛而已並不言陰寒極盛之證其升麻鱉甲湯並不用大熱藥是知仲景所謂陰毒者非陰寒之病乃感天地惡毒異氣入於陰經故曰陰毒耳後人謂陰寒極盛之證稱為陰毒引仲景所敘面目青身痛如被杖咽喉痛數語欲用附子散正陽散等藥竊謂陰寒極盛之證固可名為陰毒然終非仲景所以立名之本意觀後人所敘陰毒與仲景所敘陰毒自是兩般豈可混論蓋後人所敘陰毒只是內傷冷物或暴寒所中或過服寒涼藥或內外俱傷於寒而成瘧病脈證治第四瘧者虐也寒熱侵人暴虐至甚故名瘧內經瘧論最詳云痎瘧皆生於風又云得之夏傷於暑又云夏暑汗不出者秋成痎瘧其始發也陽氣並於陰陽虛而陰盛外無氣故先寒栗也陰氣逆極則復出之陽陽與陰復並於外則陰虛而陽實故熱而渴並於陽則陽勝而熱並於陰則陰勝而寒極則陰陽俱衰衛氣相離故病乃休衛氣集則復病也衛氣者晝行於陽夜行於陰此氣得陽而外出得陰而內薄內外相薄故曰作也若邪氣內薄於五臟橫連募原其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也又邪氣客於風府循膂而下衛氣一日一夜大會於風府其明日日下一節每至於風府則腠理開邪氣入則病作以此作日益晏也其出於風府日下一節二十五日下至骶骨二十六日入於脊內注於伏膂之末其氣上行九日出於缺盆之中其氣日高故作日益早也已上俱出內經今更思之瘧發於夏秋之交此因乎天時者也濕熱蒸溽之地如粵蜀滇黔土鬱作瘴瘴地在西南未申坤位故瘧發之期月多在此時刻亦多在此觀藥用檳榔草果可見此因乎地理者也飢飽勞傷痰澼房事此得之內傷者也涼亭水閣露坐當風行人擔夫紅塵赤日此得之外感者也又瘧病多腹脹減食嘔惡等症皆屬太陰濕土脾氣困也瘧愈常發口瘡唇疹以脾開竅於口脾邪自內出而外散也治法能始舒脾困後補脾虛則瘧無不愈觀古方治瘧清脾飲諸方多用白朮補脾等藥此尤其最驗者矣師曰瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之差弦遲者可溫之弦緊者可發汗針灸也浮大者可吐之弦數者風發也以飲食消息止之弦為風脈亦屬肝脈以風氣通於肝而瘧生於風也又傷寒少陽病見弦脈瘧疾寒熱往來口渴作嘔多似少陽症故其脈亦弦治瘧用小柴胡湯即治傷寒少陽症例也熱勢躁急故弦而兼數寒性凝澀故弦而兼遲脈小緊者邪氣斂束為裡實故可下遲則為寒故可溫寒傷榮則弦緊而無汗故可發汗針灸浮大者病在上焦故可吐數乃陽脈風為陽邪故脈弦而數風則傷衛受邪尚淺故但宜飲食消息止之李瑋西曰傷寒有汗吐下溫和解五法此節治瘧亦具五法在內飲食消息止之及後蜀漆散白虎加桂枝二方皆和解法也但汗與溫治法確不可易若下與吐則又宜加斟酌不可誤施者也病瘧以月一日發當以十五日愈設不差當月盡解如其不差當云何師曰此結為癥瘕名曰瘧母急治之宜鱉甲煎丸月一日謂本月內瘧初發之第一日也傳經七日為一周十五日再傳經盡故瘧當愈或云五日為一候三候為一氣十五日天道節氣更移則人身陰陽氣血亦為變易故十五日愈癥瘕者邪盛正衰血結氣聚或痰與食固結不解也急治之遲則難散矣後治牝瘧用龍骨此治瘧母用鱉甲龍屬陽鱉屬陰一陰一陽之義也鱉甲煎丸方鱉甲一十分炙柴胡六分人參一分半夏一升黃芩三分桂枝三分芍藥五分乾薑三分阿膠三分炙丹皮五分去心桃仁二分厚朴三分赤硝十二分葶藶一分熬瞿麥二分大黃二分烏扇三分燒蜣螂六分熬蜂窠四分炙紫葳三分鼠婦三分熬䗪蟲五分熬石韋三分去毛上二十三味為末取煅灶下灰一斗清酒一斛五斗浸灰候酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁納諸藥煎為丸如梧子大空心服七丸日三服肝藏血凡痃癖癥瘕皆肝經血液凝結之病肝色青鱉色亦青能獨入厥陰肝經而散瘕癖故以之為君柴芩清熱人參補虛半夏散結即小柴胡湯也為傷寒半表裡和解之劑今治瘧母乃除風暑寒熱之要藥以清其源之意也桂枝發表芍藥和榮即桂枝湯也為中風解肌之方今治瘧母乃外走表面內養陰為徹表裡和榮衛之要藥大黃厚朴桃仁即傷寒桃仁承氣湯以治蓄血今治瘧母為逐血攻痞之劑再用阿膠養血丹皮行瘀其餘䗪蟲赤硝鼠婦紫葳逐邪於血中石韋葶藶瞿麥烏扇蜂房蜣螂攻邪於氣分取煅灶下灰者即用伏龍肝之意以其得火土之氣用以溫補脾氣為養正祛邪之法煎以清酒欲其行也此治瘧母祖方不可易也陰氣孤絶陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰疸瘧若但熱不寒者邪氣內藏於心外舍分肉之間令人銷鑠肌肉分去聲內經云疸瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間發則陽氣盛則病矣其氣不及於陰故但熱不寒令人銷鑠肌肉蓋瘧者陰陽更勝也疸瘧有陽無陰故所見俱是熱證少氣煩冤熱傷氣也四肢者諸陽之本此陽氣盛故手足熱也欲嘔者經云諸逆衝上皆屬於火也心屬火邪氣內藏久而化熱故但熱不寒銷鑠肌肉火氣勝也內經以疸瘧屬肺熱仲景以疸瘧屬心火李升璽曰下節溫瘧無寒但熱此疸瘧但熱不寒症頗相類亦宜白虎加桂枝之屬溫瘧者其脈如平身無寒但熱骨節疼煩時嘔白虎加桂枝湯主之內經云溫瘧因冬中風寒氣藏骨髓至春陽氣大發邪氣不能自出因遇大暑腦髓鑠肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也此陰虛而陽盛陽盛則熱矣衰則氣復反入則陽虛而寒故先熱後寒名曰溫瘧內經以先熱後寒者為溫瘧仲景以無寒但熱者為溫瘧其脈如平者邪氣深入伏藏於內不平而如平耳身無寒但熱者寒邪醞釀既久悉化為熱也骨節疼煩以冬時邪藏於腎腎主骨骨髓之內不勝其熱也時嘔者胃氣熱而上逆也白虎湯清內熱加桂枝治骨節煩疼白虎加桂枝湯方石膏一斤知母六兩甘草二兩炙粳米六合桂枝三兩上五味以水一斗煮米熟湯成去渣溫厥一升日三服瘧多寒者名曰牝瘧蜀漆散主之內經曰夏傷於暑汗出腠里開發因遇悽愴之小寒藏於腠理皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒後熱名曰寒瘧此云多寒則是但寒無熱也內經以先寒後熱者為寒瘧仲景以多寒者為牝瘧凡人身以熱為陽寒為陰物以陽為牡陰為牝此因寒多陰勝故名牝瘧主蜀漆散升陽退陰也蜀漆散方蜀漆洗去腥雲母燒二日夜龍骨各等分上三味杵為散未發時漿水服半錢溫瘧加蜀漆半分臨發時服一錢匕牧瘧證多陰寒治宜助陽溫散為主雲母之根為陽起石下有云母上多雲氣性溫氣升乃升發陽氣之物龍骨屬陽能逐陰邪而起陽氣蜀漆乃常山之苗功能治瘧不用根而用苗者取其性多升發能透達陽氣於上之義也溫瘧加蜀漆亦取其升散之功但牝瘧屬陰邪氣深入未發時服者先其機而奪之溫瘧屬陽邪氣浮越臨發時服者折其勢而散之也中風歷節病脈證治第五素問云風者百病之長善行而數變靈樞云虛邪偏客於身半其入深者內居榮衛榮衛衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛又云痱之為病也身無痛者四肢不收志亂不甚其言微知可治甚則不能言不可治也偏枯者身偏不用而痛言不變志不亂病在分腠之間蓋臟腑有俞俞皆在背中風者外為風邪所中多從俞入者也而有中臟中腑中血脈之分中臟者病在裡多滯九竅故耳聾鼻塞目瞀不能言二便閉法當下之中腑者病在表多著四肢故肢節廢拘急不仁外有六經形症法當汗之中血脈者病在半表半裡外無六經形症內無便溺閉澀但口眼喎斜半身不遂不可過汗恐虛其衛不可大下恐損其榮法當養血順氣以和之而已此篇所云中風大都中腑中血脈者居多歷節病即因中風所致經云諸筋者皆屬於節以中風多著筋骨故節節皆痛為歷節病也外如水傷心穀氣實飲酒汗出諸證則又歷節病之不等倫者矣夫風之為病當半身不遂或但臂不遂者此為痹脈微而數中風使然半身不遂即偏枯證也不遂者謂不能屈伸轉動不遂其意也經云三陽三陰發病為偏枯痿易言左右變易為痿也四肢不舉蓋三陽者足太陽膀胱也其經自頭背下行至足三陰者足太陰脾也脾主四肢故二經多有半身不遂之病若痹者閉也臟腑正氣為邪氣所閉則痹而不仁靈樞云病一臂不遂時復又移一臂者非風也痹也此亦云風病當半身不遂若但臂不遂者痹也非風也蓋風與痹似同而實異故內經風痹各為立論而局方風痹類同一治者非也脈微者正氣虛也數者風為陽邪其氣煩擾不寧也李升璽曰內經云風氣勝者為行痹則痹亦有屬中風所致者但一臂與半身輕重淺深之間自各不同此風與痹所宜分而治法亦宜各為辨也或云脾主四肢臂不遂者有屬脾病或濕痰死血使然寸口脈浮而緊緊則為寒浮則為虛寒虛相搏邪在皮膚浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口吐涎此節八個邪字俱指中風言以風邪無定在而有中血脈中腑中臟之不同也浮緊之脈為寒虛相搏邪在皮膚所謂風則傷衛寒則傷榮也浮脈氣張於外則血自虛於中脈者血之府血虛則絡脈空虛賊邪不瀉即經云邪之所湊其氣必虛也或左或右五句俱指喎僻言邪氣反緩正氣即急以口兩旁正氣原自不緩不急本無偏勝假若喎僻向左是右有邪氣經脈為之緩縱故為左之正氣牽急也喎僻向右是左有邪氣經脈為之緩縱故為右之正氣所牽急也正氣引邪言正氣為邪氣所引也僻者偏也喎僻不遂謂口角偏向欲正不能不遂其意也絡淺而經深故邪在於絡肌膚不仁經脈為邪氣壅滯不利故邪在於經即重不勝以上俱言邪中血脈也其有中腑中臟者則陽明內熱氣多昏冒故邪入於腑即不識人心之竅為舌心之聲為言脾之竅為口脾之液為涎邪入於臟舌即難言口吐涎是邪在心脾二臟也按耳鼻本靜故風息焉口目常動故風生焉口眼喎邪多屬胃土而有筋脈之分經云足之陽明手之太陽筋急則口目為僻眥急不能卒視此胃土之筋病也又云足陽明之脈挾口環唇此胃土之脈病也又按不仁二字形容最妙蓋仁者天地生物之心即萬物所以生生之理譬桃梅諸果含於核中者皆謂之仁將此仁種於土中復生千萬億桃梅諸樹且結為千萬億桃梅諸果之仁皆此生機流衍於無窮也若肌膚不仁則氣血枯槁痛癢不知其肉已死故名不仁以其生機滅絶也寸口脈遲而緩遲則為寒緩則為虛榮緩則為亡血衛緩則為中風邪氣中經則身癢而癮疹心氣不足邪氣入中則胸滿而短氣此節中風以榮衛經脈為主蓋經即脈也脈者血之府榮行脈中衛行脈外若心合血脈則又統領榮衛以行乎經脈者也如經脈營衛充周雖有風邪何從而入惟榮衛俱虛故風邪得以中經也脈遲與緩似同而實異遲者一息脈二三至緩者脈一息四五至往來從容不數疾也然此所謂緩者乃懈弛不鼓動之緩非有胃氣和緩之緩也寸口兼言遲緩而榮衛但言緩者寒少而虛多先虛而後寒也寸口兼脈之尺寸言榮則單指尺脈衛則單指寸脈以尺脈在下屬陰主內故為榮寸脈在上屬陽主外故為衛也或云榮指沉脈衛指浮脈言然浮沉之間急則俱急緩則俱緩無所異也惟榮主血榮緩則不能充乎脈中故為亡血衛主氣衛緩則不能實乎脈外故為中風也邪氣中經此邪氣即風氣也經云遲為無陽不能作汗其身必癢以痛為實癢為虛也癮疹者風邪搏血鬱蒸而化熱也又經云風氣相搏必成癮疹身癢者名泄風久為痂癩是也心合血脈心氣不足仍是榮緩亡血之證經云陽受氣於胸中邪氣入中以虛寒相搏陽氣不足則邪氣上逆而奔迫故胸滿短氣也寸口脈沉而弱沉即主骨弱即主筋沉即為腎弱即為肝汗出入水中如水傷心歷節黃汗出故曰歷節如一作洳濕漬之意此歷節病不獨中風而又有挾濕者蓋風令脈浮此脈沉故有辨也此寸口脈通指寸關尺三部而言東垣云外傷風寒是腎肝之氣已絶於內蓋腎合骨肝合筋故主骨者即為腎主筋者即為肝也沉即為腎者腎脈伏藏在下也弱即為肝者肝藏血而血亡經所謂風客淫氣精乃亡邪傷肝也汗出則受風矣又入水中以致水傷心而歷節黃汗出經所謂風濕相搏骨節疼煩掣痛者是也故曰歷節蓋心屬火水傷心則水剋火矣黃汗出者水氣鬱蒸所致也跌陽脈浮而滑滑則穀氣實浮則汗自出此歷節病不獨外感風濕而又有內傷穀氣者之所致也趺陽胃脈也診在衝陽腳面上動脈經云食入於陰長氣於陽滑者脈如流珠乃胃氣有餘之象故為穀氣實實則氣蒸於外衛氣疏泄不能固表故脈浮汗出而受風也按前節汗出則腠理開而受風入水則寒氣勝而透骨故濕流關節歷節而痛是外因也此節趺陽脈浮滑者胃中水穀濕熱之氣蒸發於外以致汗出受風亦歷節而痛此內因也汗即是濕汗出更受風是亦風濕相搏之症少陰脈浮而弱弱則血不足浮則為風風血相搏即疼痛如掣此歷節病之因血虛而致者也少陰腎脈也診在太溪在內踝上動脈腎脈宜沉而微石今反浮而弱經云尺脈浮為傷腎故為血不足為風也風在血中則慓悍徑切無所不至為風血相搏蓋血主榮養筋骨者也若風以燥之則血愈耗而筋骨失其所養故疼痛如掣昔人云治風先養血血生風自滅此其治也盛人脈澀小短氣自汗出歷節疼不可屈伸此皆飲酒汗出當風所致此歷節病之因飲酒而致者也當看盛人二字盛人肥壯脈當洪大而反澀小以體盛於外者氣缺於中故易受風邪也況肥人多濕酒性濕而且熱飲之則內而熏蒸腸胃外而發泄皮毛更易汗出斯時偏喜當風熱蒸故也則風入筋骨間為歷節痛所以其脈澀小者澀為血虛小為氣弱此脈與形體不相應者也短氣者肺氣虛而難以接續自汗出者風邪鼓蕩腠理疏泄也內經云飲酒中風則為漏風此歷節病之所由成也諸肢節疼痛身體尫羸腳腫如脫頭眩短氣溫溫欲吐桂枝芍藥知母湯主之此歷節病由氣血兩虛而致者也風濕相搏四肢節節皆痛即歷節病也身體尫羸邪盛正衰也腳腫如脫氣絶於下也頭眩短氣氣虛於上也溫溫欲吐氣逆於中也此三焦氣血兩虛故本湯主祛風濕而溫氣血桂枝芍藥知母湯方桂枝四兩芍藥三兩知母四兩防風四兩麻黃二兩附子二兩炮白朮五兩甘草二兩生薑五兩上九味以水七升煮取二升溫服七合日三服此方桂枝芍藥甘草即桂枝湯也傷寒論風傷衛者用以解肌和榮麻黃桂枝白朮甘草即麻黃加朮湯也但少杏仁為發汗去風濕緩正氣之劑桂枝附子白朮甘草即桂枝附子湯甘草附子湯二方也傷寒論皆治風濕相搏骨節疼煩之藥推而廣之小續命湯亦祖其意而加減之者也小續命湯通治風痓之劑但加人參杏仁防己三味其用黃芩即知母之意今由主治之意而論之則桂枝麻黃防風祛風濕以攘外白朮甘草益脾氣以補中生薑散逆芍藥知母養陰附子生用則溫經散寒熟用則益陽除濕此一方而數方俱焉精義備焉誠治歷節病之聖方也味酸則傷筋筋傷則緩名曰泄咸則傷骨骨傷則痿名曰枯枯泄相搏名曰斷泄榮氣不通衛不獨行榮衛俱微三焦無所御四屬斷絶身體羸瘦獨足腫大黃汗出脛冷假令發熱便為歷節也病歷節不可屈伸疼痛烏頭湯主之此歷節病之傷飲食滋味而致者也經云味過於酸肝氣以津津津然液泄之意味過於咸大骨氣勞蓋肝合筋腎合骨此筋傷則緩骨傷則痿者即難經所謂筋緩不能收持骨痿不能起於床者是也泄者津液漏泄之意今人食酸味則口流涎而額與鼻上汗出此其證也腎藏精而主骨鹹味走血下泄故腎虛精竭骨失所養而枯也經云榮行脈中衛行脈外又云陰在內陽之守也陽在外陰之使也今榮氣不通故衛氣亦虛不能獨行也三焦主氣無所御者氣不能主持也四屬皮肉脂髓也時解作四肢者非身體羸瘦正榮衛俱微處肝腎主下部獨足腫大脛冷者肝腎俱虛其氣已絶於下也內經云脾胃者倉廩之官五味出焉黃汗出者脾胃濕熱外注以味傷則脾胃困也發熱者正氣虛而邪氣勝也故為歷節不可屈伸疼痛烏頭湯養正逐邪烏頭湯方川烏五枚㕮咀以蜜二升煎取一升即出烏頭麻黃黃耆芍藥各三兩甘草二兩炙上五味㕮咀四味以水三升煮取一升去滓內蜜煎中更煎之服七合不知盡服之麻黃去榮中寒邪泄衛中風熱更用黃耆實衛芍藥和榮甘草養正瀉邪不用附子而用烏頭者以病在筋骨榮衛間附子溫中不若烏頭走表也恐其性烈故用蜜煎解毒又取甘以緩之之義血痹虛勞病脈證治第六血為榮榮者水穀之精氣也和調五臟灑陳六腑痹何自而生哉內經云諸血皆屬於心血凝於膚者為痹又云痹在於脈則血凝而不流此痹之所由成也蓋痹者血脈閉塞而不通也或云痹者卑也病有正氣日降邪氣日深之義焉虛者氣血耗竭之名也內經云陽虛生外寒陰虛生內熱又云脈虛氣虛尺虛是謂重虛又云脈細皮寒氣少泄利前後飲食不入是謂五虛死漿粥入胃泄注止則虛者可活此虛之大概也勞者五臟各有勞傷症也經云勞則氣耗蓋勞則喘汗出內外皆越故氣耗矣又云陽氣者煩勞則張精絶潰潰乎若壞都汨汨乎不可止故神靜則陰生形役則陽亢豈非陰陽之氣俱不可勞者哉戴氏曰五臟雖皆有勞心腎為多以心主血腎主精精枯血竭則勞生焉合而論之血痹與虛勞相因而致者也本篇如病血痹者以尊榮人重困疲勞得之病虛勞者肌膚甲錯兩目黯黑內有乾血乾血亦血痹所致也豈非血痹與虛勞相因而致者哉昔人謂素問但言虛而無勞瘵之名自仲景金匱要略始立虛勞門而巢元方撰病源候論遂有虛勞蒸病注病皆由此而推之者也問曰血痹從何得之師曰夫尊榮人骨弱肌膚盛重困疲勞汗出臥不時動搖加被微風遂得之但以脈自微澀在寸口關上小緊宜針引陽氣令脈和緊去則愈尊榮人頤養太過起居安逸不耐疲勞者故平日間骨弱肌膚盛體雖外充而氣則內怯也重困疲勞則氣耗而內外皆越故汗出臥不時動搖加被微風得血痹之證也脈自微澀血虛也小緊以被微風也風屬外感故在寸關陽部上見之夫血陰類也微澀小緊陰脈也針以引導陽氣則榮衛通調陰陽相濟其脈自和即難經氣主煦之血主濡之之謂緊去則愈微風去也血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀黃耆桂枝五物湯主之沉脈為陰浮脈為陽浮沉寸關俱微則全體俱見不足之脈又脈有七診獨小者病陽氣虛也脈緊如轉索無常有外感寒邪斂束之狀皆陰脈也血氣既虛微風外客故外證身體不仁如風痹狀實非風也五物湯以和陰陽而祛邪氣黃耆桂枝五物湯方黃耆桂枝芍藥各三兩生薑六兩大棗十二枚上五味以水六升煮取二升溫服七合日三服脈微體不仁則榮衛不通黃耆肥腠理以實衛氣芍藥斂陰氣而和榮血桂猶圭也宣導聘使為通陰陽氣血之品薑棗合用行津液而和榮衛為治血痹之良劑或問此湯大類桂枝湯黃耆建中湯二方何以不用甘草膠飴曰桂枝湯用甘草辛甘發散為陽之義也建中湯用甘草膠飴補脾氣也脾主中州故補脾以建中為名此治血痹身體不仁藥宜補而兼行庶幾利於健運故不用甘緩之品夫男子平人脈大為勞極虛亦為勞平人者形如無病之人經云脈病人不病者是也勞則體疲於外氣耗於中脈大非氣盛也重按必空濡乃外有餘而內不反之象經云獨大者病又云大則病進脈極虛則精氣竭矣蓋大者勞脈之外暴者也極虛者勞脈之內衰者也故勞脈虛者易識大者難知以脈狀似實也東垣當歸補血湯黃耆一兩當歸二錢治肌熱煩渴目赤面紅脈洪大而虛重按全無經云脈虛血虛此得之飢困勞役者誤服白虎湯必死然則脈可不審乎男子面色薄者主渴及亡血卒喘悸脈浮者裡虛也此節以亡血為主內經云精明五色者氣之華也又云心之華在面其充在血脈勞則氣耗火動迫血妄行必致亡血蓋血主濡之血亡則精采奪而面色薄津液去而煩且渴矣又勞者氣血俱耗肺主氣氣虛則喘心主血血虛則悸卒者卒然見此病也脈浮為裡虛以勞則真陰失守孤陽無根而氣散於外者精奪於內也即前節脈大為勞之意李瑋西曰脈浮屬外感何以又屬裡虛此必浮而無力者也若浮而有力則又作別論矣男子脈虛沉弦無寒熱短氣裡急小便不利面色白時目瞑兼衄少腹滿此為勞使之然內經云脈者血之府也勞則氣血俱虛故見虛而沉弦不足之脈無寒熱以無表邪也短氣裡急氣虛不接續也小便不利有二一屬肺金氣虛不能生水一屬膀胱內竭不能化氣而出也面白者血不華色也目得血而能視血虛故目瞑也衄者勞則虛火上炎氣不攝血也少腹者肝腎之部滿者肝腎兩虛即裡急不足之意此虛勞在肺肝腎三經也勞之為病其脈浮大手足頰春夏劇秋冬瘥陰寒精自出酸削不能行脈浮大者裡虛而氣暴於外也四肢者諸陽之本勞則陽耗陰虛而生內熱故手足煩凡勞傷多屬陰虛宜收斂而忌張散春夏木火盛炎之際且氣浮於外則里愈虛故劇秋冬金水相生之候且氣斂於內則外不擾故瘥也陰寒者命門火衰也精自出腎水不藏也腎主骨故酸削不能行削弱也經云強力舉重則傷腎此虛勞之病在腎者也男子脈浮弱而澀為無子精氣清冷脈浮者氣耗於外弱者血虧於內澀者陰氣不足也經云丈夫二八腎氣盛精氣溢瀉故能有子夫生子者精也而言精兼言氣者以精中有氣必氣盛而精足始得溫暖生化而有子若清冷則生化之源已絶此一為腎虛水竭一為命門火衰也夫失精家少腹弦急陰頭寒目眩發落脈極虛芤遲為清穀亡血失精此虛勞病之在肝腎二經者也蓋肝主藏血腎主藏精亡血失精則肝腎俱虛矣少腹者肝腎之部分經云肝脈過陰器抵小腹腎脈絡膀胱少腹弦急以肝腎兩虧則裡氣虛而張急如弦也肝主筋前陰者宗筋之所聚肝衰故陰頭寒也肝藏血開竅於目腎主骨骨之精為瞳子又腎之華在發發者血之餘此肝腎兩虛故目眩發落也芤脈者浮沉有中間無似中空芤草故名芤脈譬如蔥管輕舉之則得上面之蔥皮重按之則著下面之蔥皮按其中央卻空洞無物也此亡血之脈似脈者血之府血虛則脈亦虛也內經云遲為在臟又云遲則為寒極虛芤遲則其症亦虛清穀者大便完穀不化而出此命門火衰不能生土所致也脈得諸芤動微緊男子失精女子夢交桂枝龍骨牡蠣湯主之經云數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動也又云陽動則汗出陰動則發熱形冷惡寒者三焦傷也蓋陰陽相搏而虛者則動也緊者如轉索無常乃陰脈也芤動微緊則脈虛矣故失精夢交其症亦虛也桂枝加龍骨牡蠣湯方桂枝芍藥各三兩甘草二兩生薑三兩大棗十二枚龍骨牡蠣各三兩上七味以水七升煮取三升分溫三服桂枝湯乃傷寒解肌發表之劑今用治虛勞則桂枝生薑固衛以行陽芍藥甘草大棗和脾以養陰又為陰陽兼理之方矣失精夢交神魂不定精氣虛脫也經云澀可去脫龍骨牡蠣之屬蓋龍骨屬陽入心肝腎三經以心藏神肝藏魂腎藏精與志用之所以安神魂而定志牡蠣屬陰入腎經壯水之主以制陽光則相火自熄此益陽養陰之主方也李升璽曰或問失精夢交皆勞傷陰分之證何以不單用養陰藥而用此湯不知病雖傷陰而實在亡陽故用桂枝龍骨等益陽之藥夫陽生則陰固矣此制方之精義也男子平人脈虛弱細微者善盜汗也自汗為陽虛乃衛氣不實腠理疏泄汗自出也盜汗為陰虛目瞑則陽氣陷入陰中不能外護皮膚而汗出醒時陽氣復還在外則汗止如人睡被盜者然因名盜汗此屬陰虛證故虛弱細微亦見陰虛之脈也人年五六十其病脈大者痹俠背行苦腸鳴馬刀俠癭者皆為勞得之內經云男不過盡八八女不過盡七七而天地之精氣竭矣故人年五六十脈大者精氣內竭而張散於外之象也人身背為陽腹為陰經云背者胸中之府背曲肩隨府將憊矣又云陽氣者精則養神柔則養筋開合不得寒氣從之乃生大僂曲背也今痹俠背行則陽氣不行血脈凝滯亦開合不得背曲肩隨之象也經云中氣不足腸為之苦鳴鳴者氣虛下陷也癭生乳腋下曰馬刀又夾生頸之兩旁者為俠癭俠者挾也馬刀蛤蠣之屬瘡形似之故名癭一作纓俠纓者發於結纓之處也二瘡一在頸一在腋下常相聯絡故俗名歷串內經謂陷脈為瘻是也瘻者漏也有狼瘻鼠瘻諸名蓋膽經下頸循脅裡下腋故主馬刀俠癭處皆膽經過脈之處以膽為甲木為初陽性宜舒暢若人情志不伸則甲膽之氣不升折而內郁常生此病觀今人患馬刀俠癭者必成癆瘵之病成癆瘵者先生馬刀俠癭之瘡可驗也脈沉小遲名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化也此肺脾腎三經俱病也肺主氣氣為陽沉小遲皆陽氣虛衰之脈故為脫氣此肺病也疾行則喘喝以肺主出氣而腎主納氣為生氣之原呼吸之門若真元耗損則虛氣上逆而腎不納氣故喘喝此腎病也又脾主四肢四肢者諸陽之本逆寒者陽虛不溫四末也腹滿者脾經入腹氣虛中滿也溏泄食不化者此脾虛不能運磨水穀多見鶩溏飧泄之症嚴用和謂坎水不溫不能上蒸脾土沖和失布中州不運而然者也脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人則半産漏下男子則亡血失精脈弦為減氣衰於外也大為芤血失於內也氣衰則陽不足而寒血失則陰不足而虛革脈者浮取有餘重按不足丹溪云如按鼓皮外繃急而內空虛以鼓為革音脈形象之故名為革李士材曰滑伯以革為變革之義誤矣若云變革是怪脈也而革果怪脈乎陰陽氣血男婦俱有之故半産漏下亡血失精總是氣虛不能攝血血虛不能壯氣皆陰陽氣血之乖也成無己注以真陽減屬男子陰血虛屬婦人恐為偏見虛勞裡急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥小建中湯主之脾主四肢其經入腹裡急腹痛四肢痠疼脾虛不能榮養中外也悸者氣虛衄者血熱也夢失精者陰虛不守也手足煩熱者脾為至陰陰虛生內熱也脾經挾咽連舌本開竅於口咽乾口燥者脾虛津液不布也此虛勞病之在脾也小建中湯方桂枝三兩去皮芍藥六兩甘草三兩炙大棗十二枚生薑三兩膠飴一升上六味以水七升煮取三升去渣內膠飴更上微火消解溫服一升日三服或問虛勞諸病雜乘獨用小建中湯補脾何也答曰經云脾者土也孤臟以灌四旁者也蓋土為萬物之母土旺而木火金水循序以生故易云坤厚載物萬物資生又經云四時百病胃氣為本此東垣云補腎不如補脾也今據本方解之則桂枝行陽氣芍藥養陰血甘草大棗膠飴俱甘味入脾歸其所喜以鼓舞脾氣升騰灌溉而為胃行其津液焉又生薑佐桂枝以行陽氣而辛以潤之且與大棗合用以行脾之津液而和榮衛也此建立中州全其母氣功洵巨矣虛勞裡急諸不足黃耆建中湯主之虛勞屬氣血兩虛難經云氣主煦之血主濡之則氣能統血而陽生陰長此血脫者必先益氣也建中湯加黃耆以實衛氣黃耆建中湯方於小建中湯方加黃耆一兩半余依上法氣短胸滿者加生薑腹滿者去棗加茯苓一兩半及療肺虛損不足補氣加半夏三兩建中湯既補中宮而衛氣未實則補中者仍未免於外泄加黃耆以固衛氣則衛實榮生陽行陰守八珍湯加黃耆以成十全大補之功義本諸此氣短胸滿加生薑以溫胃氣且辛以散之也腹滿去棗恐其滯也加茯苓下氣行水也療肺虛補氣加半夏運樞機以行補劑也虛勞腰痛少腹拘急小便不利者八味腎氣丸主之此虛勞病之在腎經者也腰者腎之府腎脈絡膀胱少腹其部分也腎主二便開竅於二陰小便其所司也腰痛少腹拘急者腎氣虛也小便不利者腎虛液竭膀胱氣不化也腎與膀胱為表裡經云膀胱者津液藏焉氣化則能出矣主八味丸以補腎虛腎氣丸方熟地黃八兩薯蕷四兩山茱萸四兩牡丹皮白茯苓澤瀉各三兩桂枝附子炮各一兩上八味末之煉蜜為丸如梧桐子大酒下十五丸加至二十五丸日再服夫腎為水臟而命門屬火以溫養腎水此一陽藏於二陰之間以成坎體所謂兩腎之間一點陽是也難經以左為腎右為命門者非據云男子以藏猜女子以系胞然人稟天地之正氣未有胞胎偏系精藏一邊者也今用六味丸補水則陰虛內熱之症熄矣所謂壯水之主以制陽光是也蓋以熟地補腎為主山茱萸補肝佐之此癸乙同歸一治而腰痛少腹拘急可愈矣山藥補脾防水氣之泛溢丹皮去相火茯苓澤瀉利水以瀉腎邪則小便自利矣又加桂附補命門相火以去沉寒虛怯之患所謂益火之源以消陰翳是也沈子華曰今醫見小便不利即用清涼藥瀉內熱矣安知水火既濟者以資化源而小便自利乎此八味丸為治天一生水之聖劑也虛勞諸不足風氣百疾薯蕷丸主之因虛勞不足而致風氣者經云邪之所湊其氣必虛是也然風者善行數變故言百疾以統之薯蕷丸方薯蕷三十分人參十分茯苓五分白朮六分甘草二十八分乾地黃當歸各十八分芎藭芍藥各六分阿膠七分麥冬杏仁各六分桔梗柴胡各五分桂枝十八分防風六分乾薑三分白斂二分豆黃卷曲各十八分大棗百枚為膏上二十一味末之煉蜜和丸如彈子大空腹酒服一丸一百丸為劑以大豆為芽糵生便乾之為豆黃卷薯蕷甘溫入脾肺二經補虛羸除寒熱在上滋源在下補腎故為君參朮苓草四君子也所以補氣歸芎芍地四物湯也所以補血夫治風必養氣血者似補虛勞為主所謂養正邪自消也更用防風柴胡桂枝祛風阿膠養血豆黃卷和氣麥冬杏仁桔梗白斂順肺乾薑溫中大棗補脾曲導藥力酒行榮衛而虛勞風疾愈矣虛勞虛煩不得眠酸棗湯主之虛煩不眠者血虛生內熱而陰氣不斂也內經云衛氣行於陽陽氣滿不得入於陰陰氣虛故目不得瞑酸棗湯養血虛而斂陰氣也酸棗湯方酸棗仁三升茯苓知母川芎各二兩甘草一兩上五味以水八升煮酸棗仁得六升納諸藥煮取三升分溫三服內經云肝藏血人臥則血歸於肝肝虛者血不歸經故虛煩不眠棗仁補肝味酸氣主收斂則陰得其養血自歸經而得眠矣川芎亦入肝經佐棗仁以養肝生血茯苓降逆氣以除煩知母滋陰虛以清熱甘草補正瀉邪皆所以成治虛煩不眠之功也五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡榮衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃䗪蟲丸主之或問勞傷何以有乾血乎蓋血脈周流不息灌溉一身者也一有勞極諸傷則血虛而不實滯而不行此乾血所由積也血乾則不能充身澤毛榮潤肌肉故致甲錯謂皮聚而肉厚如衣甲然又如魚鱉之生鱗甲而錯雜於身體也又肝藏血開竅於目目得血而能視血乾則不能榮養其目故兩目黯黑經云損其肝者緩其中大黃䗪蟲丸皆攻下之藥而云緩中補虛何也蓋乾血不去則新血不生攻邪即所以養正也五勞解見篇首大黃䗪蟲丸方大黃十分蒸黃芩二兩桃仁杏仁各一升乾地黃十兩芍藥四兩甘草三兩乾漆一兩虻蟲一升水蛭百枚蠐螬一升䗪蟲半升上十二味末之煉蜜和丸小豆大酒飲服五丸日三服經云留者攻之燥者濡之苦走血咸勝血乾漆虻蟲水蛭蠐螬䗪蟲之苦鹹以攻乾血甘緩結苦泄熱桃仁大黃黃芩之苦甘以下結熱血乾則氣滯而榮竭故用杏仁利氣地黃潤燥芍藥和榮又恐藥力猛峻甘草緩之恐乾血堅凝酒飲行之也
